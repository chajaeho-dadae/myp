<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직업 추천 프로그램</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f0f4ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:15px;
      width:520px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      color:#3f51b5;
    }

    textarea{
      width:100%;
      height:140px;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      resize:none;
      margin-top:10px;
      font-size:15px;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:12px;
      background:#3f51b5;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#303f9f;
    }

    .result{
      margin-top:20px;
      padding:15px;
      background:#e8f0fe;
      border-radius:10px;
      font-weight:bold;
      min-height:60px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>직업 추천 프로그램</h1>

  <textarea id="userInput" placeholder="예: 수학, 과학, 국어, 영어, 건축, 수리, 게임 등"></textarea>

  <button onclick="recommendJob()">직업 추천 받기</button>

  <div class="result" id="result">결과가 여기에 표시됩니다.</div>

</div>

<script>

function recommendJob(){

  let text = document.getElementById("userInput").value.toLowerCase().trim();

  let jobs = [];

  // 미술/디자인
  if(text.includes("그림") || text.includes("미술") || text.includes("디자인")){
    jobs.push("디자이너", "웹툰 작가", "일러스트레이터");
  }

  // 게임/컴퓨터
  if(text.includes("게임") || text.includes("코딩") || text.includes("컴퓨터")){
    jobs.push("프로그래머", "게임 개발자", "AI 개발자");
  }

  // 요리
  if(text.includes("요리") || text.includes("음식")){
    jobs.push("요리사", "파티셰", "바리스타");
  }

  // 운동
  if(text.includes("운동") || text.includes("축구") || text.includes("농구")){
    jobs.push("운동선수", "체육교사", "트레이너");
  }

  // 음악
  if(text.includes("음악") || text.includes("노래")){
    jobs.push("가수", "작곡가", "음악 프로듀서");
  }

  // 동물
  if(text.includes("동물")){
    jobs.push("수의사", "동물훈련사");
  }

  // 수학 / 수리
  if(text.includes("수학") || text.includes("수리") || text.includes("계산")){
    jobs.push("수학자", "통계학자", "데이터 분석가", "회계사");
  }

  // 과학 / 실험
  if(text.includes("과학") || text.includes("실험")){
    jobs.push("과학자", "연구원", "생명공학자");
  }

  // 국어
  if(text.includes("국어") || text.includes("글") || text.includes("문학")){
    jobs.push("작가", "기자", "편집자");
  }

  // 영어
  if(text.includes("영어")){
    jobs.push("영어교사", "통역사", "번역가");
  }

  // 사회
  if(text.includes("사회") || text.includes("역사") || text.includes("정치")){
    jobs.push("역사학자", "교사", "공무원");
  }

  // 건축
  if(text.includes("건축") || text.includes("집") || text.includes("설계")){
    jobs.push("건축가", "도시계획가", "인테리어 디자이너");
  }

  // 수리/기계
  if(text.includes("기계") || text.includes("수리") || text.includes("자동차")){
    jobs.push("자동차 정비사", "기계공학자", "엔지니어");
  }

  // 영상/미디어
  if(text.includes("영상") || text.includes("유튜브")){
    jobs.push("유튜버", "PD", "영상 편집자");
  }

  // 법
  if(text.includes("법")){
    jobs.push("변호사", "판사", "검사");
  }

  // 의학
  if(text.includes("의학") || text.includes("병원")){
    jobs.push("의사", "간호사", "약사");
  }

  // 아무것도 없을 때
  if(text === ""){
    document.getElementById("result").innerHTML =
      "하나라도 입력해 주세요!";
    return;
  }

  // 기본 추천
  if(jobs.length === 0){
    jobs = ["다양한 분야 탐색 필요", "진로 상담 추천"];
  }

  // 중복 제거
  jobs = [...new Set(jobs)];

  document.getElementById("result").innerHTML =
    "추천 직업<br><br>👉 " + jobs.join("<br>👉 ");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔍 머더 미스터리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1c1c28;
  --border: #2a2a3a;
  --accent: #c8a96e;
  --accent2: #e85d5d;
  --text: #f0ece4;
  --text-sub: #888;
  --text-muted: #555;
  --culprit: #e85d5d;
  --culprit-glow: rgba(232,93,93,0.3);
  --safe: #4caf7d;
  --radius: 12px;
  --font-serif: 'Noto Serif KR', Georgia, serif;
  --font-sans: 'Noto Sans KR', sans-serif;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  min-height: 100vh;
  overflow-x: hidden;
}
#app { min-height: 100vh; }

/* 랜딩 */
.landing { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.landing-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(200,169,110,0.08) 0%, transparent 60%), repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px); }
.landing-content { text-align: center; z-index: 1; padding: 2rem; }
.landing-eyebrow { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
.landing-title { font-family: var(--font-serif); font-size: clamp(4rem, 12vw, 8rem); font-weight: 700; line-height: 0.9; background: linear-gradient(135deg, #f0ece4 30%, #c8a96e 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
.landing-sub { color: var(--text-sub); font-size: 1rem; margin-bottom: 3rem; letter-spacing: 0.05em; }
.landing-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.landing-deco { position: absolute; inset: 0; pointer-events: none; }
.deco-item { position: absolute; font-size: 2rem; opacity: 0.06; animation: float 6s ease-in-out infinite; animation-delay: var(--delay); }
.deco-item:nth-child(1){top:10%;left:5%} .deco-item:nth-child(2){top:20%;right:8%} .deco-item:nth-child(3){top:60%;left:3%} .deco-item:nth-child(4){bottom:15%;right:5%} .deco-item:nth-child(5){bottom:30%;left:10%} .deco-item:nth-child(6){top:45%;right:12%}
@keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-20px) rotate(10deg)} }

/* 버튼 */
.btn-primary { background: linear-gradient(135deg, #c8a96e, #a07040); color: #fff; border: none; padding: 0.9rem 2rem; border-radius: var(--radius); font-size: 1rem; font-family: var(--font-sans); font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,169,110,0.3); }
.btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 0.9rem 2rem; border-radius: var(--radius); font-size: 1rem; font-family: var(--font-sans); font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost { background: transparent; color: var(--text-sub); border: 1px solid var(--border); padding: 0.7rem 1.5rem; border-radius: var(--radius); font-family: var(--font-sans); cursor: pointer; transition: all 0.2s; }
.btn-ghost:hover { color: var(--text); border-color: var(--text-sub); }
.btn-start { width: 100%; background: linear-gradient(135deg, var(--accent), #a07040); color: #fff; border: none; padding: 1.1rem; border-radius: var(--radius); font-size: 1.1rem; font-family: var(--font-sans); font-weight: 700; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; margin-top: 1rem; }
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,169,110,0.3); }
.btn-copy { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-sans); font-size: 0.9rem; transition: all 0.2s; }
.btn-copy:hover { background: var(--border); }
.btn-add-item { background: transparent; border: 1px dashed var(--border); color: var(--text-sub); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-family: var(--font-sans); width: 100%; margin-top: 0.5rem; transition: all 0.2s; }
.btn-add-item:hover { border-color: var(--accent); color: var(--accent); }
.btn-remove-role, .btn-remove-phase { background: transparent; border: 1px solid var(--border); color: var(--text-muted); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
.btn-remove-role:hover, .btn-remove-phase:hover { border-color: var(--culprit); color: var(--culprit); }

/* 모달: 화면 전체를 덮는 독립 페이지로 처리 */
.modal-page { min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg); }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; text-align: center; box-shadow: var(--shadow); }
.modal-box.wide { max-width: 560px; }
.modal-icon { font-size: 3rem; margin-bottom: 1rem; }
.modal-box h2 { font-family: var(--font-serif); font-size: 1.6rem; margin-bottom: 0.5rem; }
.modal-box p { color: var(--text-sub); margin-bottom: 1.5rem; font-size: 0.9rem; }
.modal-btns { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; }

/* 인풋 */
.text-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text); font-family: var(--font-sans); font-size: 0.95rem; margin-bottom: 0.75rem; transition: border 0.2s; display: block; }
.text-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
.text-input::placeholder { color: var(--text-muted); }
.textarea-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text); font-family: var(--font-sans); font-size: 0.9rem; resize: vertical; margin-bottom: 0.75rem; transition: border 0.2s; display: block; }
.textarea-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
.select-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.7rem 1rem; color: var(--text); font-family: var(--font-sans); font-size: 0.9rem; cursor: pointer; width: 100%; }
.select-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

/* 칩 */
.chip { display: inline-flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.85rem; color: var(--text); }
.chip.small { font-size: 0.75rem; padding: 0.2rem 0.5rem; }
.chip-ghost { color: var(--text-muted); }

/* 로비 */
.room-layout { display: flex; flex-direction: column; min-height: 100vh; }
.room-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
.room-title-area { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.room-badge { font-family: var(--font-serif); font-size: 1.2rem; color: var(--accent); }
.room-code-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.3rem 0.8rem; font-size: 0.85rem; color: var(--text-sub); }
.room-code-badge strong { color: var(--accent); letter-spacing: 0.1em; }
.player-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.lobby-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
.invite-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; text-align: center; max-width: 480px; width: 100%; box-shadow: var(--shadow); }
.invite-label { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; }
.invite-link { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.8rem; color: var(--text-sub); word-break: break-all; margin-bottom: 0.75rem; }
.invite-code-big { font-family: var(--font-serif); font-size: 3.5rem; font-weight: 700; color: var(--accent); letter-spacing: 0.3em; margin: 1rem 0 0.5rem; }
.invite-code-sub { font-size: 0.8rem; color: var(--text-muted); }
.lobby-footer { background: var(--surface); border-top: 1px solid var(--border); padding: 1.5rem; }
.footer-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
.select-group { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 160px; }
.select-group label { font-size: 0.8rem; color: var(--text-sub); letter-spacing: 0.05em; }
.scenario-preview { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
.preview-inner { display: flex; gap: 1rem; padding: 1rem; }
.preview-thumb { width: 120px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.preview-text { flex: 1; }
.preview-bg { font-size: 0.8rem; color: var(--text-sub); line-height: 1.5; margin-bottom: 0.75rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.preview-roles { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.5rem; }
.role-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 0.2rem 0.5rem; font-size: 0.75rem; color: var(--text-sub); }
.preview-phases { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.phase-chip { background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.2); border-radius: 6px; padding: 0.2rem 0.5rem; font-size: 0.7rem; color: var(--accent); }

/* 게임 */
.game-layout { display: flex; flex-direction: column; min-height: 100vh; }
.game-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
.teacher-header { background: #1a1a10; border-bottom-color: #3a3a20; }
.game-room-name { font-family: var(--font-serif); font-size: 1.1rem; color: var(--accent); }
.game-phase-badge { background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.3); border-radius: 20px; padding: 0.4rem 1rem; font-size: 0.85rem; color: var(--accent); }
.game-main { flex: 1; padding: 1.5rem; max-width: 800px; margin: 0 auto; width: 100%; }
.role-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 1.5rem; overflow: hidden; animation: cardIn 0.5s ease-out; }
.role-card.culprit { border-color: var(--culprit); box-shadow: 0 0 30px var(--culprit-glow); }
@keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.role-card-inner { padding: 2rem; text-align: center; }
.role-icon { font-size: 3.5rem; margin-bottom: 0.75rem; }
.role-name { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
.culprit-badge { display: inline-block; background: var(--culprit); color: #fff; padding: 0.3rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 700; margin-bottom: 1rem; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.role-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.6; }
.culprit-info { margin-top: 1.5rem; background: rgba(232,93,93,0.08); border: 1px solid rgba(232,93,93,0.2); border-radius: 12px; padding: 1rem; text-align: left; }
.culprit-hint-title { font-size: 0.8rem; letter-spacing: 0.1em; color: var(--culprit); text-transform: uppercase; margin-bottom: 0.5rem; }
.culprit-hint { font-size: 0.9rem; color: #ffaaaa; line-height: 1.6; }
.scenario-section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 1.5rem; animation: cardIn 0.5s ease-out 0.1s both; }
.scenario-img { width: 100%; height: 200px; object-fit: cover; display: block; }
.scenario-bg-text { padding: 1.5rem; font-family: var(--font-serif); font-size: 0.95rem; line-height: 1.8; color: var(--text-sub); }
.phase-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; animation: cardIn 0.5s ease-out 0.2s both; transition: border-color 0.3s; }
.phase-panel.phase-updated { border-color: var(--accent); box-shadow: 0 0 20px rgba(200,169,110,0.2); }
.phase-title { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 0.75rem; }
.phase-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.7; }

/* 교사 컨트롤 */
.teacher-mode { background: #0a0a08; }
.teacher-main { flex: 1; padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-content: start; max-width: 1000px; margin: 0 auto; width: 100%; }
@media(max-width:640px){.teacher-main{grid-template-columns:1fr}}
.teacher-phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; grid-column: span 2; }
@media(max-width:640px){.teacher-phase-card{grid-column:span 1}}
.teacher-phase-label { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
.teacher-phase-name { font-family: var(--font-serif); font-size: 1.5rem; color: var(--accent); margin-bottom: 0.5rem; }
.teacher-phase-desc { color: var(--text-sub); font-size: 0.9rem; line-height: 1.6; }
.teacher-phase-timer { font-size: 1.5rem; font-family: var(--font-serif); color: var(--accent2); margin-top: 0.75rem; }
.teacher-roles { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1rem; overflow-y: auto; max-height: 300px; }
.teacher-role-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.5rem; border-bottom: 1px solid var(--border); border-radius: 8px; }
.teacher-role-item:last-child { border-bottom: none; }
.teacher-role-item.is-culprit { background: rgba(232,93,93,0.08); }
.tr-icon { font-size: 1.3rem; }
.tr-name { font-weight: 700; flex: 1; }
.tr-role { font-size: 0.8rem; color: var(--text-sub); }
.tr-culprit { background: var(--culprit); color: #fff; padding: 0.1rem 0.5rem; border-radius: 10px; font-size: 0.75rem; font-weight: 700; }
.phase-steps { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1rem; overflow-y: auto; max-height: 300px; }
.step-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.5rem; border-radius: 8px; opacity: 0.5; }
.step-item.active { opacity: 1; background: rgba(200,169,110,0.1); }
.step-item.done { opacity: 0.3; text-decoration: line-through; }
.step-num { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
.step-item.active .step-num { background: var(--accent); color: #000; border-color: var(--accent); }
.step-title { font-size: 0.9rem; }
.step-dur { font-size: 0.75rem; color: var(--text-muted); }
.teacher-footer { background: var(--surface); border-top: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
.btn-phase-prev, .btn-phase-next { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.7rem 1.5rem; border-radius: var(--radius); cursor: pointer; font-family: var(--font-sans); font-size: 0.95rem; transition: all 0.2s; }
.btn-phase-prev:hover, .btn-phase-next:hover { border-color: var(--accent); color: var(--accent); }
.btn-end-game { background: linear-gradient(135deg, var(--culprit), #a03030); color: #fff; border: none; padding: 0.7rem 1.5rem; border-radius: var(--radius); cursor: pointer; font-family: var(--font-sans); font-size: 0.95rem; font-weight: 700; transition: all 0.2s; }
.btn-end-game:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,93,93,0.4); }

/* 대기 */
.waiting-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; gap: 1rem; }
.waiting-icon { font-size: 4rem; animation: float 3s ease-in-out infinite; }
.waiting-title { font-family: var(--font-serif); font-size: 1.8rem; }
.waiting-sub { color: var(--text-sub); font-size: 1rem; line-height: 1.7; }
.waiting-room { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 1.5rem; font-size: 0.9rem; color: var(--text-sub); margin-top: 1rem; }
.waiting-room strong { color: var(--accent); letter-spacing: 0.15em; }

/* 종료 */
.end-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 2rem; }
.end-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(232,93,93,0.15) 0%, transparent 70%); }
.end-content { text-align: center; z-index: 1; width: 100%; max-width: 500px; }
.end-title { font-family: var(--font-serif); font-size: 1rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }
.end-reveal { font-family: var(--font-serif); font-size: 2rem; margin-bottom: 1.5rem; color: var(--text-sub); }
.culprit-reveal-card { background: var(--surface); border: 2px solid var(--culprit); border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; box-shadow: 0 0 40px var(--culprit-glow); animation: cardIn 0.8s ease-out; }
.cr-icon { font-size: 4rem; margin-bottom: 0.75rem; }
.cr-names { font-family: var(--font-serif); font-size: 2rem; font-weight: 700; color: var(--culprit); margin-bottom: 1rem; }
.cr-reveal { color: var(--text-sub); font-size: 0.95rem; line-height: 1.7; }

/* 커스텀 에디터 */
.custom-editor { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
.custom-editor.hidden { display: none; }
.custom-section h3 { font-family: var(--font-serif); font-size: 1rem; color: var(--accent); margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
.custom-section h3:first-child { margin-top: 0; }
.custom-role-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.custom-phase-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem; margin-bottom: 0.5rem; }
.phase-item-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
.phase-num { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; color: var(--accent); }

/* 토스트 */
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem 1.5rem; font-size: 0.9rem; z-index: 9999; animation: toastIn 0.3s ease-out; white-space: nowrap; }
.toast-error { border-color: var(--culprit); color: #ffaaaa; }
.toast-success { border-color: var(--safe); color: #aaffcc; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.hidden { display: none !important; }
@media(max-width:480px){.landing-title{font-size:4rem}.modal-box{padding:1.5rem}.game-main{padding:1rem}}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

// =====================================================================
// 🔧 Supabase 설정 — supabase.com 프로젝트 → Settings → API 에서 복사
// =====================================================================
const SUPABASE_URL  = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON = "YOUR_ANON_KEY";

// 🔧 교사 비밀번호
const TEACHER_PASSWORD = "ekeownd2026!@";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// =====================================================================
// 시나리오 데이터
// =====================================================================
const scenarios = [
  {
    id: "school_theft",
    title: "🏫 학교의 비밀",
    genre: "학원 미스터리",

// Supabase helpers
async function dbGet(roomId) {
  const { data } = await sb.from("rooms").select("*").eq("id", roomId).single();
  return data;
}

async function dbSet(roomId, payload) {
  await sb.from("rooms").upsert({ id: roomId, ...payload });
}

async function dbUpdate(roomId, payload) {
  await sb.from("rooms").update(payload).eq("id", roomId);
}

async function dbAddPlayer(roomId, playerName) {
  const playerId = Math.random().toString(36).substr(2, 10);
  const { data } = await sb.from("rooms").select("players").eq("id", roomId).single();
  const players = data?.players || {};
  players[playerId] = { name: playerName, joinedAt: Date.now() };
  await sb.from("rooms").update({ players }).eq("id", roomId);
  return playerId;
}

// Realtime 구독: rooms 테이블의 특정 row 변화 감시
// callback(newRow) 형태로 호출됨
function listen(roomId, callback) {
  const channel = sb.channel(`room-${roomId}`)
    .on("postgres_changes", {
      event: "UPDATE",
      schema: "public",
      table: "rooms",
      filter: `id=eq.${roomId}`
    }, (payload) => callback(payload.new))
    .subscribe();
  state.unsubscribers.push(() => sb.removeChannel(channel));
  return channel;
}

function cleanup() {
  state.unsubscribers.forEach(fn => fn());
  state.unsubscribers = [];
}

function generateRoomId() {
  return Math.random().toString(36).substr(2, 6).toUpperCase();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function toast(msg, type = "info") {
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// =====================================================================
// 렌더러 — innerHTML 교체 후 동기적으로 바인딩
// =====================================================================
function render(view, data = {}) {
  cleanup();
  state.view = view;
  document.getElementById("app").innerHTML = views[view](data);
  afterRender[view] && afterRender[view](data);
}

  },

  teacher_login() {

    document.getElementById("btn-back").onclick = () => render("landing");

    const doConfirm = () => {
      if (input.value === TEACHER_PASSWORD) {
        render("teacher_setup");
      } else {
        toast("비밀번호가 틀렸습니다.", "error");
        input.value = "";
        input.focus();
      }
    };

    document.getElementById("btn-pw-confirm").onclick = doConfirm;
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") doConfirm(); });
    // 렌더 완료 후 포커스
    input.focus();
  },

  student_join() {
    const roomInput = document.getElementById("join-room-id");
    const nameInput = document.getElementById("join-name");
    document.getElementById("btn-back").onclick = () => render("landing");
    roomInput.addEventListener("input", function() { this.value = this.value.toUpperCase(); });
    roomInput.focus();

    document.getElementById("btn-join").onclick = async () => {
      const code = roomInput.value.trim().toUpperCase();
      const name = nameInput.value.trim();
      if (!code || code.length < 6) return toast("방 코드를 확인하세요.", "error");
      if (!name) return toast("이름을 입력하세요.", "error");

      const roomData = await dbGet(code);
      if (!roomData) return toast("존재하지 않는 방입니다.", "error");
      if (roomData.status === "playing") return toast("이미 진행 중인 게임입니다.", "error");

      state.roomId = code;
      state.playerName = name;
      state.isTeacher = false;

      state.playerId = await dbAddPlayer(code, name);

      document.getElementById("app").innerHTML = `
        <div class="waiting-screen">
          <div class="waiting-icon">⏳</div>
          <div class="waiting-title">대기 중...</div>
          <div class="waiting-sub">안녕하세요, <strong>${name}</strong>님!<br>선생님이 게임을 시작할 때까지 기다려주세요.</div>
          <div class="waiting-room">방 코드: <strong>${code}</strong></div>
        </div>`;

      listen(code, async (room) => {
        if (room.status === "playing") {
          const myAssign = room.assignments?.[state.playerId];
          const sc = scenarios.find(s => s.id === room.scenario_id) || room.custom_scenario;
          const role = myAssign?.isCulprit
            ? { icon: sc.culpritRole.icon, name: sc.culpritRole.name, description: sc.culpritRole.hint }
            : sc.roles.find(r => r.id === myAssign?.roleId) || sc.roles[0];

          state.scenario = sc;
          state.myRole = role;
          state.isCulprit = myAssign?.isCulprit || false;

          render("game_player", {
            roomName: room.name,
            phaseName: sc.phases[0]?.title || "시작",
            roleIcon: role.icon || "👤",
            roleName: role.name,
            roleDesc: role.description,
            isCulprit: state.isCulprit,
            culpritHint: sc.culpritRole.hint,
            thumbnail: sc.thumbnail,
            background: sc.background
          });
        }
        if (room.status === "ended") {
          const sc = state.scenario || scenarios.find(s => s.id === room.scenario_id);
          const culpritNames = (room.culprit_ids || []).map(id => room.players?.[id]?.name || "?").join(", ");
          render("game_end", { culpritIcon: sc?.culpritRole?.icon || "🦹", culpritNames, culpritReveal: sc?.culpritRole?.reveal || "" });
        }
      });
    };
  },

  teacher_setup() {
    document.getElementById("btn-back").onclick = () => render("landing");
    document.getElementById("room-name-input").focus();

    document.getElementById("btn-create-room").onclick = async () => {
      const roomName = document.getElementById("room-name-input").value.trim();
      const teacherName = document.getElementById("teacher-name-input").value.trim();
      if (!roomName) return toast("방 이름을 입력하세요.", "error");
      if (!teacherName) return toast("선생님 이름을 입력하세요.", "error");

      state.roomId = generateRoomId();
      state.playerName = teacherName;
      state.isTeacher = true;

      await dbSet(state.roomId, { name: roomName, teacher_name: teacherName, status: "waiting", created_at: new Date().toISOString(), players: {}, scenario_id: null, culprit_ids: null, assignments: null, current_phase: 0, custom_scenario: null });
      render("room_lobby", { roomName });
    };
  },

  room_lobby(d) {
    const link = `${location.origin}${location.pathname}?room=${state.roomId}`;
    document.getElementById("invite-link-text").textContent = link;

    document.getElementById("btn-copy-link").onclick = () => {
      navigator.clipboard.writeText(link);
      toast("링크가 복사되었습니다! 📋", "success");
    };

    listen(state.roomId, (room) => {
      const players = room.players || {};
      const el = document.getElementById("player-list");
      if (!el) return;
      el.innerHTML = Object.values(players).map(p => `<span class="chip">${p.name}</span>`).join("") || `<span class="chip chip-ghost">대기중...</span>`;
    });

    const scenarioSelect = document.getElementById("scenario-select");
    const updatePreview = () => {
      const sc = scenarios.find(s => s.id === scenarioSelect.value);
      const preview = document.getElementById("scenario-preview");
      const customEditor = document.getElementById("custom-editor");
      if (sc.isCustom) {
        preview.classList.add("hidden");
        customEditor.classList.remove("hidden");
        customEditor.innerHTML = renderCustomEditor();
        bindCustomEditor();
      } else {
        customEditor.classList.add("hidden");
        preview.classList.remove("hidden");
        preview.innerHTML = `<div class="preview-inner">${sc.thumbnail ? `<img class="preview-thumb" src="${sc.thumbnail}" alt="">` : ""}<div class="preview-text"><div class="preview-bg">${sc.background.replace(/\n/g, " ")}</div><div class="preview-roles">${sc.roles.map(r => `<span class="role-chip">${r.icon} ${r.name}</span>`).join("")}</div><div class="preview-phases">${sc.phases.map((p, i) => `<div class="phase-chip">${i+1}. ${p.title}</div>`).join("")}</div></div></div>`;
      }
    };
    scenarioSelect.onchange = updatePreview;
    updatePreview();

    document.getElementById("btn-start-game").onclick = async () => {
      const roomDataForStart = await dbGet(state.roomId);
      const players = roomDataForStart?.players || {};
      const playerIds = Object.keys(players);
      if (playerIds.length < 2) return toast("최소 2명 이상의 학생이 입장해야 합니다.", "error");

      const scenarioId = scenarioSelect.value;
      const culpritCount = parseInt(document.getElementById("culprit-count").value);
      const sc = scenarios.find(s => s.id === scenarioId);

      if (!confirm(`총 ${playerIds.length}명 확인. "${sc.title}" 시나리오로 시작할까요?`)) return;

      const shuffledIds = shuffle(playerIds);
      const culpritIds = shuffledIds.slice(0, culpritCount);
      const availableRoles = shuffle([...sc.roles]);
      const assignments = {};
      shuffledIds.forEach((id, idx) => {
        assignments[id] = { isCulprit: culpritIds.includes(id), roleId: availableRoles[idx % availableRoles.length]?.id || sc.roles[0]?.id };
      });

      let updateData = { status: "playing", scenario_id: scenarioId, culprit_ids: culpritIds, assignments, current_phase: 0, custom_scenario: null };
      if (sc.isCustom) updateData.custom_scenario = getCustomScenarioData();

      await dbUpdate(state.roomId, updateData);
      const roomForTeacher = await dbGet(state.roomId);
      render("game_teacher", { roomName: roomForTeacher.name });
    };
  },

  game_player(d) {
    listen(state.roomId, (room) => {
      const phaseIdx = room.current_phase || 0;
      const phase = state.scenario?.phases?.[phaseIdx];
      if (phase) {
        const el = document.getElementById("phase-title");
        const el2 = document.getElementById("phase-desc");
        const badge = document.getElementById("phase-badge");
        const panel = document.getElementById("phase-panel");
        if (el) el.textContent = phase.title;
        if (el2) el2.textContent = phase.description;
        if (badge) badge.textContent = `${phaseIdx + 1}단계 — ${phase.title}`;
        if (panel) { panel.classList.add("phase-updated"); setTimeout(() => panel.classList.remove("phase-updated"), 1000); }
      }
      if (room.status === "ended") {
        const sc = state.scenario;
        const culpritNames = (room.culprit_ids || []).map(id => room.players?.[id]?.name || "?").join(", ");
        render("game_end", { culpritIcon: sc?.culpritRole?.icon || "🦹", culpritNames, culpritReveal: sc?.culpritRole?.reveal || "" });
      }
    });
  },

  game_teacher(d) {
    let phaseIndex = 0;
    let timerInterval = null;

    const refreshUI = async () => {
      const room = await dbGet(state.roomId);
      const sc = scenarios.find(s => s.id === room.scenario_id) || room.custom_scenario;
      const phase = sc?.phases?.[phaseIndex];

      const nameEl = document.getElementById("t-phase-name");
      const descEl = document.getElementById("t-phase-desc");
      const timerEl = document.getElementById("t-phase-timer");
      if (nameEl) nameEl.textContent = phase ? `${phaseIndex + 1}단계: ${phase.title}` : "전체 자유 토론";
      if (descEl) descEl.textContent = phase?.description || "";

      if (timerInterval) clearInterval(timerInterval);
      if (phase?.duration && timerEl) {
        let remaining = phase.duration;
        const tick = () => {
          const m = String(Math.floor(remaining / 60)).padStart(2, "0");
          const s = String(remaining % 60).padStart(2, "0");
          timerEl.textContent = remaining > 0 ? `⏱️ ${m}:${s}` : "⏱️ 종료";
          if (remaining > 0) remaining--;
          else clearInterval(timerInterval);
        };
        tick();
        timerInterval = setInterval(tick, 1000);
      }

      const stepsEl = document.getElementById("phase-steps");
      if (stepsEl && sc?.phases) {
        stepsEl.innerHTML = sc.phases.map((p, i) => `<div class="step-item ${i === phaseIndex ? "active" : i < phaseIndex ? "done" : ""}"><div class="step-num">${i + 1}</div><div class="step-info"><div class="step-title">${p.title}</div>${p.duration ? `<div class="step-dur">${Math.floor(p.duration/60)}분</div>` : ""}</div></div>`).join("");
      }

      const rolesEl = document.getElementById("teacher-roles-list");
      if (rolesEl && room.players && room.assignments) {
        rolesEl.innerHTML = Object.entries(room.players || {}).map(([id, p]) => {
          const assign = room.assignments[id];
          const role = sc?.roles.find(r => r.id === assign?.roleId);
          return `<div class="teacher-role-item ${assign?.isCulprit ? "is-culprit" : ""}"><span class="tr-icon">${role?.icon || "👤"}</span><span class="tr-name">${p.name}</span><span class="tr-role">${role?.name || "—"}</span>${assign?.isCulprit ? `<span class="tr-culprit">🦹 범인</span>` : ""}</div>`;
        }).join("");
      }

      const chipsEl = document.getElementById("player-list-game");
      if (chipsEl && room.players) {
        chipsEl.innerHTML = Object.values(room.players).map(p => `<span class="chip small">${p.name}</span>`).join("");
      }
    };

    refreshUI();

    document.getElementById("btn-next-phase").onclick = async () => {
      const roomForNext = await dbGet(state.roomId);
      const sc = scenarios.find(s => s.id === roomForNext.scenario_id) || roomForNext.custom_scenario;
      if (phaseIndex < (sc?.phases?.length || 1) - 1) {
        phaseIndex++;
        await dbUpdate(state.roomId, { current_phase: phaseIndex });
        refreshUI();
      } else {
        toast("마지막 단계입니다. 게임 종료 버튼을 누르세요.", "info");
      }
    };

    document.getElementById("btn-prev-phase").onclick = async () => {
      if (phaseIndex > 0) { phaseIndex--; await dbUpdate(state.roomId, { current_phase: phaseIndex }); refreshUI(); }
    };

    document.getElementById("btn-end-game").onclick = async () => {
      if (!confirm("게임을 종료하고 범인을 공개할까요?")) return;
      await dbUpdate(state.roomId, { status: "ended" });
      const roomEnd = await dbGet(state.roomId);
      const sc = scenarios.find(s => s.id === roomEnd.scenario_id) || roomEnd.custom_scenario;
      const culpritNames = (roomEnd.culprit_ids || []).map(id => roomEnd.players?.[id]?.name || "?").join(", ");
      render("game_end", { culpritIcon: sc?.culpritRole?.icon || "🦹", culpritNames, culpritReveal: sc?.culpritRole?.reveal || "" });
    };
  },

  game_end() {
    document.getElementById("btn-restart").onclick = () => {
      state = { view: "landing", roomId: null, playerName: "", isTeacher: false, playerId: null, scenario: null, myRole: null, isCulprit: false, unsubscribers: [] };
      render("landing");
    };
  }
};

// =====================================================================
// 커스텀 시나리오 에디터
// =====================================================================
let customPhases = [{ title: "", description: "", duration: 120 }];
let customRoles = [{ name: "", icon: "👤", description: "" }];

function renderCustomEditor() {
  return `<div class="custom-section">
    <h3>📖 기본 정보</h3>
    <input type="text" id="c-title" class="text-input" placeholder="시나리오 제목">
    <textarea id="c-background" class="textarea-input" placeholder="배경 스토리" rows="4"></textarea>
    <input type="url" id="c-thumbnail" class="text-input" placeholder="이미지 URL (선택)">
    <h3>🎭 역할 설정</h3>
    <div id="custom-roles-list">${customRoles.map((r, i) => `<div class="custom-role-item" data-idx="${i}"><input type="text" class="text-input cr-icon" placeholder="이모지" value="${r.icon}" maxlength="2" style="width:60px;flex-shrink:0"><input type="text" class="text-input cr-name" placeholder="역할 이름" style="flex:1"><input type="text" class="text-input cr-desc" placeholder="역할 설명" style="flex:2"><button class="btn-remove-role">✕</button></div>`).join("")}</div>
    <button class="btn-add-item" id="btn-add-role">+ 역할 추가</button>
    <h3>🦹 범인 역할</h3>
    <input type="text" id="c-culprit-name" class="text-input" placeholder="범인 역할 이름">
    <textarea id="c-culprit-hint" class="textarea-input" placeholder="범인에게만 보이는 힌트" rows="3"></textarea>
    <textarea id="c-culprit-reveal" class="textarea-input" placeholder="게임 종료 시 공개 해설" rows="3"></textarea>
    <h3>📋 진행 단계</h3>
    <div id="custom-phases-list">${customPhases.map((p, i) => `<div class="custom-phase-item" data-idx="${i}"><div class="phase-item-row"><div class="phase-num">${i+1}</div><input type="text" class="text-input cp-title" placeholder="단계 이름" value="${p.title}" style="flex:1"><input type="number" class="text-input cp-duration" placeholder="시간(초)" value="${p.duration}" style="width:100px;flex-shrink:0"><button class="btn-remove-phase">✕</button></div><textarea class="textarea-input cp-desc" placeholder="학생 안내 내용" rows="2">${p.description}</textarea></div>`).join("")}</div>
    <button class="btn-add-item" id="btn-add-phase">+ 단계 추가</button>
  </div>`;
}

function bindCustomEditor() {
  document.getElementById("btn-add-role")?.addEventListener("click", () => {
    customRoles.push({ name: "", icon: "👤", description: "" });
    document.getElementById("custom-editor").innerHTML = renderCustomEditor();
    bindCustomEditor();
  });
  document.getElementById("btn-add-phase")?.addEventListener("click", () => {
    customPhases.push({ title: "", description: "", duration: 120 });
    document.getElementById("custom-editor").innerHTML = renderCustomEditor();
    bindCustomEditor();
  });
  document.querySelectorAll(".btn-remove-role").forEach(btn => {
    btn.onclick = () => { customRoles.splice(parseInt(btn.closest(".custom-role-item").dataset.idx), 1); document.getElementById("custom-editor").innerHTML = renderCustomEditor(); bindCustomEditor(); };
  });
  document.querySelectorAll(".btn-remove-phase").forEach(btn => {
    btn.onclick = () => { customPhases.splice(parseInt(btn.closest(".custom-phase-item").dataset.idx), 1); document.getElementById("custom-editor").innerHTML = renderCustomEditor(); bindCustomEditor(); };
  });
}

function getCustomScenarioData() {
  const roles = [...document.querySelectorAll(".custom-role-item")].map((el, i) => ({ id: `cr_${i}`, name: el.querySelector(".cr-name")?.value || `역할${i+1}`, icon: el.querySelector(".cr-icon")?.value || "👤", description: el.querySelector(".cr-desc")?.value || "" }));
  const phases = [...document.querySelectorAll(".custom-phase-item")].map(el => ({ title: el.querySelector(".cp-title")?.value || "단계", description: el.querySelector(".cp-desc")?.value || "", duration: parseInt(el.querySelector(".cp-duration")?.value || "120") }));
  return { id: "custom", title: document.getElementById("c-title")?.value || "커스텀", thumbnail: document.getElementById("c-thumbnail")?.value || "", background: document.getElementById("c-background")?.value || "", roles, phases, culpritRole: { name: document.getElementById("c-culprit-name")?.value || "범인", icon: "🦹", hint: document.getElementById("c-culprit-hint")?.value || "", reveal: document.getElementById("c-culprit-reveal")?.value || "" } };
}

// =====================================================================
// 진입점
// =====================================================================
const params = new URLSearchParams(location.search);
const roomCode = params.get("room");
if (roomCode) {
  render("student_join");
  setTimeout(() => {
    const input = document.getElementById("join-room-id");
    if (input) { input.value = roomCode.toUpperCase(); input.focus(); }
  }, 50);
} else {
  render("landing");
}
</script>

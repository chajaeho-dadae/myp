<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보난자 (Bohnanza) - 솔로 연습 모드</title>
    <style>
        :root {
            --bg-color: #f4e8c1;
            --field-bg: #8b5a2b;
            --card-border: #333;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 5px; color: #5c3a21; }
        .subtitle { margin-bottom: 20px; font-size: 0.9rem; color: #666; }

        #game-board {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            background: #f1c40f;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* 밭 (Fields) */
        #fields-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .field {
            flex: 1;
            background-color: var(--field-bg);
            border: 3px dashed #5c3a21;
            border-radius: 10px;
            min-height: 180px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
        }

        .field h3 { margin-top: 0; }
        
        .field-cards {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            height: 100px;
        }

        .field-card {
            background: white;
            color: black;
            border: 2px solid var(--card-border);
            border-radius: 5px;
            width: 60px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: absolute;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .btn-harvest {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-harvest:hover { background-color: #d35400; }
        .btn-harvest:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* 핸드 (Hand) */
        #hand-container {
            background: #e9ecef;
            padding: 15px;
            border-radius: 10px;
        }

        .hand-title {
            margin-top: 0;
            color: #c0392b;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        #hand-cards {
            display: flex;
            overflow-x: auto;
            gap: 5px;
            padding: 10px 0;
            min-height: 120px;
        }

        .card {
            flex: 0 0 70px;
            height: 100px;
            background: white;
            border: 2px solid var(--card-border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            position: relative;
            user-select: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .card-rates {
            font-size: 0.7rem;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }

        .card.first-card {
            border-color: #27ae60;
            border-width: 3px;
            box-shadow: 0 0 10px #27ae60;
            cursor: pointer;
            transform: translateY(-5px);
        }

        .card.first-card:hover { background-color: #e8f8f5; }

        #controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        button.action-btn {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
        }
        button.action-btn:hover { background-color: #2980b9; }
        
        #log {
            margin-top: 15px;
            padding: 10px;
            background: #eee;
            border-radius: 5px;
            font-size: 0.9rem;
            height: 60px;
            overflow-y: auto;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>보난자 (Bohnanza)</h1>
    <div class="subtitle">솔로 연습 모드: 첫 번째 카드만 심을 수 있습니다. 순서를 바꿀 수 없습니다!</div>

    <div id="game-board">
        <div id="status-bar">
            <span>남은 덱: <span id="deck-count">0</span>장</span>
            <span>획득한 금화: <span id="coins-count">0</span> 개</span>
        </div>

        <div id="fields-container">
            <div class="field" id="field-0">
                <h3>제 1 밭</h3>
                <div class="field-cards" id="field-0-cards"></div>
                <div id="field-0-info">비어있음</div>
                <button class="btn-harvest" id="btn-harvest-0" onclick="harvest(0)" style="margin-top: 10px;" disabled>수확하기</button>
            </div>
            <div class="field" id="field-1">
                <h3>제 2 밭</h3>
                <div class="field-cards" id="field-1-cards"></div>
                <div id="field-1-info">비어있음</div>
                <button class="btn-harvest" id="btn-harvest-1" onclick="harvest(1)" style="margin-top: 10px;" disabled>수확하기</button>
            </div>
        </div>

        <div id="hand-container">
            <div class="hand-title">내 핸드 (※ 절대로 카드의 순서를 바꿀 수 없습니다. 가장 왼쪽 카드부터 심어야 합니다.)</div>
            <div id="hand-cards">
                </div>
            <div id="controls">
                <button class="action-btn" onclick="plantFirstCard()">맨 앞 카드 심기 (클릭)</button>
                <button class="action-btn" style="background-color: #9b59b6;" onclick="drawCardsToHand()">턴 종료 (카드 3장 뽑기)</button>
            </div>
        </div>

        <div id="log">게임을 시작합니다. 맨 앞의 카드를 밭에 심어주세요.</div>
    </div>

    <script>
        // 콩 종류 및 금화 교환 비율 (필요 장수) [1동전, 2동전, 3동전, 4동전]
        const BEAN_TYPES = {
            '커피콩': { total: 24, rates: [4, 7, 10, 12], color: '#3e2723' },
            '왁스콩': { total: 22, rates: [4, 7, 9, 11], color: '#f39c12' },
            '푸른콩': { total: 20, rates: [4, 6, 8, 10], color: '#2980b9' },
            '칠리콩': { total: 18, rates: [3, 6, 8, 9], color: '#c0392b' }
        };

        let deck = [];
        let hand = [];
        let fields = [
            { type: null, count: 0 },
            { type: null, count: 0 }
        ];
        let coins = 0;

        // 게임 초기화
        function initGame() {
            // 덱 생성
            for (let type in BEAN_TYPES) {
                for (let i = 0; i < BEAN_TYPES[type].total; i++) {
                    deck.push(type);
                }
            }
            // 셔플
            deck.sort(() => Math.random() - 0.5);

            // 초기 패 5장 지급
            for (let i = 0; i < 5; i++) {
                hand.push(deck.pop());
            }

            updateUI();
        }

        // 로그 찍기
        function logMsg(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
        }

        // 특정 밭에 심을 수 있는지 확인
        function canPlant(beanType, fieldIndex) {
            if (fields[fieldIndex].type === null) return true; // 빈 밭
            if (fields[fieldIndex].type === beanType) return true; // 같은 콩
            return false;
        }

        // 맨 앞 카드 심기
        function plantFirstCard() {
            if (hand.length === 0) {
                alert("핸드에 카드가 없습니다!");
                return;
            }

            const beanToPlant = hand[0];
            
            // 어디에 심을지 결정 (자동 판별 또는 유저 선택)
            let targetField = -1;
            
            if (canPlant(beanToPlant, 0) && canPlant(beanToPlant, 1)) {
                // 둘 다 빈 밭이거나 같은 콩이면 1번 밭 우선
                targetField = fields[0].type === beanToPlant ? 0 : (fields[1].type === beanToPlant ? 1 : 0);
            } else if (canPlant(beanToPlant, 0)) {
                targetField = 0;
            } else if (canPlant(beanToPlant, 1)) {
                targetField = 1;
            } else {
                alert(`밭에 빈자리가 없습니다! [${beanToPlant}]을(를) 심으려면 먼저 기존 밭 중 하나를 수확해야 합니다.`);
                return;
            }

            // 심기 실행
            hand.shift(); // 맨 앞 카드 제거
            fields[targetField].type = beanToPlant;
            fields[targetField].count++;
            
            logMsg(`${targetField + 1}번 밭에 [${beanToPlant}]을(를) 심었습니다.`);
            updateUI();
        }

        // 밭 수확 로직
        function harvest(fieldIndex) {
            const field = fields[fieldIndex];
            if (field.count === 0) return;

            const rates = BEAN_TYPES[field.type].rates;
            let earnedCoins = 0;

            // 금화 계산 로직
            if (field.count >= rates[3]) earnedCoins = 4;
            else if (field.count >= rates[2]) earnedCoins = 3;
            else if (field.count >= rates[1]) earnedCoins = 2;
            else if (field.count >= rates[0]) earnedCoins = 1;

            coins += earnedCoins;
            logMsg(`🌱 ${fieldIndex + 1}번 밭을 수확하여 금화 ${earnedCoins}개를 얻었습니다! (콩 ${field.count}개)`);

            // 밭 초기화
            fields[fieldIndex].type = null;
            fields[fieldIndex].count = 0;

            updateUI();
        }

        // 턴 종료 (카드 3장 덱에서 뽑아 맨 뒤에 넣기)
        function drawCardsToHand() {
            if (deck.length === 0) {
                alert("덱이 모두 떨어졌습니다! 게임 종료.");
                return;
            }

            let drawCount = Math.min(3, deck.length);
            for (let i = 0; i < drawCount; i++) {
                hand.push(deck.pop());
            }
            logMsg(`턴을 종료하고 덱에서 카드 ${drawCount}장을 뽑아 핸드 맨 뒤에 추가했습니다.`);
            updateUI();
        }

        // UI 갱신
        function updateUI() {
            document.getElementById('deck-count').innerText = deck.length;
            document.getElementById('coins-count').innerText = coins;

            // 밭 갱신
            for (let i = 0; i < 2; i++) {
                const fieldCardsDiv = document.getElementById(`field-${i}-cards`);
                const fieldInfoDiv = document.getElementById(`field-${i}-info`);
                const harvestBtn = document.getElementById(`btn-harvest-${i}`);
                
                fieldCardsDiv.innerHTML = '';
                
                if (fields[i].type !== null) {
                    fieldInfoDiv.innerHTML = `<strong>${fields[i].type}</strong> (${fields[i].count}장)`;
                    harvestBtn.disabled = false;

                    // 겹쳐진 카드 비주얼 생성
                    for(let j=0; j<fields[i].count; j++) {
                        let cardDiv = document.createElement('div');
                        cardDiv.className = 'field-card';
                        cardDiv.style.top = `${j * 15}px`;
                        cardDiv.style.color = BEAN_TYPES[fields[i].type].color;
                        cardDiv.innerText = fields[i].type;
                        fieldCardsDiv.appendChild(cardDiv);
                    }
                } else {
                    fieldInfoDiv.innerText = '비어있음';
                    harvestBtn.disabled = true;
                }
            }

            // 핸드 갱신
            const handCardsDiv = document.getElementById('hand-cards');
            handCardsDiv.innerHTML = '';
            
            hand.forEach((bean, index) => {
                let cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                if (index === 0) {
                    cardDiv.classList.add('first-card');
                    cardDiv.onclick = plantFirstCard; // 맨 앞 카드만 클릭 심기 가능
                }

                let nameSpan = document.createElement('span');
                nameSpan.innerText = bean;
                nameSpan.style.color = BEAN_TYPES[bean].color;

                let rateSpan = document.createElement('div');
                rateSpan.className = 'card-rates';
                // 비율 표시 (예: 4장-1원, 7장-2원...)
                let r = BEAN_TYPES[bean].rates;
                rateSpan.innerText = `${r[0]}▶1 ${r[1]}▶2\n${r[2]}▶3 ${r[3]}▶4`;

                cardDiv.appendChild(nameSpan);
                cardDiv.appendChild(rateSpan);
                handCardsDiv.appendChild(cardDiv);
            });
        }

        // 실행
        window.onload = initGame;
    </script>
</body>
</html>

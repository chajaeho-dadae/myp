<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나와 잘 맞는 헤어스타일 추천</title>

  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding:40px;
    }

    .box{
      background:white;
      max-width:500px;
      margin:auto;
      padding:30px;
      border-radius:20px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      color:#333;
    }

    button{
      display:block;
      width:100%;
      margin:10px 0;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#4CAF50;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#45a049;
    }

    #result{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      color:#222;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>나와 잘 맞는 헤어스타일 추천</h1>

  <div id="questionBox">
    <h2 id="question"></h2>

    <button onclick="choose(0)" id="btn0"></button>
    <button onclick="choose(1)" id="btn1"></button>
    <button onclick="choose(2)" id="btn2"></button>
  </div>

  <div id="result"></div>
</div>

<script>

const questions = [
  {
    question: "당신의 얼굴형은?",
    answers: [
      "둥근형",
      "긴형",
      "각진형"
    ]
  },

  {
    question: "원하는 분위기는?",
    answers: [
      "귀여운 느낌",
      "깔끔한 느낌",
      "시크한 느낌"
    ]
  },

  {
    question: "머리 손질은 얼마나 가능한가요?",
    answers: [
      "거의 안 함",
      "조금 가능",
      "매일 가능"
    ]
  }
];

let current = 0;
let picks = [];

showQuestion();

function showQuestion(){

  document.getElementById("question").innerText =
    questions[current].question;

  document.getElementById("btn0").innerText =
    questions[current].answers[0];

  document.getElementById("btn1").innerText =
    questions[current].answers[1];

  document.getElementById("btn2").innerText =
    questions[current].answers[2];
}

function choose(num){

  picks.push(num);

  current++;

  if(current < questions.length){
    showQuestion();
  }
  else{
    showResult();
  }
}

function showResult(){

  document.getElementById("questionBox").style.display = "none";

  let result = "";

  // 간단한 추천 알고리즘
  if(picks[0] == 0){
    result = "추천 헤어스타일: 쉐도우펌 ✨";
  }
  else if(picks[0] == 1){
    result = "추천 헤어스타일: 리프컷 ✨";
  }
  else{
    result = "추천 헤어스타일: 다운펌 + 가르마펌 ✨";
  }

  document.getElementById("result").innerText = result;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>축구복싱26</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#222;
    font-family:'맑은 고딕';
}

canvas{
    display:block;
    background:#444;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:20px;
    z-index:10;
}

#shop{
    position:absolute;
    top:70px;
    left:10px;
    background:rgba(0,0,0,0.8);
    padding:10px;
    color:white;
    border-radius:10px;
    width:250px;
}

button{
    margin:4px;
    padding:6px 10px;
    font-size:16px;
}

#select{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:20px;
    border-radius:15px;
    color:white;
    text-align:center;
}
</style>
</head>
<body>

<div id="ui">
    돈: <span id="money">0</span>원<br>
    라운드: <span id="round">1</span>/3<br>
    남은 시간: <span id="time">60</span>
</div>

<div id="shop">
    <b>상점</b><br>
    <button onclick="buy('네이마르',50)">네이마르 (50)</button><br>
    <button onclick="buy('음바페',80)">음바페 (80)</button><br>
    <button onclick="buy('손흥민',100)">손흥민 (100)</button><br><br>

    <b>보유 선수</b><br>
    <div id="owned"></div>
</div>

<div id="select">
    <h1>축구복싱26</h1>
    <p>선수를 선택하세요</p>
    <button onclick="startGame('메시')">메시</button>
    <button onclick="startGame('호날두')">호날두</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let money = 0;
let owned = ["메시","호날두"];
let playerName = "";
let round = 1;
let timeLeft = 60;
let timer;

const moneyText = document.getElementById("money");
const roundText = document.getElementById("round");
const timeText = document.getElementById("time");
const ownedDiv = document.getElementById("owned");

function updateOwned(){
    ownedDiv.innerHTML = "";
    owned.forEach(name=>{
        let btn = document.createElement("button");
        btn.innerText = name + " 선택";
        btn.onclick = ()=>startGame(name);
        ownedDiv.appendChild(btn);
    });
}
updateOwned();

function buy(name, price){
    if(money >= price && !owned.includes(name)){
        money -= price;
        owned.push(name);
        moneyText.innerText = money;
        updateOwned();
        alert(name + " 구매 완료!");
    }
}

class Fighter{
    constructor(x,color,name){
        this.x = x;
        this.y = 500;
        this.w = 60;
        this.h = 120;
        this.color = color;
        this.hp = 100;
        this.block = false;
        this.kick = false;
        this.taunt = false;
        this.name = name;
        this.velY = 0;
        this.grounded = true;
    }

    draw(){
        ctx.fillStyle = this.color;

        // 몸
        ctx.fillRect(this.x,this.y,this.w,this.h);

        // 머리
        ctx.fillStyle = "#ffd1a4";
        ctx.fillRect(this.x+15,this.y-30,30,30);

        // 막기
        if(this.block){
            ctx.fillStyle="cyan";
            ctx.fillRect(this.x-10,this.y+20,10,60);
        }

        // 발차기
        if(this.kick){
            ctx.fillStyle="yellow";
            ctx.fillRect(this.x+60,this.y+70,30,10);
        }

        // 도발
        if(this.taunt){
            ctx.fillStyle="pink";
            ctx.fillText("강남스타일!",this.x-20,this.y-50);
        }

        // 이름
        ctx.fillStyle="white";
        ctx.fillText(this.name,this.x,this.y-40);

        // 체력
        ctx.fillStyle="red";
        ctx.fillRect(this.x,this.y-15,this.hp,10);
    }

    update(){
        this.y += this.velY;
        this.velY += 0.7;

        if(this.y >= 500){
            this.y = 500;
            this.velY = 0;
            this.grounded = true;
        }

        if(this.block){
            this.hp -= 0.02;
        }
    }
}

let player;
let enemy;
let keys = {};

function startGame(name){
    playerName = name;

    document.getElementById("select").style.display="none";

    player = new Fighter(200,"deepskyblue",name);
    enemy = new Fighter(900,"crimson","상대");

    round = 1;
    startRound();
}

function startRound(){
    player.hp = 100;
    enemy.hp = 100;

    timeLeft = 60;
    roundText.innerText = round;

    clearInterval(timer);

    timer = setInterval(()=>{
        timeLeft--;
        timeText.innerText = timeLeft;

        if(timeLeft <= 0){
            nextRound();
        }
    },1000);
}

function nextRound(){

    clearInterval(timer);

    if(round >= 3){
        endGame();
        return;
    }

    round++;
    startRound();
}

function endGame(){

    let msg = "무승부!";

    if(player.hp > enemy.hp){
        msg = player.name + " 승리!";
        money += 50;
    }
    else if(enemy.hp > player.hp){
        msg = "패배!";
    }

    moneyText.innerText = money;

    alert(msg);

    document.getElementById("select").style.display="block";
}

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;

    if(e.key === "1"){
        player.block = true;
    }

    if(e.key === "2"){
        player.kick = true;

        if(Math.abs(player.x - enemy.x) < 120){
            enemy.hp -= 10;
        }

        setTimeout(()=>{
            player.kick = false;
        },300);
    }

    if(e.key === "3"){
        player.taunt = true;

        setTimeout(()=>{
            player.taunt = false;
        },1000);
    }

    if(e.key === " "){
        if(Math.abs(player.x - enemy.x) < 100){
            if(enemy.block){
                enemy.hp -= 2;
            }else{
                enemy.hp -= 8;
            }
        }
    }

    if(e.key.toLowerCase() === "w"){
        if(player.grounded){
            player.velY = -15;
            player.grounded = false;
        }
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;

    if(e.key === "1"){
        player.block = false;
    }
});

function enemyAI(){

    if(Math.random() < 0.01){
        enemy.x -= 20;
    }

    if(Math.random() < 0.01){
        enemy.x += 20;
    }

    if(Math.random() < 0.01){

        if(Math.abs(enemy.x - player.x) < 100){

            if(player.block){
                player.hp -= 2;
            }else{
                player.hp -= 5;
            }
        }
    }
}

function update(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 경기장
    ctx.fillStyle="#995522";
    ctx.fillRect(100,200,1200,500);

    // 링
    ctx.strokeStyle="white";
    ctx.lineWidth=8;
    ctx.strokeRect(150,250,1100,400);

    // 관중
    for(let i=0;i<50;i++){
        ctx.fillStyle=`rgb(${100+i*2},${50+i},${150})`;
        ctx.fillRect(i*30,100+(i%5)*5,20,40);
    }

    if(player){

        // 이동
        if(keys["a"]){
            player.x -= 5;
        }

        if(keys["d"]){
            player.x += 5;
        }

        player.update();
        enemy.update();

        enemyAI();

        player.draw();
        enemy.draw();

        if(player.hp <= 0 || enemy.hp <= 0){
            nextRound();
        }
    }

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>

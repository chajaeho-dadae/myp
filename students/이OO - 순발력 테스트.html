<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>순발력 대결</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4ff;
      --surface: #ffffff;
      --surface2: #ede9fe;
      --border: rgba(0,0,0,0.09);
      --text: #1a1a2e;
      --muted: #7c7c9a;
      --go: #16a34a;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,58,237,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 85%, rgba(234,88,12,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    #app { position: relative; width: 100%; max-width: 480px; padding: 1.5rem; }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      animation: fadeUp 0.35s ease both;
    }
    .screen.active { display: flex; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .game-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 2.4rem;
      color: var(--go);
      line-height: 1.1;
      text-align: center;
    }

    .subtitle { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }

    /* 인원 선택 */
    .player-select-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }
    .player-select-btn {
      aspect-ratio: 1;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .player-select-btn:hover {
      border-color: #22c55e;
      background: rgba(34,197,94,0.06);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(34,197,94,0.18);
    }
    .player-select-btn:active { transform: scale(0.96); }
    .player-select-btn .pnum {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 2rem;
      color: var(--go);
      line-height: 1;
    }
    .player-select-btn .plabel { font-size: 12px; color: var(--muted); font-weight: 700; }

    /* 뱃지 */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .badge-current { background: rgba(34,197,94,0.12); color: #15803d; border: 1px solid rgba(34,197,94,0.3); }
    .badge-done    { background: rgba(0,0,0,0.05); color: var(--muted); border: 1px solid var(--border); }

    /* 버튼 */
    .btn {
      width: 100%;
      max-width: 320px;
      padding: 15px 24px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
    }
    .btn:hover  { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.18); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #15803d; }
    .btn-primary:hover { border-color: rgba(34,197,94,0.6); background: rgba(34,197,94,0.22); }

    /* 진행 점 */
    .progress-bar { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.1); transition: background 0.2s; }
    .progress-dot.done    { background: #22c55e; }
    .progress-dot.current { background: #dc2626; box-shadow: 0 0 6px rgba(220,38,38,0.5); animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* 반응 영역 */
    .reaction-wrap { width: 100%; max-width: 360px; }
    .reaction-area {
      width: 100%;
      height: 210px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 14px;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
      -webkit-user-select: none;
    }
    .reaction-area:active { transform: scale(0.98); }
    .reaction-area.waiting   { background: #ef4444; border-color: #dc2626; animation: pulse-red   1.5s ease-in-out infinite; }
    .reaction-area.go        { background: #22c55e; border-color: #16a34a; animation: pulse-green 0.6s ease-in-out infinite; }
    .reaction-area.too-early { background: #7f1d1d; border-color: #991b1b; animation: shake 0.35s ease; cursor: default; }
    .reaction-area.done      { background: var(--surface); border-color: rgba(34,197,94,0.3); cursor: default; }

    @keyframes pulse-red   { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 24px 6px rgba(239,68,68,0.35); } }
    @keyframes pulse-green { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 28px 8px rgba(34,197,94,0.40); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX( 8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX( 5px); }
    }

    .area-icon  { font-size: 2.8rem; line-height: 1; }
    .area-label { font-size: 16px; font-weight: 700; color: var(--muted); }
    .reaction-area.waiting .area-label,
    .reaction-area.go .area-label,
    .reaction-area.too-early .area-label { color: #fff; }
    .reaction-area.go .area-label   { font-size: 18px; }
    .reaction-area.done .area-label { color: rgba(34,197,94,0.9); }

    .hint-text { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
    .divider   { width: 100%; max-width: 320px; height: 1px; background: var(--border); }

    /* 핸드오프 */
    .handoff-card {
      width: 100%; max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
      text-align: center;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .handoff-card .icon { font-size: 2.2rem; }
    .handoff-card h3 { font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; color: var(--text); }
    .handoff-card p  { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* 결과 */
    .result-board {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .result-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .result-row:last-child { border-bottom: none; }
    .result-row.winner-row { background: rgba(34,197,94,0.07); }
    .result-player { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; }
    .rank-num {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.95rem;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.07);
      color: var(--muted);
      flex-shrink: 0;
    }
    .rank-num.gold   { background: #fef08a; color: #854d0e; }
    .rank-num.silver { background: #e2e8f0; color: #475569; }
    .rank-num.bronze { background: #fed7aa; color: #9a3412; }
    .result-time       { font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; }
    .result-time.first { color: var(--go); }
    .result-time.other { color: var(--muted); }

    .champion-banner { font-family: 'Black Han Sans', sans-serif; font-size: 1.6rem; text-align: center; color: var(--go); }
    .champion-banner.tie { color: var(--muted); }

    h2.section-title { font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem; color: var(--text); text-align: center; }

    .countdown-dots { display: flex; gap: 8px; align-items: center; justify-content: center; }
    .cdot { width: 8px; height: 8px; border-radius: 50%; animation: dotPop 1.2s ease-in-out infinite; }
    .cdot:nth-child(2) { animation-delay: 0.2s; }
    .cdot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPop {
      0%,80%,100% { transform: scale(1); background: rgba(0,0,0,0.12); }
      40%          { transform: scale(1.5); background: rgba(34,197,94,0.5); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- 시작 / 인원 선택 -->
  <div class="screen active" id="screen-start">
    <div class="game-title">순발력<br>대결</div>
    <p class="subtitle">화면이 초록색으로 바뀌면<br>최대한 빠르게 탭하세요</p>
    <div class="divider"></div>
    <p class="subtitle" style="font-weight:700;color:var(--text);font-size:15px">인원수를 선택하세요</p>
    <div class="player-select-grid" id="player-select-grid"></div>
  </div>

  <!-- 게임 진행 -->
  <div class="screen" id="screen-game">
    <div class="badge badge-current" id="current-badge"></div>
    <div class="progress-bar" id="progress-bar"></div>
    <h2 class="section-title" id="game-status"></h2>
    <div class="reaction-wrap">
      <div class="reaction-area" id="game-area">
        <span class="area-icon" id="game-icon"></span>
        <span class="area-label" id="game-label"></span>
      </div>
      <p class="hint-text" id="game-hint"></p>
    </div>
    <div class="countdown-dots">
      <div class="cdot"></div><div class="cdot"></div><div class="cdot"></div>
    </div>
  </div>

  <!-- 핸드오프 -->
  <div class="screen" id="screen-handoff">
    <div class="badge badge-done" id="handoff-badge"></div>
    <div class="handoff-card">
      <div class="icon">🤝</div>
      <h3 id="handoff-title"></h3>
      <p>결과는 마지막에 공개됩니다.<br>다음 플레이어가 준비되면 버튼을 누르세요.</p>
    </div>
    <button class="btn btn-primary" id="handoff-btn">다음 플레이어 시작 →</button>
  </div>

  <!-- 결과 -->
  <div class="screen" id="screen-result">
    <div class="champion-banner" id="champion-text"></div>
    <div class="result-board" id="result-board"></div>
    <button class="btn" id="reset-btn">↺ 다시 하기</button>
  </div>

</div>
<script>
  const COLORS     = ['#7c3aed','#ea580c','#0284c7','#d97706','#be185d','#059669'];
  const RANK_CLASS = ['gold','silver','bronze'];

  // DOM 캐시
  const $ = id => document.getElementById(id);
  const el = {
    screens    : document.querySelectorAll('.screen'),
    selectGrid : $('player-select-grid'),
    badge      : $('current-badge'),
    progressBar: $('progress-bar'),
    status     : $('game-status'),
    area       : $('game-area'),
    icon       : $('game-icon'),
    label      : $('game-label'),
    hint       : $('game-hint'),
    handoffBadge : $('handoff-badge'),
    handoffTitle : $('handoff-title'),
    handoffBtn   : $('handoff-btn'),
    champion   : $('champion-text'),
    resultBoard: $('result-board'),
  };

  // 상태
  let totalPlayers = 0, currentPlayer = 0;
  let times = [], timerRef = null, startTime = null, phase = null;

  const label = i => '플레이어 ' + (i + 1);

  // 인원 선택 버튼 동적 생성 (2~6명)
  for (let n = 2; n <= 6; n++) {
    const btn = document.createElement('button');
    btn.className = 'player-select-btn';
    btn.innerHTML = `<span class="pnum">${n}</span><span class="plabel">명</span>`;
    btn.addEventListener('click', () => startGame(n));
    el.selectGrid.appendChild(btn);
  }

  // 이벤트 등록 (인라인 onclick 제거)
  el.area.addEventListener('click', gameClick);
  el.handoffBtn.addEventListener('click', nextPlayer);
  $('reset-btn').addEventListener('click', resetGame);

  // ── 화면 전환 ──
  function showScreen(id) {
    el.screens.forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
  }

  // ── 게임 시작 ──
  function startGame(n) {
    totalPlayers = n;
    currentPlayer = 0;
    times = [];
    buildProgressBar();
    setupCurrentPlayer();
    showScreen('screen-game');
  }

  // ── 진행 바 (최초 1회 생성 후 클래스만 업데이트) ──
  function buildProgressBar() {
    el.progressBar.innerHTML = '';
    for (let i = 0; i < totalPlayers; i++) {
      const d = document.createElement('div');
      d.id = 'pdot-' + i;
      el.progressBar.appendChild(d);
    }
    updateProgressBar();
  }

  function updateProgressBar() {
    for (let i = 0; i < totalPlayers; i++) {
      const cls = i < currentPlayer ? 'done' : i === currentPlayer ? 'current' : '';
      $('pdot-' + i).className = 'progress-dot ' + cls;
    }
  }

  // ── 현재 플레이어 설정 ──
  function setupCurrentPlayer() {
    updateProgressBar();
    el.badge.textContent = '👤 ' + label(currentPlayer);
    setAreaState('waiting');
    clearTimeout(timerRef);
    scheduleGo();
  }

  // ── 반응 영역 상태 헬퍼 ──
  const AREA_STATES = {
    waiting   : { cls: 'waiting',   icon: '☝️',  lbl: '기다리세요...', status: '준비됐나요?',    hint: '초록색으로 바뀌면 탭!' },
    go        : { cls: 'go',        icon: '💥',  lbl: '지금 탭!',      status: '지금!',          hint: '초록색으로 바뀌면 탭!' },
    tooEarly  : { cls: 'too-early', icon: '❌',  lbl: '너무 빨랐어요!',status: '조금만 기다려요!',hint: '다시 시도합니다...' },
    done      : { cls: 'done',      icon: '✅',  lbl: '기록 완료!',    status: '완료!',           hint: '' },
  };

  function setAreaState(key) {
    const s = AREA_STATES[key];
    el.area.className  = 'reaction-area ' + s.cls;
    el.icon.textContent  = s.icon;
    el.label.textContent = s.lbl;
    el.status.textContent = s.status;
    el.hint.textContent  = s.hint;
    phase = key === 'go' ? 'go' : key === 'waiting' ? 'waiting' : null;
  }

  // ── 신호 예약 ──
  function scheduleGo() {
    timerRef = setTimeout(() => {
      setAreaState('go');
      startTime = Date.now();
    }, 1800 + Math.random() * 3500);
  }

  // ── 클릭 처리 ──
  function gameClick() {
    if (phase === 'go') {
      times[currentPlayer] = Date.now() - startTime;
      clearTimeout(timerRef);
      setAreaState('done');
      const isLast = currentPlayer + 1 >= totalPlayers;
      setTimeout(isLast ? showResult : showHandoff, 900);

    } else if (phase === 'waiting') {
      clearTimeout(timerRef);
      setAreaState('tooEarly');
      setTimeout(() => {
        setAreaState('waiting');
        scheduleGo();
      }, 1500);
    }
  }

  // ── 핸드오프 ──
  function showHandoff() {
    const next = label(currentPlayer + 1);
    el.handoffBadge.textContent = '✅ ' + label(currentPlayer) + ' 완료';
    el.handoffTitle.textContent = next + '에게 넘겨주세요';
    el.handoffBtn.textContent   = next + ' 시작 →';
    showScreen('screen-handoff');
  }

  function nextPlayer() {
    currentPlayer++;
    setupCurrentPlayer();
    showScreen('screen-game');
  }

  // ── 결과 ──
  function showResult() {
    const ranked = times
      .map((t, i) => ({ idx: i, time: t }))
      .sort((a, b) => a.time - b.time);
    const isTie = ranked[0].time === ranked[1]?.time;

    el.champion.textContent = isTie ? '🤝 무승부!' : '🏆 ' + label(ranked[0].idx) + ' 승리!';
    el.champion.className   = 'champion-banner' + (isTie ? ' tie' : '');

    el.resultBoard.innerHTML = ranked.map(({ idx, time }, rank) => {
      const isFirst = rank === 0 && !isTie;
      return `<div class="result-row${isFirst ? ' winner-row' : ''}">
        <div class="result-player">
          <div class="rank-num ${RANK_CLASS[rank] || ''}">${rank + 1}</div>
          <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[idx % COLORS.length]};flex-shrink:0"></div>
          ${label(idx)}${isFirst ? ' 🏆' : ''}
        </div>
        <span class="result-time ${isFirst ? 'first' : 'other'}">${time} ms</span>
      </div>`;
    }).join('');

    showScreen('screen-result');
  }

  // ── 리셋 ──
  function resetGame() {
    clearTimeout(timerRef);
    totalPlayers = currentPlayer = 0;
    times = []; phase = null;
    showScreen('screen-start');
  }
</script>
</body>
</html>

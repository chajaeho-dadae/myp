<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>친구 피하기</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    #game {
      position: relative;
      width: 900px;
      height: 600px;
      margin: 20px auto;
      background: #222;
      border: 5px solid red;
      overflow: hidden;
    }

    #player {
      position: absolute;
      width: 35px;
      height: 35px;
      background: cyan;
      border-radius: 6px;
    }

    #enemy {
      position: absolute;
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
    }

    .bullet {
      position: absolute;
      width: 12px;
      height: 12px;
      background: red;
      border-radius: 50%;
    }

    #bomb {
      position: absolute;
      width: 30px;
      height: 30px;
      background: yellow;
      border-radius: 50%;
      box-shadow: 0 0 15px yellow;
    }

    #ui {
      font-size: 24px;
      margin-top: 10px;
    }

    #message {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 70px;
      font-weight: bold;
      background: rgba(0,0,0,0.8);
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>전찬우 피하기</h1>
  <p>WASD로 이동 / 스페이스바로 폭탄 던지기</p>

  <div id="ui">생존 시간: <span id="time">0</span>초</div>

  <div id="game">
    <div id="player"></div>

    <img
      id="enemy"
      src="https://i.imgur.com/8QfKuz1.png"
    />

    <div id="message"></div>
  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");
    const enemy = document.getElementById("enemy");
    const message = document.getElementById("message");
    const timeText = document.getElementById("time");

    let px = 430;
    let py = 500;

    let ex = 400;
    let ey = 80;

    let keys = {};
    let bullets = [];

    let time = 0;
    let gameOver = false;
    let victory = false;

    let bomb = null;
    let hasBomb = false;

    document.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.code === "Space" && hasBomb) {
        const dist = Math.hypot(px - ex, py - ey);

        if (dist < 150) {
          winGame();
        }
      }
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function spawnBullet() {
      const bullet = document.createElement("div");
      bullet.className = "bullet";
      game.appendChild(bullet);

      const angle = Math.atan2(py - ey, px - ex);

      bullets.push({
        el: bullet,
        x: ex + 45,
        y: ey + 45,
        dx: Math.cos(angle) * 7,
        dy: Math.sin(angle) * 7,
      });
    }

    function update() {
      if (gameOver || victory) return;

      if (keys["w"]) py -= 6;
      if (keys["s"]) py += 6;
      if (keys["a"]) px -= 6;
      if (keys["d"]) px += 6;

      px = Math.max(0, Math.min(865, px));
      py = Math.max(0, Math.min(565, py));

      player.style.left = px + "px";
      player.style.top = py + "px";

      enemy.style.left = ex + "px";
      enemy.style.top = ey + "px";

      bullets.forEach((b) => {
        b.x += b.dx;
        b.y += b.dy;

        b.el.style.left = b.x + "px";
        b.el.style.top = b.y + "px";

        const hit =
          b.x < px + 35 &&
          b.x + 12 > px &&
          b.y < py + 35 &&
          b.y + 12 > py;

        if (hit) {
          loseGame();
        }
      });

      if (bomb) {
        const touch =
          px < bomb.x + 30 &&
          px + 35 > bomb.x &&
          py < bomb.y + 30 &&
          py + 35 > bomb.y;

        if (touch) {
          hasBomb = true;
          bomb.el.remove();
          bomb = null;

          document.getElementById("ui").innerHTML += "<br>폭탄 획득! 가까이 가서 스페이스바를 누르세요!";
        }
      }

      requestAnimationFrame(update);
    }

    function loseGame() {
      gameOver = true;
      message.style.display = "flex";
      message.style.color = "red";
      message.innerText = "GAME OVER";
    }

    function winGame() {
      victory = true;
      message.style.display = "flex";
      message.style.color = "lime";
      message.innerText = "승리!";
    }

    setInterval(() => {
      if (!gameOver && !victory) {
        spawnBullet();
      }
    }, 700);

    setInterval(() => {
      if (gameOver || victory) return;

      time++;
      timeText.innerText = time;

      if (time === 30) {
        const bombEl = document.createElement("div");
        bombEl.id = "bomb";
        bombEl.style.left = "430px";
        bombEl.style.top = "300px";
        game.appendChild(bombEl);

        bomb = {
          el: bombEl,
          x: 430,
          y: 300,
        };
      }
    }, 1000);

    update();
  </script>
</body>
</html>

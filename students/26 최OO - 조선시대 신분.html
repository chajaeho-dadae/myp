<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조선시대 신분 테스트</title>

<style>

body{
    margin:0;
    font-family:'Pretendard', sans-serif;
    background:linear-gradient(135deg,#d9a66b,#f5e6ca);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:800px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#7b3f00;
    margin-bottom:20px;
}

.description{
    text-align:center;
    font-size:20px;
    margin-bottom:30px;
    color:#444;
}

.question{
    margin-bottom:30px;
    padding:20px;
    background:#fff8ee;
    border-radius:15px;
}

.question h3{
    margin-bottom:15px;
    color:#5a2d0c;
}

label{
    display:block;
    margin:10px 0;
    font-size:18px;
    cursor:pointer;
}

button{
    width:100%;
    padding:18px;
    font-size:24px;
    border:none;
    border-radius:15px;
    background:#8b4513;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.03);
}

#result{
    margin-top:30px;
    padding:30px;
    border-radius:20px;
    background:#fff3dc;
    text-align:center;
    font-size:24px;
    line-height:1.8;
    display:none;
}

.resultTitle{
    font-size:40px;
    font-weight:bold;
    color:#8b0000;
}

</style>
</head>
<body>

<div class="container">

    <h1>🏯 조선시대 신분 & 직업 테스트 🏯</h1>

    <div class="description">
        간단한 테스트를 통해<br>
        당신에게 어울리는 조선시대 신분과 직업을 알려드립니다!
    </div>

    <div class="question">
        <h3>1. 친구들과 있을 때 나는?</h3>

        <label><input type="radio" name="q1" value="yangban"> 리더 역할을 맡는다</label>
        <label><input type="radio" name="q1" value="merchant"> 계산과 계획을 잘한다</label>
        <label><input type="radio" name="q1" value="farmer"> 묵묵히 맡은 일을 한다</label>
        <label><input type="radio" name="q1" value="artist"> 자유롭게 노는 것이 좋다</label>
    </div>

    <div class="question">
        <h3>2. 가장 좋아하는 활동은?</h3>

        <label><input type="radio" name="q2" value="yangban"> 책 읽기와 공부</label>
        <label><input type="radio" name="q2" value="merchant"> 물건 구경과 거래</label>
        <label><input type="radio" name="q2" value="farmer"> 자연 속에서 일하기</label>
        <label><input type="radio" name="q2" value="artist"> 음악과 예술 즐기기</label>
    </div>

    <div class="question">
        <h3>3. 문제 해결 방식은?</h3>

        <label><input type="radio" name="q3" value="yangban"> 논리적으로 해결한다</label>
        <label><input type="radio" name="q3" value="merchant"> 효율적으로 계산한다</label>
        <label><input type="radio" name="q3" value="farmer"> 꾸준히 노력한다</label>
        <label><input type="radio" name="q3" value="artist"> 창의적으로 접근한다</label>
    </div>

    <button onclick="showResult()">결과 보기</button>

    <div id="result"></div>

</div>

<script>

function showResult(){

    const answers = [
        document.querySelector('input[name="q1"]:checked'),
        document.querySelector('input[name="q2"]:checked'),
        document.querySelector('input[name="q3"]:checked')
    ];

    if(answers.includes(null)){
        alert("모든 질문에 답해주세요!");
        return;
    }

    const score = {
        yangban:0,
        merchant:0,
        farmer:0,
        artist:0
    };

    answers.forEach(answer=>{
        score[answer.value]++;
    });

    let resultType = "";

    let max = 0;

    for(let key in score){

        if(score[key] > max){
            max = score[key];
            resultType = key;
        }
    }

    const resultBox = document.getElementById("result");

    let title = "";
    let desc = "";

    if(resultType === "yangban"){

        title = "📚 양반 - 학자 / 관리";
        desc = `
            당신은 지혜롭고 논리적인 성향을 가졌습니다.<br>
            조선시대라면 과거 시험을 준비하는 선비이자<br>
            나라를 다스리는 관리가 되었을 가능성이 높습니다.
        `;
    }

    else if(resultType === "merchant"){

        title = "💰 중인 / 상인";
        desc = `
            당신은 계산적이고 현실 감각이 뛰어납니다.<br>
            조선시대라면 시장을 누비며 큰 성공을 거둔<br>
            상인이 되었을 가능성이 높습니다.
        `;
    }

    else if(resultType === "farmer"){

        title = "🌾 농민";
        desc = `
            당신은 성실하고 끈기 있는 성향입니다.<br>
            조선시대라면 마을 사람들에게 신뢰받는<br>
            훌륭한 농민이 되었을 것입니다.
        `;
    }

    else if(resultType === "artist"){

        title = "🎨 예인 / 광대";
        desc = `
            당신은 창의적이고 자유로운 성격입니다.<br>
            조선시대라면 음악과 춤, 예술로 사람들을 즐겁게 하는<br>
            예인이 되었을 가능성이 높습니다.
        `;
    }

    resultBox.style.display = "block";

    resultBox.innerHTML = `
        <div class="resultTitle">${title}</div>
        <br>
        ${desc}
    `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>배달 시뮬레이션</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#0f0f0f;
    font-family:sans-serif;
}

canvas{
    display:block;
    margin:auto;
    background:#1a1a1a;
    image-rendering: pixelated;
}

/* 시작 화면 */
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200');
    background-size:cover;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    z-index:10;
}

#title{
    font-size:70px;
    color:#ff4d4d;
    text-shadow:
    0 0 10px red,
    0 0 20px orange,
    0 0 30px darkred;
    margin-bottom:20px;
}

#subtitle{
    font-size:24px;
    color:#ccc;
    margin-bottom:40px;
}

#startBtn{
    padding:20px 50px;
    font-size:28px;
    border:none;
    border-radius:12px;
    background:#b30000;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

#startBtn:hover{
    background:#ff1a1a;
    transform:scale(1.05);
}

/* UI */
#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:18px;
    z-index:5;
    text-shadow:1px 1px 3px black;
}

#shopBtn{
    position:absolute;
    top:10px;
    right:10px;
    width:60px;
    height:60px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    font-size:24px;
    cursor:pointer;
    z-index:5;
}

#shop{
    position:absolute;
    top:80px;
    right:10px;
    width:250px;
    background:#222;
    color:white;
    padding:15px;
    display:none;
    border-radius:10px;
    border:2px solid #666;
    z-index:5;
}

.shopItem{
    margin:10px 0;
    padding:10px;
    background:#444;
    cursor:pointer;
    border-radius:6px;
}

.shopItem:hover{
    background:#666;
}
</style>
</head>

<body>

<!-- 시작 화면 -->
<div id="startScreen">
    <div id="title">배달 시뮬레이션</div>

    <div id="subtitle">
        멸망한 세계에서 살아남기 위해 배달을 하라.
    </div>

    <button id="startBtn">게임 시작</button>
</div>

<!-- 게임 UI -->
<div id="ui">
    <div id="dayText">Day 1</div>
    <div id="moneyText">Coins: 0</div>
    <div id="timeText">낮</div>
    <div id="hpText">HP: 3</div>
</div>

<button id="shopBtn">🛒</button>

<div id="shop">
    <h3>상점</h3>

    <b>스킨</b>

    <div class="shopItem" onclick="buySkin('lime')">
        기본 스킨 - 무료
    </div>

    <div class="shopItem" onclick="buySkin('red')">
        붉은 생존자 스킨 - 30코인
    </div>

    <div class="shopItem" onclick="buySkin('cyan')">
        사이버 스킨 - 30코인
    </div>

    <b>물약</b>

    <div class="shopItem" onclick="buyPotion('speed')">
        속도 증가 물약 - 20코인
    </div>

    <div class="shopItem" onclick="buyPotion('hp')">
        체력 증가 물약 - 20코인
    </div>

    <div class="shopItem" onclick="buyPotion('immortal')">
        2분 무적 물약 - 50코인
    </div>
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameStarted = false;

document.getElementById("startBtn").onclick = ()=>{

    document.getElementById("startScreen").style.display = "none";

    gameStarted = true;

    gameLoop();
};

// 키 입력
const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

// 플레이어
const player = {
    x:200,
    y:300,
    size:22,
    speed:3,
    color:"lime",
    hp:3,
    immortal:false
};

let coins = 0;
let day = 1;
let deliveryMoney = 0;

// 도로
const roads = [
    {x:0,y:250,w:1000,h:100},
    {x:450,y:0,w:100,h:600}
];

// 배달 위치
const delivery = {
    x:800,
    y:300,
    size:24
};

// 적
let enemies = [];

function spawnEnemy(){

    enemies.push({
        x:Math.random()*1000,
        y:Math.random()*600,
        size:20,
        speed:1.4
    });
}

setInterval(spawnEnemy,5000);

// 충돌
function collide(a,b){

    return (
        a.x < b.x+b.size &&
        a.x+a.size > b.x &&
        a.y < b.y+b.size &&
        a.y+a.size > b.y
    );
}

// 업데이트
function update(){

    if(keys["w"]) player.y -= player.speed;
    if(keys["s"]) player.y += player.speed;
    if(keys["a"]) player.x -= player.speed;
    if(keys["d"]) player.x += player.speed;

    enemies.forEach(e=>{

        let dx = player.x - e.x;
        let dy = player.y - e.y;

        let dist = Math.sqrt(dx*dx + dy*dy);

        e.x += dx/dist * e.speed;
        e.y += dy/dist * e.speed;

        if(collide(player,e)){

            if(player.immortal) return;

            player.hp--;

            document.getElementById("hpText").innerText =
            "HP: " + player.hp;

            e.x = Math.random()*1000;
            e.y = Math.random()*600;

            if(player.hp <= 0){

                alert("당신은 이상한 사람에게 잡혔습니다...\nGAME OVER");

                location.reload();
            }
        }
    });

    // 배달 완료
    if(collide(player,delivery)){

        coins += 10;
        deliveryMoney += 10;

        updateMoney();

        delivery.x = Math.random()*900;
        delivery.y = Math.random()*500;
    }
}

// 그림
function draw(){

    ctx.clearRect(0,0,1000,600);

    // 폐허 배경
    ctx.fillStyle = "#1f1f1f";
    ctx.fillRect(0,0,1000,600);

    // 건물 잔해
    ctx.fillStyle = "#2e2e2e";

    for(let i=0;i<20;i++){

        ctx.fillRect(i*60,Math.sin(i)*20+80,40,80);
    }

    // 도로
    ctx.fillStyle = "#5c5c5c";

    roads.forEach(r=>{
        ctx.fillRect(r.x,r.y,r.w,r.h);
    });

    // 도로 선
    ctx.fillStyle = "yellow";

    for(let i=0;i<1000;i+=60){

        ctx.fillRect(i,295,30,5);
    }

    // 배달 지점
    ctx.fillStyle = "gold";
    ctx.fillRect(
        delivery.x,
        delivery.y,
        delivery.size,
        delivery.size
    );

    // 플레이어 (오토바이)
    ctx.fillStyle = player.color;

    ctx.fillRect(
        player.x,
        player.y,
        player.size,
        player.size
    );

    // 바퀴
    ctx.fillStyle = "black";

    ctx.fillRect(player.x-3, player.y+15, 6,6);
    ctx.fillRect(player.x+18, player.y+15, 6,6);

    // 적
    ctx.fillStyle = "#cc0000";

    enemies.forEach(e=>{

        ctx.fillRect(e.x,e.y,e.size,e.size);

        ctx.fillStyle="white";
        ctx.fillRect(e.x+5,e.y+5,3,3);
        ctx.fillRect(e.x+12,e.y+5,3,3);

        ctx.fillStyle="#cc0000";
    });

    // 밤 효과
    if(!isDay){

        ctx.fillStyle = "rgba(0,0,50,0.35)";
        ctx.fillRect(0,0,1000,600);
    }
}

// 루프
function gameLoop(){

    if(!gameStarted) return;

    update();
    draw();

    requestAnimationFrame(gameLoop);
}

// 시간
let isDay = true;
let timer = 180;

setInterval(()=>{

    if(!gameStarted) return;

    timer--;

    document.getElementById("timeText").innerText =
    (isDay ? "☀ 낮 " : "🌙 밤 ") + timer + "초";

    if(timer <= 0){

        if(isDay){

            isDay = false;
            timer = 60;

        }else{

            alert(
                "Day " + day +
                " 종료\n오늘 번 돈: " +
                deliveryMoney + "코인"
            );

            deliveryMoney = 0;

            day++;

            document.getElementById("dayText").innerText =
            "Day " + day;

            isDay = true;
            timer = 180;
        }
    }

},1000);

// 상점
const shop = document.getElementById("shop");

document.getElementById("shopBtn").onclick = ()=>{

    shop.style.display =
    shop.style.display === "block"
    ? "none"
    : "block";
};

// 스킨 구매
function buySkin(color){

    if(color === "lime"){

        player.color = color;
        return;
    }

    if(coins >= 30){

        coins -= 30;
        player.color = color;

        updateMoney();
    }
}

// 물약 구매
function buyPotion(type){

    if(type === "speed" && coins >= 20){

        coins -= 20;
        player.speed += 1;
    }

    else if(type === "hp" && coins >= 20){

        coins -= 20;

        player.hp++;

        document.getElementById("hpText").innerText =
        "HP: " + player.hp;
    }

    else if(type === "immortal" && coins >= 50){

        coins -= 50;

        player.immortal = true;

        alert("2분 동안 무적 상태!");

        setTimeout(()=>{

            player.immortal = false;

            alert("무적 종료");

        },120000);
    }

    updateMoney();
}

// 돈 표시
function updateMoney(){

    document.getElementById("moneyText").innerText =
    "Coins: " + coins;
}

</script>
</body>
</html>

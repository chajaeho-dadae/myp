<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>⚾ 프로야구 V26 Web</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
        margin: auto;
        background: #081428;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
        z-index: 10;
    }
</style>
</head>
<body>

<div id="ui">
    SPACE : 스윙
</div>

<canvas id="game" width="1024" height="768"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

let score = 0;
let strikes = 0;
let balls = 0;

let ball = {
    active: false,
    x: W/2,
    y: H*0.3,
    tx: W/2,
    ty: H*0.8,
    progress: 0,
    speed: 0.02
};

let canSwing = false;
let message = "";
let messageTimer = 0;

function resetBall() {
    ball.active = true;
    ball.x = W/2;
    ball.y = H*0.3;
    ball.tx = W/2 + (Math.random()*120 - 60);
    ball.ty = H*0.8;
    ball.progress = 0;
    canSwing = true;
}

function drawSky() {
    let grad = ctx.createLinearGradient(0,0,0,H);

    grad.addColorStop(0,"#081428");
    grad.addColorStop(1,"#225588");

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);
}

function drawField() {

    // 잔디
    ctx.fillStyle = "#1c7c1c";

    ctx.beginPath();
    ctx.moveTo(100,H);
    ctx.lineTo(W/2-250,H/2);
    ctx.lineTo(W/2+250,H/2);
    ctx.lineTo(W-100,H);
    ctx.fill();

    // 내야
    ctx.fillStyle = "#9a6230";

    ctx.beginPath();
    ctx.moveTo(W/2-150,H);
    ctx.lineTo(W/2-80,H/2+80);
    ctx.lineTo(W/2+80,H/2+80);
    ctx.lineTo(W/2+150,H);
    ctx.fill();

    // 홈플레이트
    ctx.fillStyle = "white";

    ctx.fillRect(W/2-25,H-90,50,15);
}

function drawPitcher() {
    ctx.fillStyle = "#2266ff";

    ctx.fillRect(W/2-15,H/2+20,30,60);

    ctx.beginPath();
    ctx.arc(W/2,H/2,15,0,Math.PI*2);
    ctx.fill();
}

function drawBatter() {

    ctx.fillStyle = "#dd3333";

    ctx.fillRect(W/2+100,H-180,35,80);

    ctx.beginPath();
    ctx.arc(W/2+118,H-200,18,0,Math.PI*2);
    ctx.fill();

    // 배트
    ctx.strokeStyle = "#c09050";
    ctx.lineWidth = 6;

    ctx.beginPath();
    ctx.moveTo(W/2+95,H-150);
    ctx.lineTo(W/2+40,H-220);
    ctx.stroke();
}

function updateBall() {

    if(!ball.active) return;

    ball.progress += ball.speed;

    ball.x = W/2 + (ball.tx - W/2) * ball.progress;
    ball.y = H*0.3 + (ball.ty - H*0.3) * ball.progress;

    if(ball.progress >= 1) {

        ball.active = false;

        if(canSwing) {
            addStrike();
            showMessage("스트라이크!");
        }

        setTimeout(resetBall,1000);
    }
}

function drawBall() {

    if(!ball.active) return;

    let size = 5 + ball.progress * 12;

    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.arc(ball.x,ball.y,size,0,Math.PI*2);
    ctx.fill();
}

function swing() {

    if(!canSwing || !ball.active) return;

    canSwing = false;

    let t = ball.progress;

    if(t > 0.65 && t < 0.9) {

        let r = Math.random();

        if(r < 0.15) {
            score += 4;
            showMessage("💥 홈런!");
        }
        else if(r < 0.6) {
            score += 1;
            showMessage("안타!");
        }
        else {
            addStrike();
            showMessage("헛스윙!");
        }

    } else {

        addStrike();
        showMessage("타이밍 미스!");
    }
}

function addStrike() {

    strikes++;

    if(strikes >= 3) {
        strikes = 0;
        balls = 0;
        showMessage("삼진 아웃!");
    }
}

function drawHUD() {

    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(10,10,250,100);

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";

    ctx.fillText("점수 : " + score,20,40);
    ctx.fillText("S : " + strikes,20,75);
    ctx.fillText("B : " + balls,120,75);
}

function showMessage(msg) {

    message = msg;
    messageTimer = 120;
}

function drawMessage() {

    if(messageTimer <= 0) return;

    ctx.fillStyle = "yellow";
    ctx.font = "60px Arial";
    ctx.textAlign = "center";

    ctx.fillText(message,W/2,H/2-100);

    messageTimer--;
}

function gameLoop() {

    drawSky();
    drawField();

    drawPitcher();
    drawBatter();

    updateBall();
    drawBall();

    drawHUD();
    drawMessage();

    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown",(e)=>{

    if(e.code === "Space") {
        swing();
    }
});

resetBall();
gameLoop();

</script>

</body>
</html>

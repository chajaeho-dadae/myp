<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>반응 속도 게임</title>

<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:#1f1f1f;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .game-box{
        background:#2d2d2d;
        padding:40px;
        border-radius:20px;
        text-align:center;
        width:480px;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
        margin-bottom:20px;
    }

    input{
        padding:10px;
        width:220px;
        border:none;
        border-radius:10px;
        font-size:16px;
        margin-bottom:15px;
    }

    #screen{
        width:100%;
        height:220px;
        border-radius:15px;
        background:red;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:28px;
        cursor:pointer;
        user-select:none;
        transition:0.2s;
    }

    button{
        margin-top:20px;
        padding:12px 24px;
        border:none;
        border-radius:10px;
        font-size:18px;
        cursor:pointer;
        background:#00b894;
        color:white;
    }

    #result{
        margin-top:20px;
        font-size:24px;
        line-height:1.6;
    }

    .rank{
        font-size:28px;
        font-weight:bold;
        margin-top:10px;
    }

    .scoreboard{
        margin-top:30px;
        text-align:left;
        background:#3b3b3b;
        padding:15px;
        border-radius:15px;
    }

    .scoreboard h2{
        text-align:center;
    }

    ol{
        padding-left:25px;
    }

    li{
        margin:10px 0;
        font-size:18px;
    }
</style>
</head>

<body>

<div class="game-box">

    <h1>⚡ 반응 속도 게임 ⚡</h1>

    <input type="text" id="nickname" placeholder="닉네임 입력">

    <br>

    <div id="screen">시작 버튼을 누르세요</div>

    <button onclick="startGame()">게임 시작</button>

    <div id="result"></div>

    <div class="scoreboard">
        <h2>🏆 순위 TOP 5</h2>
        <ol id="rankingList">
            <li>기록 없음</li>
        </ol>
    </div>

</div>

<script>

let startTime;
let ready = false;
let waiting = false;
let timeout;

let rankings = [];

const screen = document.getElementById("screen");
const result = document.getElementById("result");
const rankingList = document.getElementById("rankingList");
const nicknameInput = document.getElementById("nickname");

function startGame(){

    const nickname = nicknameInput.value.trim();

    if(nickname === ""){
        alert("닉네임을 입력하세요!");
        return;
    }

    result.innerHTML = "";

    screen.style.background = "red";
    screen.innerHTML = "기다리세요...";

    ready = false;
    waiting = true;

    let randomTime = Math.random() * 3000 + 2000;

    timeout = setTimeout(() => {

        screen.style.background = "limegreen";
        screen.innerHTML = "지금 클릭!!!";

        startTime = new Date().getTime();

        ready = true;

    }, randomTime);
}

function getLevel(reaction){

    if(reaction < 150){
        return "👑 신(God)";
    }
    else if(reaction < 180){
        return "⚡ 천상계";
    }
    else if(reaction < 220){
        return "🔥 고수";
    }
    else if(reaction <= 300){
        return "🙂 평균";
    }
    else{
        return "🐢 느림";
    }
}

function updateRanking(){

    rankingList.innerHTML = "";

    rankings.forEach((score, index) => {

        let li = document.createElement("li");

        li.innerHTML = `
            <b>${index + 1}위</b> 
            - ${score.nickname}
            | ${score.time} ms
            | ${score.level}
        `;

        rankingList.appendChild(li);
    });
}

screen.addEventListener("click", () => {

    if(ready){

        let endTime = new Date().getTime();

        let reaction = endTime - startTime;

        let level = getLevel(reaction);

        let nickname = nicknameInput.value.trim();

        result.innerHTML = `
            🎯 반응 속도: <b>${reaction} ms</b>
            <div class="rank">${level}</div>
        `;

        rankings.push({
            nickname: nickname,
            time: reaction,
            level: level
        });

        rankings.sort((a, b) => a.time - b.time);

        rankings = rankings.slice(0, 5);

        updateRanking();

        screen.style.background = "dodgerblue";
        screen.innerHTML = "다시 하려면 시작 버튼!";

        ready = false;
        waiting = false;
    }

    else if(waiting){

        clearTimeout(timeout);

        result.innerHTML = `
            ❌ 너무 빨리 눌렀어요!
        `;

        screen.style.background = "red";
        screen.innerHTML = "다시 시작하세요";

        waiting = false;
    }

});

</script>

</body>
</html>

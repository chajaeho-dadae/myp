<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>원시인 섬 탈출</title>
<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#game{
width:700px;
margin:auto;
padding:20px;
}

button{
margin:5px;
padding:10px;
cursor:pointer;
}

#map{
display:grid;
grid-template-columns: repeat(10, 50px);
gap:2px;
justify-content:center;
margin-top:20px;
}

.cell{
width:50px;
height:50px;
background:#333;
border:1px solid #555;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
}

.player{
background:green;
}

.enemy{
background:red;
}

.animal{
background:orange;
}

.edge{
background:#225522;
}
</style>
</head>
<body>

<div id="game">

<h1>🌴 원시인 섬 탈출</h1>

<div id="menu"></div>

<div id="status"></div>

<div id="controls"></div>

<div id="map"></div>

<div id="log"></div>

</div>

<script>

let player = {
x:5,
y:5,
hp:100,
coins:200,
weapon:false,
map:false
};

let enemy = {
x:0,
y:0
};

let animal = {
x:8,
y:8
};

let isNight = false;
let turn = 0;
let gameStarted = false;

const mapSize = 10;

function startMenu(){

document.getElementById("menu").innerHTML = `
<h2>캐릭터 선택</h2>

<button onclick="chooseCharacter('탐험가')">탐험가</button>
<button onclick="chooseCharacter('군인')">군인</button>
<button onclick="chooseCharacter('생존자')">생존자</button>
`;
}

let selectedCharacter = "";
let selectedTheme = "";

function chooseCharacter(name){
selectedCharacter = name;

document.getElementById("menu").innerHTML = `
<h2>섬 테마 선택</h2>

<button onclick="chooseTheme('정글섬')">정글섬</button>
<button onclick="chooseTheme('화산섬')">화산섬</button>
<button onclick="chooseTheme('빙하섬')">빙하섬</button>
`;
}

function chooseTheme(theme){
selectedTheme = theme;

document.getElementById("menu").innerHTML = `
<h2>아이템 구매 (각 20코인)</h2>

<button onclick="buyItem('weapon')">창 구매</button>
<button onclick="buyItem('food')">식량 구매</button>
<button onclick="buyMap()">지도 구매 (100코인)</button>

<br><br>

<button onclick="startGame()">게임 시작</button>
`;
}

function buyItem(type){

if(player.coins < 20){
log("코인이 부족합니다.");
return;
}

player.coins -= 20;

if(type === "weapon"){
player.weapon = true;
log("창을 구매했습니다.");
}

updateStatus();
}

function buyMap(){

if(player.coins < 100){
log("코인이 부족합니다.");
return;
}

player.coins -= 100;
player.map = true;

log("섬 지도를 구매했습니다.");

updateStatus();
}

function startGame(){

gameStarted = true;

document.getElementById("menu").innerHTML = "";

createControls();

updateStatus();

drawMap();

gameLoop();
}

function createControls(){

document.getElementById("controls").innerHTML = `
<button onclick="move(0,-1)">⬆</button><br>
<button onclick="move(-1,0)">⬅</button>
<button onclick="move(1,0)">➡</button><br>
<button onclick="move(0,1)">⬇</button>
`;
}

function move(dx,dy){

player.x += dx;
player.y += dy;

if(player.x < 0 || player.y < 0 || player.x >= mapSize || player.y >= mapSize){

alert("🎉 섬 탈출 성공!");
location.reload();
return;
}

turn++;

if(turn % 5 === 0){
isNight = !isNight;

if(isNight){
log("🌙 밤이 되었습니다. 원시인이 움직입니다.");
}else{
log("☀ 아침이 되었습니다.");
}
}

if(isNight){
moveEnemy();
}

checkAnimal();

randomFruit();

drawMap();

updateStatus();

checkGameOver();
}

function moveEnemy(){

if(enemy.x < player.x) enemy.x++;
else if(enemy.x > player.x) enemy.x--;

if(enemy.y < player.y) enemy.y++;
else if(enemy.y > player.y) enemy.y--;
}

function checkAnimal(){

if(player.x === animal.x && player.y === animal.y){

player.hp -= 20;

log("🐺 야생동물에게 공격당했습니다! HP -20");

animal.x = Math.floor(Math.random()*mapSize);
animal.y = Math.floor(Math.random()*mapSize);
}
}

function randomFruit(){

let chance = Math.random();

if(chance < 0.3){

player.hp += 10;

if(player.hp > 100) player.hp = 100;

log("🍎 열매를 먹고 체력을 회복했습니다.");
}
}

function checkGameOver(){

if(player.x === enemy.x && player.y === enemy.y){

if(player.weapon){

log("🗡 원시인을 무기로 처치했습니다!");

enemy.x = 0;
enemy.y = 0;

}else{

alert("☠ 원시인에게 잡혀 죽었습니다.");

location.reload();
}
}

if(player.hp <= 0){

alert("☠ 사망했습니다.");

location.reload();
}
}

function updateStatus(){

document.getElementById("status").innerHTML = `
캐릭터: ${selectedCharacter} |
섬: ${selectedTheme} |
HP: ${player.hp} |
코인: ${player.coins} |
무기: ${player.weapon ? "있음" : "없음"} |
지도: ${player.map ? "있음" : "없음"} |
시간: ${isNight ? "밤" : "낮"}
`;
}

function drawMap(){

const map = document.getElementById("map");

map.innerHTML = "";

for(let y=0; y<mapSize; y++){

for(let x=0; x<mapSize; x++){

let cell = document.createElement("div");

cell.classList.add("cell");

if(x===0 || y===0 || x===mapSize-1 || y===mapSize-1){
cell.classList.add("edge");
}

if(player.x===x && player.y===y){
cell.classList.add("player");
cell.innerHTML = "😀";
}

else if(enemy.x===x && enemy.y===y){
cell.classList.add("enemy");
cell.innerHTML = "👹";
}

else if(animal.x===x && animal.y===y){
cell.classList.add("animal");
cell.innerHTML = "🐺";
}

else{
cell.innerHTML = "";
}

map.appendChild(cell);
}
}
}

function log(text){

document.getElementById("log").innerHTML =
text + "<br>" +
document.getElementById("log").innerHTML;
}

startMenu();

</script>

</body>
</html>

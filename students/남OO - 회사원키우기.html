<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회사원 키우기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&display=swap');

  :root {
    --bg: #0d0d0d;
    --panel: #161616;
    --panel2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #f0c040;
    --accent2: #e05a30;
    --accent3: #4ab8a0;
    --text: #e8e0d0;
    --muted: #666;
    --green: #5cba6a;
    --red: #e05a5a;
    --blue: #5a90e0;
    --purple: #a07ae0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── TITLE SCREEN ── */
  #screen-title {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #1a1200 0%, #0d0d0d 70%);
    position: relative;
    overflow: hidden;
  }
  #screen-title::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, #1c1c1c 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, #1c1c1c 40px);
    opacity: 0.3;
  }
  .title-content {
    position: relative;
    text-align: center;
    animation: fadeUp 1s ease;
  }
  .title-badge {
    display: inline-block;
    background: var(--accent2);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 14px;
    margin-bottom: 16px;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }
  .title-main {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(48px, 10vw, 90px);
    color: var(--accent);
    text-shadow: 4px 4px 0 #7a6000, 8px 8px 30px rgba(240,192,64,0.3);
    line-height: 1;
    margin-bottom: 8px;
  }
  .title-sub {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 4px;
    margin-bottom: 48px;
  }
  .title-char {
    font-size: 80px;
    margin-bottom: 24px;
    animation: float 3s ease-in-out infinite;
  }
  .job-select-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    max-width: 700px;
    margin: 0 auto 32px;
    padding: 0 16px;
  }
  .job-card {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px 12px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .job-card:hover { border-color: var(--accent); transform: translateY(-4px); }
  .job-card.selected { border-color: var(--accent); background: #1e1800; }
  .job-card .jc-emoji { font-size: 36px; margin-bottom: 8px; }
  .job-card .jc-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .job-card .jc-desc { font-size: 11px; color: var(--muted); }
  .btn-start {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 900;
    font-family: 'Black Han Sans', sans-serif;
    cursor: pointer;
    clip-path: polygon(12px 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
    transition: all .2s;
    letter-spacing: 2px;
  }
  .btn-start:hover { background: #ffd040; transform: scale(1.05); }

  /* ── MAIN GAME ── */
  #screen-game {
    min-height: 100vh;
    background: var(--bg);
  }
  .game-header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .header-info {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex: 1;
    align-items: center;
  }
  .hinfo { font-size: 12px; color: var(--muted); }
  .hinfo span { color: var(--text); font-weight: 700; }
  .header-salary {
    background: #1a1400;
    border: 1px solid #3a2a00;
    border-radius: 4px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    margin-left: auto;
  }

  /* rank bar */
  .rank-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    overflow-x: auto;
  }
  .rank-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
    opacity: 0.4;
  }
  .rank-step.done { opacity: 1; }
  .rank-step.current { opacity: 1; }
  .rank-step.current .rs-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .rank-step.done .rs-dot { background: var(--green); }
  .rs-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
  .rs-label { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .rank-line { flex: 1; min-width: 20px; height: 1px; background: var(--border); }
  .rank-line.done { background: var(--green); }

  .game-body {
    display: grid;
    grid-template-columns: 220px 1fr 240px;
    gap: 0;
    min-height: calc(100vh - 100px);
  }

  /* LEFT: stats */
  .panel-left {
    border-right: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .char-display {
    text-align: center;
    padding: 16px 8px;
    background: var(--panel2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .char-emoji { font-size: 56px; }
  .char-name { font-weight: 700; font-size: 14px; margin-top: 8px; }
  .char-rank {
    display: inline-block;
    background: var(--accent2);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 2px;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .char-job { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .stats-section { display: flex; flex-direction: column; gap: 10px; }
  .stat-row { display: flex; flex-direction: column; gap: 4px; }
  .stat-head { display: flex; justify-content: space-between; align-items: center; }
  .stat-name { font-size: 12px; font-weight: 700; }
  .stat-val { font-size: 12px; font-weight: 700; }
  .stat-bar-bg { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }

  /* CENTER: main action */
  .panel-center { padding: 20px; overflow-y: auto; }
  .day-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .day-badge {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    border-radius: 4px;
  }
  .day-title { font-size: 18px; font-weight: 900; }

  /* activity cards */
  .activity-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .act-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .act-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, #444);
  }
  .act-card:hover { border-color: var(--card-color, #666); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,.5); }
  .act-card.disabled { opacity: 0.4; cursor: not-allowed; }
  .act-card .ac-icon { font-size: 28px; margin-bottom: 8px; }
  .act-card .ac-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .act-card .ac-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .ac-effects { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .effect-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 700;
  }
  .ef-pos { background: #1a3a20; color: #5cba6a; }
  .ef-neg { background: #3a1a1a; color: #e05a5a; }

  /* log */
  .log-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.8;
  }
  .log-entry { border-bottom: 1px solid var(--border); padding: 4px 0; }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .le-day { color: var(--muted); margin-right: 8px; }
  .log-entry .le-text { }
  .log-entry.good .le-text { color: var(--green); }
  .log-entry.bad .le-text { color: var(--red); }
  .log-entry.event .le-text { color: var(--accent); }

  /* RIGHT: money & upgrades */
  .panel-right {
    border-left: 1px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .money-box {
    background: #1a1400;
    border: 1px solid #3a2a00;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .money-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .money-amount { font-family: 'Black Han Sans', sans-serif; font-size: 28px; color: var(--accent); }
  .money-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 8px;
  }
  .upgrade-list { display: flex; flex-direction: column; gap: 8px; }
  .upgrade-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .upgrade-item:hover { border-color: var(--accent3); }
  .upgrade-item.cant { opacity: 0.5; cursor: not-allowed; }
  .ui-icon { font-size: 20px; flex-shrink: 0; }
  .ui-info { flex: 1; }
  .ui-name { font-size: 12px; font-weight: 700; }
  .ui-desc { font-size: 10px; color: var(--muted); }
  .ui-cost { font-size: 12px; color: var(--accent); font-weight: 700; flex-shrink: 0; }

  /* ── EVENT MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 28px 24px;
    max-width: 440px;
    width: 100%;
    animation: popIn .3s ease;
  }
  .modal-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    background: var(--accent2);
    color: #fff;
    border-radius: 2px;
    margin-bottom: 12px;
  }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
  .modal-desc { font-size: 14px; color: #aaa; line-height: 1.6; margin-bottom: 20px; }
  .modal-choices { display: flex; flex-direction: column; gap: 10px; }
  .modal-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    text-align: left;
    transition: all .2s;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .modal-btn:hover { border-color: var(--accent); background: #1e1800; }
  .modal-btn .mb-text { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .modal-btn .mb-effect { font-size: 11px; color: var(--muted); }

  /* ── ENDING SCREEN ── */
  #screen-ending {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #100a20 0%, #0d0d0d 70%);
    padding: 20px;
  }
  .ending-box {
    text-align: center;
    max-width: 500px;
    animation: fadeUp .8s ease;
  }
  .ending-emoji { font-size: 80px; margin-bottom: 16px; }
  .ending-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 700;
    padding: 4px 14px;
    margin-bottom: 12px;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }
  .ending-title { font-family: 'Black Han Sans', sans-serif; font-size: 36px; margin-bottom: 12px; }
  .ending-desc { font-size: 14px; color: #aaa; line-height: 1.8; margin-bottom: 24px; }
  .ending-stats { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  .es-item { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; text-align: center; }
  .es-item .es-val { font-size: 22px; font-weight: 900; color: var(--accent); }
  .es-item .es-label { font-size: 11px; color: var(--muted); }
  .btn-restart {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 12px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Black Han Sans', sans-serif;
    letter-spacing: 2px;
    transition: all .2s;
  }
  .btn-restart:hover { background: var(--accent); color: #000; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes popIn { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
  @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)} }
  .shake { animation: shake .4s ease; }

  /* notification */
  .notif {
    position: fixed;
    top: 20px; right: 20px;
    background: var(--panel);
    border-left: 4px solid var(--green);
    padding: 12px 18px;
    border-radius: 4px;
    font-size: 13px;
    z-index: 200;
    animation: fadeUp .3s ease;
    max-width: 260px;
  }
  .notif.bad { border-left-color: var(--red); }

  /* progress bar on month end */
  .month-progress {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .mp-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* responsive */
  @media(max-width: 768px) {
    .game-body { grid-template-columns: 1fr; }
    .panel-left, .panel-right { border: none; border-bottom: 1px solid var(--border); }
    .activity-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════ TITLE ══════════════════════════════════ -->
<div id="screen-title" class="screen active">
  <div class="title-content">
    <div class="title-badge">LIFE SIMULATION GAME</div>
    <div class="title-char">💼</div>
    <div class="title-main">회사원 키우기</div>
    <div class="title-sub">신입에서 CEO까지 — 당신의 직장 생존기</div>

    <p style="font-size:13px;color:#888;margin-bottom:16px;">직업을 선택하세요</p>
    <div class="job-select-grid" id="jobGrid"></div>
    <button class="btn-start" id="btnStart">게임 시작 →</button>
  </div>
</div>

<!-- ══════════════════════════════════ GAME ══════════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="header-title">💼 회사원 키우기</div>
    <div class="header-info">
      <div class="hinfo">직업: <span id="hJob">-</span></div>
      <div class="hinfo">날짜: <span id="hDay">1</span>일차</div>
      <div class="hinfo">경력: <span id="hCareer">0</span>년</div>
      <div class="hinfo">직급: <span id="hRank">-</span></div>
    </div>
    <div class="header-salary">월급: <span id="hSalary">0</span>만원</div>
  </div>
  <div class="rank-bar" id="rankBar"></div>
  <div class="game-body">
    <!-- LEFT -->
    <div class="panel-left">
      <div class="char-display">
        <div class="char-emoji" id="charEmoji">💼</div>
        <div class="char-name" id="charName">신입사원</div>
        <div class="char-rank" id="charRank">인턴</div>
        <div class="char-job" id="charJob">-</div>
      </div>
      <div class="stats-section" id="statsSection"></div>
    </div>
    <!-- CENTER -->
    <div class="panel-center">
      <div class="day-header">
        <div class="day-badge" id="dayBadge">Day 1</div>
        <div class="day-title" id="dayTitle">오늘 무엇을 할까요?</div>
      </div>
      <div class="month-progress"><div class="mp-fill" id="mpFill" style="width:0%"></div></div>
      <div class="activity-grid" id="activityGrid"></div>
      <div class="section-title">오늘의 기록</div>
      <div class="log-box" id="logBox">
        <div class="log-entry"><span class="le-day">-</span><span class="le-text">게임을 시작했습니다. 파이팅!</span></div>
      </div>
    </div>
    <!-- RIGHT -->
    <div class="panel-right">
      <div class="money-box">
        <div class="money-label">💰 보유 자금</div>
        <div class="money-amount" id="moneyAmount">0</div>
        <div class="money-sub">만원</div>
        <div class="money-sub" id="moneySub" style="margin-top:8px;font-size:10px;">이번 달 월급: <span id="msalary">0</span>만원</div>
      </div>
      <div>
        <div class="section-title">💸 자기 투자</div>
        <div class="upgrade-list" id="upgradeList"></div>
      </div>
      <div>
        <div class="section-title">📊 현황</div>
        <div style="font-size:12px;color:var(--muted);line-height:2;" id="statusBox">-</div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════ ENDING ══════════════════════════════════ -->
<div id="screen-ending" class="screen">
  <div class="ending-box" id="endingBox"></div>
</div>

<!-- ══════════════════════════════════ EVENT MODAL ══════════════════════════════════ -->
<div class="modal-overlay" id="eventModal">
  <div class="modal-box" id="eventBox"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════════════

const JOBS = [
  { id:'dev', name:'IT 개발자', emoji:'💻', desc:'코딩은 내 인생, 야근은 숙명', bonus:{ 업무력:3, 창의력:2 } },
  { id:'design', name:'디자이너', emoji:'🎨', desc:'아름다움을 창조하는 예술가', bonus:{ 창의력:4, 사회성:1 } },
  { id:'sales', name:'영업사원', emoji:'📞', desc:'사람이 돈이다, 인맥이 실력', bonus:{ 사회성:4, 운:2 } },
  { id:'finance', name:'금융 분석가', emoji:'📈', desc:'숫자 속에서 진실을 찾는다', bonus:{ 업무력:3, 멘탈:2 } },
  { id:'writer', name:'콘텐츠 기획자', emoji:'✍️', desc:'이야기로 세상을 움직인다', bonus:{ 창의력:3, 사회성:2 } },
  { id:'research', name:'연구원', emoji:'🔬', desc:'진리를 향한 끝없는 탐구', bonus:{ 업무력:4, 체력:-1 } },

//  STATE

let G = {};

function initGame(jobId) {
  const job = JOBS.find(j => j.id === jobId);
  G = {
    job,
    day: 1,
    rankIdx: 0,
    career: 0,        // years
    money: 100,
    totalEarned: 0,
    ap: 3,            // actions per day
    apUsed: 0,
    monthDay: 0,      // days in current rank progress
    stats: { 업무력:10, 체력:30, 멘탈:30, 사회성:10, 창의력:10, 운:10 },
    log: [],
    eventCooldown: 0,
    rankBonus: 0,     // bonus toward next rank
  };
  // apply job bonus
  for (const [k,v] of Object.entries(job.bonus)) G.stats[k] = Math.max(0, G.stats[k]+v);
  addLog('게임 시작!', '', 'event');
  addLog(`직업: ${job.name} (${job.desc})`, '', '');
}

// ══════════════════════════════════════════════════════════════
//  CORE FUNCTIONS
// ══════════════════════════════════════════════════════════════

function clamp(v) { return Math.max(0, Math.min(100, v)); }

function applyEffects(eff) {
  for (const [k,v] of Object.entries(eff)) {
    if (G.stats[k] !== undefined) G.stats[k] = clamp(G.stats[k] + v);
  }
}

function addLog(text, day, type) {
  G.log.unshift({ text, day: day || `Day${G.day}`, type });
  if (G.log.length > 60) G.log.pop();
}

function doActivity(act) {
  if (G.apUsed >= G.ap) { showNotif('오늘 행동력을 모두 사용했습니다!', true); return; }
  if (G.money < act.cost) { showNotif('돈이 부족합니다!', true); return; }
  G.money -= act.cost;
  G.apUsed++;
  applyEffects(act.effects);
  // build log text
  let parts = [];
  for (const [k,v] of Object.entries(act.effects)) {
    if (v > 0) parts.push(`${k}+${v}`);
    else parts.push(`${k}${v}`);
  }
  addLog(`[${act.name}] ${parts.join(', ')}`, '', act.effects.체력 < -3 || act.effects.멘탈 < -3 ? 'bad' : 'good');
  checkGameOver();
  render();

  // random event chance
  if (G.apUsed === G.ap && G.eventCooldown <= 0 && Math.random() < 0.55) {
    setTimeout(() => triggerEvent(), 300);
  }
}

function endDay() {
  if (G.apUsed < G.ap) {
    // auto-rest remaining AP
    addLog('남은 시간에 휴식을 취했습니다.', '', '');
    G.stats.체력 = clamp(G.stats.체력 + (G.ap - G.apUsed));
    G.stats.멘탈 = clamp(G.stats.멘탈 + (G.ap - G.apUsed));
  }
  G.day++;
  G.monthDay++;
  G.apUsed = 0;
  G.eventCooldown = Math.max(0, G.eventCooldown - 1);

  // monthly salary
  const rank = RANKS[G.rankIdx];
  if (G.day % 30 === 0) {
    const sal = rank.salary;
    G.money += sal;
    G.totalEarned += sal;
    G.career = Math.floor(G.day / 365);
    addLog(`📅 월급 ${sal}만원 수령! 누적 ${G.money}만원`, '', 'event');
    showNotif(`💰 월급 ${sal}만원 지급!`);
  }

  // rank up check
  const daysNeeded = rank.days;
  if (G.monthDay >= daysNeeded && G.rankIdx < RANKS.length - 1) {
    // check stat requirements roughly
    const avgStat = Object.values(G.stats).reduce((a,b)=>a+b,0) / 6;
    if (avgStat >= 20 + G.rankIdx * 5 || G.rankBonus > 0) {
      G.rankIdx++;
      G.monthDay = 0;
      G.rankBonus = 0;
      const newRank = RANKS[G.rankIdx];
      addLog(`🎉 승진! [${newRank.name}] 으로 승진했습니다! 연봉 ${newRank.salary}만원/월`, '', 'event');
      showNotif(`🎉 ${newRank.name}으로 승진!`);
      if (G.rankIdx === RANKS.length - 1) {
        setTimeout(() => triggerEnding(), 800);
        return;
      }
    } else {
      addLog('📊 승진 심사 통과 실패... 더 성장이 필요합니다.', '', 'bad');
      G.monthDay = Math.floor(daysNeeded * 0.5);
    }
  }

  checkGameOver();
  render();
}

function checkGameOver() {
  if (G.stats.체력 <= 0) { triggerEnding('burnout'); return; }
  if (G.stats.멘탈 <= 0) { triggerEnding('crazy'); return; }
  if (G.money >= 3000 && G.day > 100) { triggerEnding('rich'); return; }
  if (G.stats.사회성 >= 80 && G.rankIdx >= 7) { triggerEnding('social'); return; }
  if (G.stats.업무력 >= 90) { triggerEnding('genius'); return; }
  if (G.rankIdx >= 10) { triggerEnding('ceo'); return; }
}

function doUpgrade(upg) {
  if (G.money < upg.cost) { showNotif('돈이 부족합니다!', true); return; }
  G.money -= upg.cost;
  applyEffects(upg.effect);
  let parts = Object.entries(upg.effect).map(([k,v])=>`${k}+${v}`).join(', ');
  addLog(`[투자] ${upg.name} → ${parts}`, '', 'good');
  showNotif(`✅ ${upg.name} 구매 완료!`);
  render();
}

function triggerEvent() {
  const pool = EVENTS.filter(e => e.id !== G.lastEventId);
  const ev = pool[Math.floor(Math.random() * pool.length)];
  G.lastEventId = ev.id;
  G.eventCooldown = 3;
  showEvent(ev);
}

function showEvent(ev) {
  const box = document.getElementById('eventBox');
  box.innerHTML = `
    <div class="modal-tag">${ev.tag}</div>
    <div class="modal-title">${ev.emoji} ${ev.title}</div>
    <div class="modal-desc">${ev.desc}</div>
    <div class="modal-choices">
      ${ev.choices.map((c,i) => `
        <button class="modal-btn" onclick="resolveEvent(${ev.choices.indexOf(c) === -1 ? i : JSON.stringify(ev).indexOf(c)}, ${JSON.stringify(ev.id)})">
          <div class="mb-text">${c.text}</div>
          <div class="mb-effect">${Object.entries(c.effect).map(([k,v])=>`${k}${v>0?'+':''}${v}`).join(' | ')}${c.money ? ` | 💰${c.money>0?'+':''}${c.money}만원` : ''}</div>
        </button>
      `).join('')}
    </div>
  `;
  // attach click handlers properly
  box.querySelectorAll('.modal-btn').forEach((btn, i) => {
    btn.onclick = () => resolveEventChoice(ev, i);
  });
  document.getElementById('eventModal').classList.add('open');
}

function resolveEventChoice(ev, idx) {
  const choice = ev.choices[idx];
  applyEffects(choice.effect);
  if (choice.money) {
    G.money += choice.money;
    if (choice.money > 0) G.totalEarned += choice.money;
  }
  if (choice.rankBonus) G.rankBonus++;
  const type = choice.logGood ? 'good' : 'bad';
  addLog(`[이벤트] ${choice.logGood || choice.logBad}`, '', type);
  document.getElementById('eventModal').classList.remove('open');
  checkGameOver();
  render();
}

function triggerEnding(id) {
  let ending;
  if (id) ending = ENDINGS.find(e => e.id === id);
  else ending = ENDINGS.find(e => e.cond(G));
  if (!ending) ending = ENDINGS[ENDINGS.length - 1];
  showEnding(ending);
}

// ══════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════

const STAT_COLORS = {
  업무력:'#5a90e0', 체력:'#5cba6a', 멘탈:'#a07ae0',
  사회성:'#f0c040', 창의력:'#e07aa0', 운:'#4ab8a0'
};

function render() {
  const rank = RANKS[G.rankIdx];
  const nextRank = RANKS[G.rankIdx + 1];

  // header
  document.getElementById('hJob').textContent = G.job.name;
  document.getElementById('hDay').textContent = G.day;
  document.getElementById('hCareer').textContent = G.career;
  document.getElementById('hRank').textContent = rank.name;
  document.getElementById('hSalary').textContent = rank.salary.toLocaleString();

  // rank bar
  renderRankBar();

  // char
  document.getElementById('charEmoji').textContent = G.job.emoji;
  document.getElementById('charName').textContent = G.job.name;
  document.getElementById('charRank').textContent = rank.name;
  document.getElementById('charJob').textContent = `경력 ${G.career}년 | Day ${G.day}`;

  // stats
  const sec = document.getElementById('statsSection');
  sec.innerHTML = Object.entries(G.stats).map(([k,v]) => `
    <div class="stat-row">
      <div class="stat-head">
        <span class="stat-name">${k}</span>
        <span class="stat-val" style="color:${STAT_COLORS[k]}">${v}</span>
      </div>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${v}%;background:${STAT_COLORS[k]}"></div>
      </div>
    </div>
  `).join('');

  // day header
  document.getElementById('dayBadge').textContent = `Day ${G.day}`;
  document.getElementById('dayTitle').textContent = G.apUsed >= G.ap
    ? '오늘 행동 완료! → 다음 날로 이동하세요'
    : `행동력 ${G.ap - G.apUsed}/${G.ap} 남음`;

  // month progress
  const prog = Math.min(100, (G.monthDay / RANKS[G.rankIdx].days) * 100);
  document.getElementById('mpFill').style.width = prog + '%';

  // activities
  const grid = document.getElementById('activityGrid');
  grid.innerHTML = '';
  ACTIVITIES.forEach(act => {
    const disabled = G.apUsed >= G.ap || G.money < act.cost;
    const effHtml = Object.entries(act.effects).map(([k,v]) =>
      `<span class="effect-tag ${v>0?'ef-pos':'ef-neg'}">${k}${v>0?'+':''}${v}</span>`
    ).join('');
    const card = document.createElement('div');
    card.className = 'act-card' + (disabled ? ' disabled' : '');
    card.style.setProperty('--card-color', act.color);
    card.innerHTML = `
      <div class="ac-icon">${act.icon}</div>
      <div class="ac-name">${act.name}${act.cost ? ` <span style="color:var(--accent);font-size:11px;">(-${act.cost}만원)</span>` : ''}</div>
      <div class="ac-desc">${act.desc}</div>
      <div class="ac-effects">${effHtml}</div>
    `;
    if (!disabled) card.onclick = () => doActivity(act);
    grid.appendChild(card);
  });

  // End Day button
  let endBtn = document.getElementById('endDayBtn');
  if (!endBtn) {
    endBtn = document.createElement('button');
    endBtn.id = 'endDayBtn';
    endBtn.style.cssText = 'width:100%;margin-top:16px;padding:14px;background:var(--accent);color:#000;border:none;font-size:15px;font-weight:900;cursor:pointer;border-radius:6px;font-family:"Black Han Sans",sans-serif;letter-spacing:2px;transition:all .2s;';
    endBtn.textContent = '다음 날 →';
    endBtn.onmouseenter = () => { endBtn.style.background = '#ffd040'; };
    endBtn.onmouseleave = () => { endBtn.style.background = 'var(--accent)'; };
    endBtn.onclick = endDay;
    document.getElementById('activityGrid').parentElement.appendChild(endBtn);
  }

  // log
  const logBox = document.getElementById('logBox');
  logBox.innerHTML = G.log.slice(0,20).map(l =>
    `<div class="log-entry ${l.type}"><span class="le-day">${l.day}</span><span class="le-text">${l.text}</span></div>`
  ).join('');

  // money
  document.getElementById('moneyAmount').textContent = G.money.toLocaleString();
  document.getElementById('msalary').textContent = rank.salary.toLocaleString();

  // upgrades
  const ul = document.getElementById('upgradeList');
  ul.innerHTML = UPGRADES.map(u => `
    <div class="upgrade-item ${G.money < u.cost ? 'cant' : ''}" data-id="${u.id}">
      <span class="ui-icon">${u.icon}</span>
      <div class="ui-info">
        <div class="ui-name">${u.name}</div>
        <div class="ui-desc">${u.desc}</div>
      </div>
      <span class="ui-cost">${u.cost}만원</span>
    </div>
  `).join('');
  ul.querySelectorAll('.upgrade-item:not(.cant)').forEach(el => {
    el.onclick = () => doUpgrade(UPGRADES.find(u => u.id === el.dataset.id));
  });

  // status
  const avgStat = Math.round(Object.values(G.stats).reduce((a,b)=>a+b,0)/6);
  const nextNeeded = nextRank ? rank.days - G.monthDay : 0;
  document.getElementById('statusBox').innerHTML = `
    📊 평균 능력치: <b style="color:var(--accent)">${avgStat}</b><br>
    🏅 현재 직급: <b>${rank.name}</b><br>
    ${nextRank ? `⬆️ 다음 직급까지: <b style="color:var(--accent3)">${Math.max(0,nextNeeded)}일</b>` : '👑 최고 직급!'}
    <br>💸 누적 수익: <b>${G.totalEarned.toLocaleString()}만원</b>
  `;
}

function renderRankBar() {
  const bar = document.getElementById('rankBar');
  bar.innerHTML = '';
  RANKS.forEach((r, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = 'rank-line' + (i <= G.rankIdx ? ' done' : '');
      bar.appendChild(line);
    }
    const step = document.createElement('div');
    step.className = 'rank-step' + (i < G.rankIdx ? ' done' : '') + (i === G.rankIdx ? ' current' : '');
    step.innerHTML = `<div class="rs-dot"></div><div class="rs-label">${r.name}</div>`;
    bar.appendChild(step);
  });
}

function showEnding(ending) {
  // compute final stats
  const statEntries = Object.entries(G.stats);
  const endBox = document.getElementById('endingBox');
  endBox.innerHTML = `
    <div class="ending-emoji">${ending.emoji}</div>
    <div class="ending-tag" style="background:${ending.tagColor};color:#000">${ending.tag}</div>
    <div class="ending-title" style="color:${ending.tagColor}">${ending.title}</div>
    <div class="ending-desc">${ending.desc}</div>
    <div class="ending-stats">
      <div class="es-item"><div class="es-val">${G.day}</div><div class="es-label">총 일수</div></div>
      <div class="es-item"><div class="es-val">${RANKS[G.rankIdx].name}</div><div class="es-label">최종 직급</div></div>
      <div class="es-item"><div class="es-val">${G.money.toLocaleString()}만</div><div class="es-label">최종 자산</div></div>
      <div class="es-item"><div class="es-val">${G.totalEarned.toLocaleString()}만</div><div class="es-label">누적 수익</div></div>
      ${statEntries.map(([k,v])=>`<div class="es-item"><div class="es-val" style="color:${STAT_COLORS[k]}">${v}</div><div class="es-label">${k}</div></div>`).join('')}
    </div>
    <button class="btn-restart" onclick="restartGame()">다시 시작하기</button>
  `;
  switchScreen('screen-ending');
}

function showNotif(msg, bad) {
  const n = document.createElement('div');
  n.className = 'notif' + (bad ? ' bad' : '');
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2200);
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function restartGame() {
  switchScreen('screen-title');
  document.querySelectorAll('.job-card').forEach(c => c.classList.remove('selected'));
}

// ══════════════════════════════════════════════════════════════
//  INIT UI
// ══════════════════════════════════════════════════════════════

let selectedJob = null;

function buildTitleScreen() {
  const grid = document.getElementById('jobGrid');
  grid.innerHTML = JOBS.map(j => `
    <div class="job-card" data-id="${j.id}">
      <div class="jc-emoji">${j.emoji}</div>
      <div class="jc-name">${j.name}</div>
      <div class="jc-desc">${j.desc}</div>
      <div style="margin-top:8px;font-size:10px;color:#5a90e0;">
        ${Object.entries(j.bonus).map(([k,v])=>`${k}${v>0?'+':''}${v}`).join(' ')}
      </div>
    </div>
  `).join('');
  grid.querySelectorAll('.job-card').forEach(card => {
    card.onclick = () => {
      document.querySelectorAll('.job-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedJob = card.dataset.id;
    };
  });
  // default select first
  grid.querySelector('.job-card').click();
}

document.getElementById('btnStart').onclick = () => {
  if (!selectedJob) { showNotif('직업을 선택해주세요!', true); return; }
  initGame(selectedJob);
  switchScreen('screen-game');
  render();
};

buildTitleScreen();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>만약 UFC 선수가 된다면</title>
<style>
  body { font-family: '맑은 고딕', sans-serif; background: #f0f0f0; padding: 20px; }
  h1 { color: #333; text-align: center; }
  .question { margin: 20px 0; }
  label { display: block; margin: 8px 0; cursor: pointer; }
  button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background-color: #4466ff; color: white; border: none; border-radius: 5px; }
  #result { margin-top: 30px; padding: 20px; background: #e0e7ff; border-radius: 10px; }
</style>
</head>
<body>
<h1>만약 UFC 선수가 된다면?</h1>

<div class="question" id="q1">
  <strong>1. 체급을 골라주세요</strong><br>
  <label><input type="radio" name="weight" value="플라이급" /> 플라이급 (<5kg 57kg 이하)</label>
  <label><input type="radio" name="weight" value="라이트급" /> 라이트급 (61kg 이하)</label>
  <label><input type="radio" name="weight" value="웰터급" /> 웰터급 (77kg 이하)</label>
  <label><input type="radio" name="weight" value="미들급" /> 미들급 (84kg 이하)</label>
  <label><input type="radio" name="weight" value="헤비급" /> 헤비급 (120kg 이하)</label>
</div>

<div class="question" id="q2">
  <strong>2. 너의 경기 스타일은?</strong><br>
  <label><input type="radio" name="style" value="빠르고 기술적" /> 빠르고 기술적인 공격 선호</label>
  <label><input type="radio" name="style" value="힘과 근력" /> 힘과 근력이 강한 공격 선호</label>
  <label><input type="radio" name="style" value="그래플링"> 주로 그라운드 기술 선호 (레슬링, 주짓수)</label>
  <label><input type="radio" name="style" value="타격"> 주로 타격 기술 선호 (복싱, 무에타이)</label>
</div>

<div class="question" id="q3">
  <strong>3. 너의 성격은?</strong><br>
  <label><input type="radio" name="personality" value="침착" /> 침착하고 신중함</label>
  <label><input type="radio" name="personality" value="열정적" /> 열정적이고 공격적임</label>
  <label><input type="radio" name="personality" value="인내심강함" /> 인내심이 강함</label>
  <label><input type="radio" name="personality" value="빠른결단" /> 빠른 결단력</label>
</div>

<button onclick="showResult()">결과 보기</button>

<div id="result"></div>

<script>
function showResult() {
  const weight = document.querySelector('input[name="weight"]:checked');
  const style = document.querySelector('input[name="style"]:checked');
  const personality = document.querySelector('input[name="personality"]:checked');
  const resultDiv = document.getElementById('result');
  if (!weight || !style || !personality) {
    resultDiv.innerHTML = '<p style="color:red;">모든 질문에 답해 주세요!</p>';
    return;
  }

  let recommendation = '';
  // 간단한 추천 로직
  if(style.value === '빠르고 기술적') {
    recommendation = '종합격투기 또는 복싱을 추천해요! 빠르고 정확한 기술이 빛나는 스타일이에요.';
  } else if(style.value === '힘과 근력') {
    recommendation = '레슬링이나 MMA의 그라운드 기술이 잘 어울려요! 힘과 근력이 강한 선수 스타일!';
  } else if(style.value === '그래플링') {
    recommendation = '브라질리언 주짓수 추천! 바닥 싸움과 기술 활용에 강하답니다.';
  } else if(style.value === '타격') {
    recommendation = '무에타이나 킥복싱! 강력한 타격으로 상대를 압도하는 스타일이에요.';
  }

  let personalityComment = '';
  if(personality.value === '침착') personalityComment = '침착함 덕분에 큰 경기에서도 실수를 줄일 수 있겠네요.';
  else if(personality.value === '열정적') personalityComment = '열정이 넘쳐 분위기를 주도할 거예요!';
  else if(personality.value === '인내심강함') personalityComment = '힘든 상황에서도 끝까지 버티는 끈기가 돋보여요.';
  else if(personality.value === '빠른결단') personalityComment = '빠른 판단력으로 유리한 기회를 잡을 거예요.';

  resultDiv.innerHTML = `
    <h3>당신에게 어울리는 격투기 추천!</h3>
    <p>체급: <strong>${weight.value}</strong></p>
    <p>추천 종목: <strong>${recommendation}</strong></p>
    <p>${personalityComment}</p>
  `;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 직업 추천 테스트</title>

<style>

body{
    margin:0;
    background:#121826;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:800px;
    background:#1c2435;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#ff66cc;
}

.question{
    margin-top:30px;
    font-size:24px;
}

.options{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    padding:18px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.optionA{
    background:#2ecc71;
    color:white;
}

.optionB{
    background:#f1c40f;
    color:black;
}

.progress{
    margin-top:10px;
    color:#aaa;
}

.result{
    text-align:center;
}

.result h2{
    font-size:50px;
    color:#ffd166;
}

.job{
    background:#2a3348;
    margin:10px 0;
    padding:15px;
    border-radius:10px;
}

.bar-wrap{
    margin:15px 0;
}

.bar-label{
    margin-bottom:5px;
}

.bar{
    height:24px;
    background:#333;
    border-radius:12px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#00d4ff;
}

.restart{
    background:#ff66cc;
    color:white;
    margin-top:30px;
}

</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

const QUESTIONS = [
{
question:"주말에 에너지를 충전하는 방식은?",
axis:"EI",
a:"친구들과 만나거나 새로운 사람들과 어울린다",
b:"혼자만의 시간을 갖거나 조용히 보낸다"
},
{
question:"모임에서 나는?",
axis:"EI",
a:"먼저 말을 걸고 대화를 주도한다",
b:"상대가 먼저 말을 걸어주길 기다린다"
},
{
question:"새로운 정보를 받아들일 때 나는?",
axis:"SN",
a:"구체적인 사실과 세부 사항에 집중한다",
b:"전체적인 패턴과 가능성에 집중한다"
},
{
question:"문제를 해결할 때 주로?",
axis:"SN",
a:"검증된 방법을 선호한다",
b:"새로운 아이디어를 떠올린다"
},
{
question:"결정을 내릴 때 나는?",
axis:"TF",
a:"논리와 객관적인 근거를 따른다",
b:"감정과 사람의 영향을 고려한다"
},
{
question:"친구가 고민을 털어놓을 때 나는?",
axis:"TF",
a:"해결책을 제시한다",
b:"공감하고 위로한다"
},
{
question:"여행 계획을 세울 때 나는?",
axis:"JP",
a:"일정을 꼼꼼히 계획한다",
b:"즉흥적으로 움직인다"
},
{
question:"마감 기한이 있을 때 나는?",
axis:"JP",
a:"미리 끝내야 마음이 편하다",
b:"마감 직전에 집중력이 올라간다"
},
{
question:"나에게 더 잘 맞는 작업 환경은?",
axis:"EI",
a:"협업 중심 환경",
b:"혼자 집중 가능한 환경"
},
{
question:"나는 주로 어떤 방식으로 생각하는가?",
axis:"TF",
a:"맞고 틀림을 따진다",
b:"좋고 나쁨을 느낀다"
}
];

const JOBS = {
INTJ:{
label:"전략가",
desc:"독립적이고 전략적인 사고가",
jobs:["전략 컨설턴트","데이터 과학자","연구원","투자 분석가","소프트웨어 아키텍트"]
},
INFP:{
label:"중재자",
desc:"공감 능력이 뛰어난 이상주의자",
jobs:["작가","디자이너","예술가","교사","사회운동가"]
},
ENTP:{
label:"변론가",
desc:"혁신적이고 아이디어가 풍부한 토론가",
jobs:["창업가","마케터","UX 디자이너","방송 작가","변호사"]
},
ISTJ:{
label:"현실주의자",
desc:"책임감 강한 실무형 인재",
jobs:["공무원","회계사","품질 관리자","군인","행정 관리자"]
}
};

const DEFAULT_INFO = {
label:"균형형",
desc:"다양한 성향을 가진 타입",
jobs:["기획자","콘텐츠 제작자","교육자","개발자","분석가"]
};

let current = 0;

let scores = {
EI:0,
SN:0,
TF:0,
JP:0
};

let counts = {
EI:0,
SN:0,
TF:0,
JP:0
};

const app = document.getElementById("app");

function renderQuestion(){

    const q = QUESTIONS[current];

    app.innerHTML = `
        <h1>🧠 MBTI 직업 추천 테스트</h1>

        <div class="progress">
            ${current + 1} / ${QUESTIONS.length}
        </div>

        <div class="question">
            ${q.question}
        </div>

        <div class="options">
            <button class="optionA" onclick="answer(true)">
                A. ${q.a}
            </button>

            <button class="optionB" onclick="answer(false)">
                B. ${q.b}
            </button>
        </div>
    `;
}

function answer(isA){

    const axis = QUESTIONS[current].axis;

    if(isA){
        scores[axis]++;
    }

    counts[axis]++;

    current++;

    if(current >= QUESTIONS.length){
        showResult();
    }else{
        renderQuestion();
    }
}

function calcMBTI(){

    let mbti = "";

    mbti += scores.EI / counts.EI >= 0.5 ? "E" : "I";
    mbti += scores.SN / counts.SN >= 0.5 ? "S" : "N";
    mbti += scores.TF / counts.TF >= 0.5 ? "T" : "F";
    mbti += scores.JP / counts.JP >= 0.5 ? "J" : "P";

    return mbti;
}

function makeBar(title, ratio){

    return `
        <div class="bar-wrap">
            <div class="bar-label">
                ${title} (${Math.round(ratio * 100)}%)
            </div>

            <div class="bar">
                <div class="fill" style="width:${ratio*100}%"></div>
            </div>
        </div>
    `;
}

function showResult(){

    const mbti = calcMBTI();

    const info = JOBS[mbti] || DEFAULT_INFO;

    const ei = scores.EI / counts.EI;
    const sn = scores.SN / counts.SN;
    const tf = scores.TF / counts.TF;
    const jp = scores.JP / counts.JP;

    app.innerHTML = `
        <div class="result">

            <h1>🎉 분석 결과</h1>

            <h2>${mbti}</h2>

            <h3>${info.label}</h3>

            <p>${info.desc}</p>

            <h3>성향 분포</h3>

            ${makeBar("E 성향", ei)}
            ${makeBar("S 성향", sn)}
            ${makeBar("T 성향", tf)}
            ${makeBar("J 성향", jp)}

            <h3>추천 직업 TOP 5</h3>

            ${info.jobs.map(job => `
                <div class="job">${job}</div>
            `).join("")}

            <button class="restart" onclick="restart()">
                다시 하기
            </button>

        </div>
    `;
}

function restart(){

    current = 0;

    scores = {
        EI:0,
        SN:0,
        TF:0,
        JP:0
    };

    counts = {
        EI:0,
        SN:0,
        TF:0,
        JP:0
    };

    renderQuestion();
}

renderQuestion();

</script>

</body>
</html>

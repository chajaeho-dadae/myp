<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>은주 키우기 게임</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #ffd6e7, #d6ecff);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.game {
  background: white;
  width: 90%;
  max-width: 520px;
  padding: 24px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h1 {
  margin-top: 0;
}

.emoji {
  font-size: 90px;
  margin: 20px 0;
}

.bar {
  width: 100%;
  height: 24px;
  background: #eee;
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 16px;
}

.fill {
  height: 100%;
  transition: 0.3s;
}

.hunger {
  background: orange;
}

.happy {
  background: hotpink;
}

.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 20px;
}

button {
  border: none;
  border-radius: 16px;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  cursor: pointer;
}

.feed {
  background: #4a90e2;
}

.pat {
  background: #ff4fa3;
}

.message {
  margin-top: 20px;
  background: #f4f4f4;
  border-radius: 16px;
  padding: 16px;
  min-height: 40px;
  font-size: 18px;
}
</style>
</head>
<body>
<div class="game">
  <h1>👶 은주 키우기 게임</h1>
  <p>은주를 20살까지 키워보세요!</p>

  <div id="face" class="emoji">😊</div>

  <h2>은주 나이: <span id="age">0</span>살</h2>

  <p>배고픔</p>
  <div class="bar">
    <div id="hunger" class="fill hunger" style="width:40%"></div>
  </div>

  <p>기분</p>
  <div class="bar">
    <div id="happy" class="fill happy" style="width:80%"></div>
  </div>

  <div class="buttons">
    <button class="feed" onclick="feedMilk()">🍼 분유 먹이기</button>
    <button class="pat" onclick="patEunju()">🤲 쓰다듬기</button>
  </div>

  <div id="message" class="message">
    은주가 태어났어요 👶
  </div>
</div>

<script>
let age = 0;
let hunger = 40;
let happy = 80;
let crying = false;
let clear = false;

function updateUI() {
  document.getElementById('age').innerText = age.toFixed(1);
  document.getElementById('hunger').style.width = hunger + '%';
  document.getElementById('happy').style.width = happy + '%';

  const face = document.getElementById('face');

  if (clear) {
    face.innerText = '🎓';
  } else if (crying) {
    face.innerText = '😭';
  } else if (happy > 60) {
    face.innerText = '😊';
  } else {
    face.innerText = '🙂';
  }
}

function message(text) {
  document.getElementById('message').innerText = text;
}

function feedMilk() {
  if (clear) return;

  hunger -= 35;
  if (hunger < 0) hunger = 0;

  happy += 10;
  if (happy > 100) happy = 100;

  crying = false;

  message('🍼 은주가 분유를 맛있게 먹었어요!');
  updateUI();
}

function patEunju() {
  if (clear) return;

  crying = false;
  happy += 15;

  if (happy > 100) happy = 100;

  message('😊 은주가 울음을 멈추고 웃어요!');
  updateUI();
}

setInterval(() => {
  if (clear) return;

  age += 0.5;
  hunger += 8;
  happy -= 5;

  if (hunger >= 70) {
    crying = true;
    message('😭 은주가 배고파서 울고 있어요!');
  }

  if (hunger > 100) hunger = 100;
  if (happy < 0) happy = 0;

  if (age >= 20) {
    clear = true;
    message('🎉 축하합니다! 은주를 20살까지 키웠어요!');
  }

  updateUI();
}, 2500);

updateUI();
</script>
</body>
</html>

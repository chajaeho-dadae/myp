<style>

   font-family: Arial, sans-serif;
   background:#f2f7f8;
   margin:0;
   padding:20px;
}

.container{
   max-width:950px;
   margin:auto;
   background:white;
   padding:25px;
   border-radius:15px;
   box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
   text-align:center;
   color:#1f7a7a;
}

textarea{
   width:100%;
   height:120px;
   padding:12px;
   border-radius:10px;
   border:1px solid #ccc;
   font-size:16px;
   resize:none;
}

button{
   width:100%;
   padding:15px;
   margin-top:15px;
   border:none;
   border-radius:10px;
   background:#1f7a7a;
   color:white;
   font-size:18px;
   cursor:pointer;
}

button:hover{
   background:#155d5d;
}

.box{
   margin-top:20px;
   padding:18px;
   border-radius:12px;
   background:#eef7f7;
}

.food-card{
   background:white;
   padding:15px;
   border-radius:12px;
   margin-top:15px;
   border-left:6px solid #1f7a7a;
}

.food-card h3{
   margin:0;
   color:#1f7a7a;
}

.tag{
   display:inline-block;
   background:#d7f0f0;
   padding:5px 10px;
   border-radius:20px;
   margin:4px;
   font-size:14px;
}

// 분석 함수
function analyzeFood(){

   const input = document.getElementById("foodInput").value.trim();
   const result = document.getElementById("result");

   if(input === ""){
       result.innerHTML = `
       <div class="box">
       ⚠️ 음식을 입력해주세요!
       </div>
       `;
       return;
   }

   let foundFoods = [];
   let nutrients = [];
   let recommendations = [];

   // 음식 찾기
   for(let food in foodDatabase){

       if(input.includes(food)){

           foundFoods.push(food);

           foodDatabase[food].nutrients.forEach(n=>{
               nutrients.push(n);
           });
       }
   }

   // 중복 제거
   nutrients = [...new Set(nutrients)];

   // 추천 음식 찾기
   nutrients.forEach(nutrient=>{

       if(healthyRecommendations[nutrient]){

           healthyRecommendations[nutrient].forEach(food=>{
               recommendations.push(food);
           });
       }
   });

   // 중복 제거
   recommendations = recommendations.filter(
       (item, index, self) =>
       index === self.findIndex((t) => t.name === item.name)
   );

   // 랜덤 추천 섞기
   recommendations.sort(() => Math.random() - 0.5);

   // 최대 6개 추천
   recommendations = recommendations.slice(0,6);

   let html = "";

   // 분석 결과
   if(foundFoods.length > 0){

       html += `
       <div class="box">

       <h2>🔍 음식 분석 결과</h2>

       <p>
       <strong>입력한 음식:</strong>
       ${foundFoods.join(", ")}
       </p>

       <p><strong>많이 포함된 성분:</strong></p>
       `;

       nutrients.forEach(n=>{
           html += `<span class="tag">${n}</span>`;
       });

       html += `</div>`;

   } else {

       html += `
       <div class="box">
       입력한 음식 데이터를 찾지 못했어요 😢
       </div>
       `;
   }

   // 추천 음식 출력
   html += `
   <div class="box">
   <h2>🥗 건강 추천 음식</h2>
   `;

   recommendations.forEach(food=>{

       html += `
       <div class="food-card">

           <h3>${food.name}</h3>

           <p>
           <strong>칼로리:</strong>
           ${food.calories}
           </p>

           <p>
           <strong>설명:</strong>
           ${food.info}
           </p>

       </div>
       `;
   });

   html += `
   </div>

   <div class="box">

   💡 건강 팁<br><br>

   • 나트륨이 많은 음식 후에는 물을 충분히 마셔보세요.<br>
   • 기름진 음식을 먹었다면 채소를 함께 먹는 것이 좋아요.<br>
   • 성장기에는 단백질과 칼슘 섭취가 중요해요!

   </div>
   `;

   result.innerHTML = html;
}

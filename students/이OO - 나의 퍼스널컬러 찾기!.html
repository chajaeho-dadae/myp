<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 퍼스널컬러 찾기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf8f3;
  --card: #ffffff;
  --text: #2a2118;
  --muted: #8a7d72;
  --border: #ede5dc;
  --accent: #c9856a;
  --accent-light: #f5e8e1;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 48px;
}
.wrap { max-width: 600px; margin: 0 auto; }

/* Header */
.site-header { text-align: center; padding: 32px 0 28px; }
.site-header .en { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.site-header h1 {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.site-header p { font-size: 14px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

/* Progress */
.progress-wrap { margin-bottom: 24px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

/* Card */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 16px;
}
.q-label { font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
.q-title { font-family: 'Nanum Myeongjo', serif; font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
.q-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }

/* Options */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg);
  font-size: 14px;
  color: var(--text);
  text-align: left;
}
.opt:hover { border-color: var(--accent); background: var(--accent-light); }
.opt.selected { border-color: var(--accent); background: var(--accent-light); font-weight: 500; }
.opt-swatch {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.08);
}
.opt-multi { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt-multi .opt { flex-direction: column; align-items: flex-start; gap: 6px; }
.opt-multi .opt-swatch { width: 100%; height: 36px; border-radius: 8px; }

/* Nav buttons */
.nav { display: flex; gap: 10px; margin-top: 8px; }
.btn {
  flex: 1; padding: 14px;
  border-radius: 14px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-prev { background: var(--bg); border: 1.5px solid var(--border); color: var(--muted); }
.btn-prev:hover { border-color: var(--muted); color: var(--text); }
.btn-next { background: var(--accent); border: 1.5px solid var(--accent); color: #fff; }
.btn-next:hover { background: #b8704f; border-color: #b8704f; }
.btn-next:disabled { background: var(--border); border-color: var(--border); color: var(--muted); cursor: not-allowed; }

/* Result */
.result-header { text-align: center; padding: 8px 0 20px; }
.result-type-badge {
  display: inline-block;
  padding: 6px 18px;
  border-radius: 999px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
  margin-bottom: 14px;
}
.result-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 28px; font-weight: 700;
  margin-bottom: 8px;
}
.result-sub { font-size: 14px; color: var(--muted); line-height: 1.7; }

.palette-row { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
.swatch-lg { width: 48px; height: 48px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.07); }

.section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.tag {
  padding: 6px 14px; border-radius: 999px; font-size: 13px;
  border: 1px solid var(--border);
}
.tag.good { background: #eaf4e8; border-color: #b8ddb5; color: #3a6e35; }
.tag.bad  { background: #faeaea; border-color: #e8b8b8; color: #7a2c2c; }

.makeup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.makeup-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px;
}
.makeup-card .mk-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
.makeup-card .mk-val { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5; }

.tip-box {
  background: var(--accent-light); border: 1px solid #e8c5b5;
  border-radius: 14px; padding: 16px; font-size: 13px;
  color: #6b3d2c; line-height: 1.7;
}

.restart-btn {
  display: block; width: 100%; padding: 14px;
  margin-top: 16px;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 14px; font-size: 14px; font-weight: 500;
  color: var(--muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.restart-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Intro */
.intro-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
.intro-feats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
.feat { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.feat .feat-icon { font-size: 22px; margin-bottom: 6px; }
.feat .feat-label { font-size: 11px; color: var(--muted); }
.start-btn {
  display: block; width: 100%; padding: 16px;
  background: var(--accent); border: none;
  border-radius: 14px; font-size: 16px; font-weight: 600;
  color: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s; letter-spacing: 0.05em;
}
.start-btn:hover { background: #b8704f; }

.screen { display: none; }
.screen.active { display: block; }
</style>
</head>

<div class="wrap">

    <h1>나의 퍼스널컬러 찾기</h1>
    <p>몇 가지 질문으로 나에게 딱 맞는<br>컬러 타입을 찾아드릴게요 ✨</p>
  </div>

  <!-- Intro Screen -->
  <div class="screen active" id="screen-intro">
    <div class="card">
      <div class="intro-icon">🪞</div>
      <div class="intro-feats">
        <div class="feat"><div class="feat-icon">🎨</div><div class="feat-label">퍼스널컬러 진단</div></div>
        <div class="feat"><div class="feat-icon">👗</div><div class="feat-label">어울리는 옷 추천</div></div>
        <div class="feat"><div class="feat-icon">💄</div><div class="feat-label">메이크업 가이드</div></div>
      </div>
      <p style="font-size:13px; color:var(--muted); line-height:1.8; margin-bottom:20px;">
        퍼스널컬러란 나의 피부·눈동자·머리색과 가장 잘 어울리는 색깔 톤이에요.<br>
        총 <strong>7개</strong> 질문으로 당신의 타입을 분석해드릴게요.
      </p>
      <button class="start-btn" onclick="startQuiz()">진단 시작하기 →</button>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div class="screen" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">1 / 7</span>
        <span id="prog-pct">14%</span>

      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:14%"></div></div>
    </div>
    <div class="card" id="q-card"></div>
    <div class="nav">
      <button class="btn btn-prev" id="btn-prev" onclick="prevQ()">← 이전</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQ()" disabled>다음 →</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="screen" id="screen-result">
    <div class="card" id="result-card"></div>
    <button class="restart-btn" onclick="restart()">↩ 다시 진단하기</button>

let currentQ = 0;

function startQuiz() {
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  currentQ = 0;
  answers = {};
  renderQ();
}

function renderQ() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const pct = Math.round(((currentQ+1)/total)*100);
  document.getElementById('prog-label').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').disabled = !answers[q.id];

  const card = document.getElementById('q-card');
  let optsHtml = '';
  if (q.type === 'single') {
    optsHtml = `<div class="options">` + q.options.map(o =>
      `<div class="opt${answers[q.id]===o.value?' selected':''}" onclick="selectOpt('${q.id}','${o.value}',this)">
        <div class="opt-swatch" style="background:${o.swatch}"></div>
        <span>${o.label}</span>
      </div>`
    ).join('') + `</div>`;
  } else {
    optsHtml = `<div class="opt-multi">` + q.options.map(o =>
      `<div class="opt${answers[q.id]===o.value?' selected':''}" onclick="selectOpt('${q.id}','${o.value}',this)">
        <div class="opt-swatch" style="background:${o.swatch}; width:100%; height:36px; border-radius:8px; border:1px solid rgba(0,0,0,0.07)"></div>
        <span style="font-size:13px">${o.label}</span>
      </div>`
    ).join('') + `</div>`;
  }

  card.innerHTML = `
    <div class="q-label">${q.label}</div>
    <div class="q-title">${q.title}</div>
    <div class="q-sub">${q.sub}</div>
    ${optsHtml}
  `;
}

function selectOpt(qid, val, el) {
  answers[qid] = val;
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (!answers[QUESTIONS[currentQ].id]) return;
  if (currentQ < QUESTIONS.length - 1) {
    currentQ++;
    renderQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

function calcResult() {
  const score = { spring:0, summer:0, autumn:0, winter:0 };
  const warmCool = { warm:0, cool:0, neutral:0 };

  Object.values(answers).forEach(v => {
    if (v === 'warm') warmCool.warm++;
    else if (v === 'cool') warmCool.cool++;
    else if (v === 'neutral') warmCool.neutral++;
    if (v === 'spring') score.spring+=2;
    if (v === 'summer') score.summer+=2;
    if (v === 'autumn') score.autumn+=2;
    if (v === 'winter') score.winter+=2;
  });

  if (warmCool.warm > warmCool.cool) {
    score.spring += warmCool.warm;
    score.autumn += warmCool.warm;
  } else if (warmCool.cool > warmCool.warm) {
    score.summer += warmCool.cool;
    score.winter += warmCool.cool;
  }

  return Object.entries(score).sort((a,b) => b[1]-a[1])[0][0];
}

function showResult() {
  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');

  const type = calcResult();
  const t = TYPES[type];
  const card = document.getElementById('result-card');

  const paletteDots = t.palette.map(c =>
    `<div class="swatch-lg" style="background:${c}"></div>`
  ).join('');

  const goodTags = t.good_clothes.map(c =>
    `<span class="tag good">✓ ${c}</span>`
  ).join('');
  const badTags = t.bad_clothes.map(c =>
    `<span class="tag bad">✕ ${c}</span>`
  ).join('');

  const makeupRows = Object.entries(t.makeup).map(([k,v]) =>
    `<div class="makeup-card"><div class="mk-label">${k}</div><div class="mk-val">${v}</div></div>`
  ).join('');

  card.innerHTML = `
    <div class="result-header">
      <div class="result-type-badge" style="background:${t.badge_bg}; color:${t.badge_color}">${t.eng}</div>
      <div class="result-title">${t.name}</div>
      <div class="result-sub">${t.desc}</div>
    </div>
    <div class="palette-row">${paletteDots}</div>

    <div class="section-title">어울리는 색 · 옷</div>
    <div class="tag-row">${goodTags}</div>

    <div class="section-title">피해야 할 색 · 옷</div>
    <div class="tag-row">${badTags}</div>

    <div class="section-title">메이크업 가이드</div>
    <div class="makeup-grid">${makeupRows}</div>

    <div class="tip-box">${t.tip}</div>
  `;
}

function restart() {
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-intro').classList.add('active');
  answers = {};
  currentQ = 0;
}
</script>
</body>
</html>

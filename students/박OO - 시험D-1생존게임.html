<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시험 D-1 생존게임</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--border:#2a2a40;
--accent:#f5c842;--accent2:#ff6b6b;--accent3:#4ecdc4;--text:#e8e8f0;--muted:#888;
--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'Gowun Dodum',sans-serif;min-height:100vh}
#game{max-width:680px;margin:0 auto;padding:1.5rem 1rem}
h1{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--accent);text-align:center;letter-spacing:2px;text-shadow:0 0 20px rgba(245,200,66,0.4)}
.subtitle{text-align:center;color:var(--muted);font-size:13px;margin-bottom:1.5rem}
.screen{display:none}
.screen.active{display:block}

.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.stat-setup{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:1rem}
.stat-setup label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
.stat-setup .stat-name{font-size:15px;font-weight:500;margin-bottom:8px}
.slider-wrap{display:flex;align-items:center;gap:8px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--accent)}
.slider-val{font-size:14px;font-weight:500;min-width:28px;color:var(--accent);text-align:right}
.goal-section{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:1rem;margin:12px 0}
.goal-section label{font-size:13px;color:var(--muted)}
.goal-section select{width:100%;margin-top:6px;background:var(--surface2);border:0.5px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-family:'Gowun Dodum',sans-serif;font-size:14px}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Black Han Sans',sans-serif;font-size:18px;cursor:pointer;margin-top:12px;letter-spacing:1px;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.85}

.hud{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:12px}
.hud-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.turn-info{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--accent)}
.time-left{font-size:13px;color:var(--muted)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-bar-wrap{text-align:center}
.stat-bar-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.stat-bar-outer{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.stat-bar-inner{height:100%;border-radius:4px;transition:width 0.4s}
.stat-bar-val{font-size:12px;font-weight:500;margin-top:2px}
.bar-skill{background:var(--blue)}
.bar-hp{background:var(--green)}
.bar-focus{background:var(--purple)}
.bar-stress{background:var(--red)}

.scene-box{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:12px;min-height:90px}
.scene-icon{font-size:36px;margin-bottom:6px}
.scene-text{font-size:15px;line-height:1.6;color:var(--text)}
.scene-effect{font-size:13px;color:var(--accent);margin-top:6px;font-style:italic}

.actions-label{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.actions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.action-btn{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:12px 10px;cursor:pointer;text-align:left;transition:border-color 0.2s,background 0.2s;display:flex;flex-direction:column;gap:4px}
.action-btn:hover{border-color:var(--accent);background:var(--surface2)}
.action-btn .action-icon{font-size:22px}
.action-btn .action-name{font-size:14px;font-weight:500;color:var(--text)}
.action-btn .action-desc{font-size:11px;color:var(--muted);line-height:1.4}
.action-btn .action-effects{font-size:11px;margin-top:2px}
.eff-up{color:var(--green)}
.eff-down{color:var(--red)}

.log-box{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:0.8rem 1rem;margin-bottom:12px;max-height:90px;overflow-y:auto}
.log-item{font-size:12px;color:var(--muted);line-height:1.8;border-bottom:0.5px solid var(--border);padding:2px 0}
.log-item:last-child{border:none;color:var(--text)}

.ending-box{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:2rem;text-align:center}
.ending-grade{font-family:'Black Han Sans',sans-serif;font-size:64px;margin:12px 0;line-height:1}
.ending-title{font-family:'Black Han Sans',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:8px}
.ending-score{font-size:40px;font-weight:500;margin:12px 0}
.ending-msg{font-size:14px;color:var(--muted);line-height:1.7;margin:12px 0 1.5rem;white-space:pre-line}
.ending-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:1rem 0}
.end-stat{background:var(--surface2);border-radius:8px;padding:10px 6px;text-align:center}
.end-stat-val{font-size:20px;font-weight:500}
.end-stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.btn-restart{background:transparent;border:0.5px solid var(--accent);color:var(--accent);padding:12px 2rem;border-radius:8px;font-family:'Gowun Dodum',sans-serif;font-size:15px;cursor:pointer;margin-top:8px;transition:background 0.2s}
.btn-restart:hover{background:rgba(245,200,66,0.1)}
.pixel-line{border:none;border-top:1px dashed var(--border);margin:12px 0}
.warning-flash{animation:flash 0.5s ease}
@keyframes flash{0%,100%{background:var(--surface)}50%{background:rgba(248,113,113,0.15)}}

@media(max-width:480px){
  .setup-grid{grid-template-columns:1fr}
  .actions-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .ending-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div id="game">
  <h1>📚 시험 D-1 생존게임</h1>
  <p class="subtitle">남은 시간: 10턴 · 목표 달성하고 살아남아라!</p>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <div class="setup-grid">
      <div class="stat-setup">
        <div class="stat-name">📖 현재 실력</div>
        <label>공부한 양이 얼마나 되나요?</label>
        <div class="slider-wrap">
          <input type="range" min="5" max="60" value="20" id="init-skill" oninput="updateVal('init-skill','val-skill')">
          <span class="slider-val" id="val-skill">20</span>
        </div>
      </div>
      <div class="stat-setup">
        <div class="stat-name">💪 현재 체력</div>
        <label>지금 몸 상태는 어때요?</label>
        <div class="slider-wrap">
          <input type="range" min="10" max="100" value="55" id="init-hp" oninput="updateVal('init-hp','val-hp')">
          <span class="slider-val" id="val-hp">55</span>
        </div>
      </div>
      <div class="stat-setup">
        <div class="stat-name">🧠 집중력</div>
        <label>지금 얼마나 집중할 수 있나요?</label>
        <div class="slider-wrap">
          <input type="range" min="10" max="100" value="50" id="init-focus" oninput="updateVal('init-focus','val-focus')">
          <span class="slider-val" id="val-focus">50</span>
        </div>
      </div>
      <div class="stat-setup">
        <div class="stat-name">😰 스트레스</div>
        <label>현재 스트레스 수준은?</label>
        <div class="slider-wrap">
          <input type="range" min="0" max="80" value="30" id="init-stress" oninput="updateVal('init-stress','val-stress')">
          <span class="slider-val" id="val-stress">30</span>
        </div>
      </div>
    </div>
    <div class="goal-section">
      <label>🎯 목표 점수를 설정하세요</label>
      <select id="goal-score">
        <option value="90">90점 이상 (최우수)</option>
        <option value="80" selected>80점 이상 (우수)</option>
        <option value="70">70점 이상 (보통)</option>
        <option value="60">60점 이상 (통과)</option>
        <option value="50">50점 이상 (간신히)</option>
      </select>
    </div>
    <button class="btn-primary" onclick="startGame()">▶ 게임 시작</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="hud" id="hud">
      <div class="hud-top">
        <span class="turn-info" id="turn-display">⏰ 턴 1/10</span>
        <span class="time-left" id="goal-display">목표: 80점</span>
      </div>
      <div class="stats-row">
        <div class="stat-bar-wrap">
          <div class="stat-bar-label">📖 실력</div>
          <div class="stat-bar-outer"><div class="stat-bar-inner bar-skill" id="bar-skill" style="width:20%"></div></div>
          <div class="stat-bar-val" id="txt-skill" style="color:var(--blue)">20</div>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-label">💪 체력</div>
          <div class="stat-bar-outer"><div class="stat-bar-inner bar-hp" id="bar-hp" style="width:55%"></div></div>
          <div class="stat-bar-val" id="txt-hp" style="color:var(--green)">55</div>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-label">🧠 집중력</div>
          <div class="stat-bar-outer"><div class="stat-bar-inner bar-focus" id="bar-focus" style="width:50%"></div></div>
          <div class="stat-bar-val" id="txt-focus" style="color:var(--purple)">50</div>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-label">😰 스트레스</div>
          <div class="stat-bar-outer"><div class="stat-bar-inner bar-stress" id="bar-stress" style="width:30%"></div></div>
          <div class="stat-bar-val" id="txt-stress" style="color:var(--red)">30</div>
        </div>
      </div>
    </div>

    <div class="scene-box" id="scene-box">
      <div class="scene-icon" id="scene-icon">📚</div>
      <div class="scene-text" id="scene-text">자정이 가까운 방. 내일 시험이다. 지금 당장 뭘 해야 할까?</div>
      <div class="scene-effect" id="scene-effect"></div>
    </div>

    <div class="log-box" id="log-box">
      <div class="log-item">게임이 시작되었습니다. 최선을 다해라!</div>
    </div>

    <div class="actions-label">행동을 선택하세요</div>
    <div class="actions-grid" id="actions-grid"></div>
  </div>

  <!-- ENDING SCREEN -->
  <div id="screen-ending" class="screen">
    <div class="ending-box" id="ending-box">
      <div class="ending-grade" id="ending-grade">📝</div>
      <div class="ending-title" id="ending-title">결과</div>
      <div class="ending-score" id="ending-score">0점</div>
      <hr class="pixel-line">
      <div class="ending-stats" id="ending-stats"></div>
      <div class="ending-msg" id="ending-msg"></div>
      <button class="btn-restart" onclick="resetGame()">↺ 다시 도전하기</button>
    </div>
  </div>
</div>

<script>
const ACTIONS=[
  {id:'study-hard',icon:'📚',name:'집중 공부',desc:'빡세게 공부한다. 실력↑↑ 체력↓ 집중력↓',
    effects:{skill:[12,20],hp:[-12,-18],focus:[-10,-15],stress:[5,10]},
    scenes:['교재를 펼치고 미친듯이 외우기 시작했다!','형광펜이 닳도록 줄을 긋는다...','노트에 핵심 개념을 정리했다!']},
  {id:'study-light',icon:'🗒️',name:'가볍게 복습',desc:'부담없이 훑어본다. 실력↑ 스트레스↓',
    effects:{skill:[5,10],hp:[-4,-7],focus:[-5,-8],stress:[-8,-12]},
    scenes:['중요한 부분만 가볍게 훑어봤다.','필기 내용을 천천히 살펴봤다.','핵심만 빠르게 체크했다.']},
  {id:'sleep',icon:'😴',name:'취침',desc:'잠을 잔다. 체력↑↑ 집중력↑ 시간 소모 큼',
    effects:{skill:[0,0],hp:[25,35],focus:[20,28],stress:[-15,-20]},
    scenes:['드르렁... 2시간 숙면을 취했다!','짧지만 깊은 잠을 잤다.','알람 소리에 잠에서 깼다.'],turns:2},
  {id:'nap',icon:'🛋️',name:'쪽잠',desc:'짧게 눈을 붙인다. 체력↑ 집중력↑',
    effects:{skill:[0,0],hp:[12,18],focus:[15,20],stress:[-8,-12]},
    scenes:['책상에 엎드려 잠깐 눈을 붙였다.','10분간 파워냅! 개운하다.','소파에서 잠깐 쉬었다.']},
  {id:'phone',icon:'📱',name:'휴대폰 보기',desc:'잠깐 폰을 본다. 스트레스↓ 집중력↓↓ 시간 낭비!',
    effects:{skill:[-3,-6],hp:[-3,-5],focus:[-15,-22],stress:[-5,-10]},
    scenes:['유튜브를 보다 1시간이 흘렀다...','인스타 피드를 끊임없이 스크롤했다.','쇼츠 지옥에 빠졌다. 정신 차려!']},
  {id:'snack',icon:'🍕',name:'간식 먹기',desc:'뭔가 먹는다. 체력↑ 스트레스↓ 집중력↑',
    effects:{skill:[0,2],hp:[8,12],focus:[8,13],stress:[-5,-8]},
    scenes:['라면을 끓여 먹었다. 맛있다!','과자를 집어먹으며 잠을 쫓는다.','에너지드링크를 원샷했다!']},
  {id:'walk',icon:'🚶',name:'잠깐 산책',desc:'5분 환기. 집중력↑↑ 스트레스↓↓',
    effects:{skill:[0,2],hp:[4,8],focus:[15,22],stress:[-12,-18]},
    scenes:['복도를 걸으며 머릿속을 비웠다.','시원한 밤바람을 맞았다. 개운!','잠깐 스트레칭을 했다.']},
  {id:'review',icon:'✏️',name:'문제 풀기',desc:'모의 문제를 푼다. 실력↑↑ 집중력↓',
    effects:{skill:[8,14],hp:[-6,-10],focus:[-8,-12],stress:[3,8]},
    scenes:['예상 문제를 풀어봤다!','틀린 문제를 다시 풀었다.','오답 노트를 정리했다.']},
];

let G={};

function clamp(v,mn=0,mx=100){return Math.max(mn,Math.min(mx,Math.round(v)))}
function rand(a,b){return Math.round(a+Math.random()*(b-a))}
function updateVal(sid,vid){document.getElementById(vid).textContent=document.getElementById(sid).value}

function startGame(){
  G={
    turn:1,maxTurns:10,
    skill:parseInt(document.getElementById('init-skill').value),
    hp:parseInt(document.getElementById('init-hp').value),
    focus:parseInt(document.getElementById('init-focus').value),
    stress:parseInt(document.getElementById('init-stress').value),
    goal:parseInt(document.getElementById('goal-score').value),
    log:[],history:[],usedTurns:0
  };
  showScreen('screen-game');
  renderHUD();
  renderActions();
  document.getElementById('scene-text').textContent='자정이 가까운 방. 내일 시험이다. 지금 당장 뭘 해야 할까?';
  document.getElementById('scene-icon').textContent='📚';
  document.getElementById('scene-effect').textContent='';
  document.getElementById('goal-display').textContent='목표: '+G.goal+'점';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHUD(){
  document.getElementById('turn-display').textContent='⏰ 턴 '+G.turn+'/'+G.maxTurns;
  ['skill','hp','focus','stress'].forEach(s=>{
    const v=G[s];
    document.getElementById('bar-'+s).style.width=v+'%';
    document.getElementById('txt-'+s).textContent=v;
  });
}

function renderActions(){
  const grid=document.getElementById('actions-grid');
  grid.innerHTML='';
  ACTIONS.forEach(a=>{
    const btn=document.createElement('button');
    btn.className='action-btn';
    const e=a.effects;
    let effHtml='';
    if(e.skill[1]>0) effHtml+=`<span class="eff-up">실력 ▲</span> `;
    else if(e.skill[1]<0) effHtml+=`<span class="eff-down">실력 ▼</span> `;
    if(e.hp[1]>0) effHtml+=`<span class="eff-up">체력 ▲</span> `;
    else if(e.hp[1]<0) effHtml+=`<span class="eff-down">체력 ▼</span> `;
    if(e.focus[1]>0) effHtml+=`<span class="eff-up">집중 ▲</span> `;
    else if(e.focus[1]<0) effHtml+=`<span class="eff-down">집중 ▼</span> `;
    if(e.stress[1]<0) effHtml+=`<span class="eff-up">스트레스 ▼</span> `;
    else if(e.stress[1]>0) effHtml+=`<span class="eff-down">스트레스 ▲</span> `;
    btn.innerHTML=`<span class="action-icon">${a.icon}</span><span class="action-name">${a.name}</span><span class="action-desc">${a.desc}</span><span class="action-effects">${effHtml}</span>`;
    btn.onclick=()=>doAction(a);
    grid.appendChild(btn);
  });
}

function doAction(a){
  if(G.turn>G.maxTurns) return;
  const e=a.effects;
  const stressPenalty=G.stress>70?0.6:(G.stress>50?0.8:1.0);
  const focusMult=G.focus<20?0.5:(G.focus<40?0.75:1.0);
  const hpMult=G.hp<20?0.6:(G.hp<40?0.8:1.0);

  let ds=rand(e.skill[0],e.skill[1]);
  if(['study-hard','study-light','review'].includes(a.id)){
    ds=Math.round(ds*stressPenalty*focusMult*hpMult);
  }

  G.skill=clamp(G.skill+ds);
  G.hp=clamp(G.hp+rand(e.hp[0],e.hp[1]));
  G.focus=clamp(G.focus+rand(e.focus[0],e.focus[1]));
  G.stress=clamp(G.stress+rand(e.stress[0],e.stress[1]));

  const turnCost=a.turns||1;
  G.usedTurns+=turnCost;
  G.turn+=turnCost;

  const scene=a.scenes[Math.floor(Math.random()*a.scenes.length)];
  document.getElementById('scene-icon').textContent=a.icon;
  document.getElementById('scene-text').textContent=scene;

  let effectMsg='';
  if(ds>8) effectMsg='실력이 크게 올랐다!';
  else if(ds>0) effectMsg='실력이 조금 올랐다.';
  if(G.stress>75){
    effectMsg+=' 스트레스가 너무 높다!';
    const hud=document.getElementById('hud');
    hud.classList.add('warning-flash');
    setTimeout(()=>hud.classList.remove('warning-flash'),500);
  }
  if(G.hp<20) effectMsg+=' 체력이 위험하다!';
  if(G.focus<20) effectMsg+=' 집중력이 바닥났다!';
  document.getElementById('scene-effect').textContent=effectMsg;

  addLog(`[턴 ${G.turn-turnCost}] ${a.icon} ${a.name} → 실력 ${ds>=0?'+'+ds:ds}, 체력 ${G.hp}, 집중 ${G.focus}, 스트레스 ${G.stress}`);
  G.history.push({action:a.name,turn:G.turn-turnCost});
  renderHUD();

  if(G.turn>G.maxTurns||G.hp<=0) setTimeout(showEnding,500);
}

function addLog(msg){
  const box=document.getElementById('log-box');
  const el=document.createElement('div');
  el.className='log-item';
  el.textContent=msg;
  box.appendChild(el);
  box.scrollTop=box.scrollHeight;
}

function calcScore(){
  const focusBonus=G.focus>60?8:(G.focus>40?4:0);
  const hpBonus=G.hp>60?5:(G.hp>40?2:0);
  const stressPenalty=G.stress>70?-15:(G.stress>50?-8:0);
  const hpPenalty=G.hp<=0?-20:0;
  return clamp(G.skill+focusBonus+hpBonus+stressPenalty+hpPenalty,0,100);
}

function showEnding(){
  const score=calcScore();
  const diff=score-G.goal;
  let grade,title,color,msg;

  if(G.hp<=0){
    grade='💀';title='체력 고갈!';color='#f87171';
    msg='과로로 시험 당일 쓰러지고 말았다...\n충분한 휴식도 실력의 일부다.';
  } else if(diff>=15){
    grade='🏆';title='완벽한 준비!';color='#f5c842';
    msg='목표를 훌쩍 넘겼다!\n철저한 계획과 효율적인 공부가 빛을 발했다.';
  } else if(diff>=0){
    grade='✨';title='목표 달성!';color='#4ade80';
    msg='목표 점수를 달성했다!\n벼락치기도 이 정도면 훌륭하다.';
  } else if(diff>=-10){
    grade='😅';title='아쉬운 결과...';color='#60a5fa';
    msg='목표에 조금 못 미쳤다.\n다음엔 좀 더 일찍 시작하는 건 어떨까?';
  } else {
    grade='😭';title='목표 미달성';color='#f87171';
    msg='이번엔 힘들었다.\n더 일찍 시작하고, 수면을 충분히 취하자!';
  }

  document.getElementById('ending-grade').textContent=grade;
  document.getElementById('ending-title').textContent=title;
  document.getElementById('ending-title').style.color=color;
  document.getElementById('ending-score').textContent=score+'점';
  document.getElementById('ending-score').style.color=color;

  document.getElementById('ending-stats').innerHTML=`
    <div class="end-stat"><div class="end-stat-val" style="color:var(--blue)">${G.skill}</div><div class="end-stat-label">최종 실력</div></div>
    <div class="end-stat"><div class="end-stat-val" style="color:var(--green)">${G.hp}</div><div class="end-stat-label">남은 체력</div></div>
    <div class="end-stat"><div class="end-stat-val" style="color:var(--purple)">${G.focus}</div><div class="end-stat-label">집중력</div></div>
    <div class="end-stat"><div class="end-stat-val" style="color:var(--red)">${G.stress}</div><div class="end-stat-label">스트레스</div></div>
  `;
  document.getElementById('ending-msg').textContent=msg;
  document.getElementById('ending-box').style.borderColor=color;
  showScreen('screen-ending');
}

function resetGame(){showScreen('screen-setup')}
</script>
</body>
</html>

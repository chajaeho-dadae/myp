<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 프로그램 만들기 모음</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 관리자 이동 함수를 최상단에 배치 (다른 코드 에러 예방)
        function goAdmin() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "1234") {
                window.location.href = "admin.html";
            } else if (pw !== null) {
                alert("비밀번호가 틀렸습니다.");
            }
        }
    </script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #375a7f; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        header { text-align: center; margin-bottom: 40px; position: relative; }
        .admin-btn { position: absolute; top: 0; right: 0; padding: 8px 15px; background: #444; color: #eee; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: var(--accent); color: #fff; padding: 15px; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        .project-link { color: #4da3ff; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <button class="admin-btn" onclick="goAdmin()">관리자 모드</button>
        <h1>나만의 프로그램 만들기 모음</h1>
        <h3>2026학년도 다대중학교 2학년 정보</h3>
    </header>
    <table>
        <thead>
            <tr><th>순위</th><th>이름</th><th>작품명</th><th>설명</th><th>알고리즘</th><th>조회수</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const SUPABASE_URL = 'https://sdhpzypjqmowhrhxvvsj.supabase.co/rest/v1/'; // 여기에 실제 URL 입력
        const SUPABASE_KEY = 'sb_publishable_RRyqMtpm4qI0BZ9gdIjTvw_XOnJiaHc';   // 여기에 실제 KEY 입력
        
        let supabase = null;
        try {
            if (SUPABASE_URL.includes('supabase.co')) {
                supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch(e) { console.error(e); }

        async function fetchAndRender() {
            let students = [];
            try {
                if (supabase) {
                    const { data } = await supabase.from('students').select('*').order('views', { ascending: false });
                    if (data) students = data;
                }
            } catch (e) { console.log("DB 로드 실패"); }
            
            // 데이터가 없어도 기본 틀 유지
            renderTable(students);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">등록된 데이터가 없습니다. (관리자에서 추가하세요)</td></tr>';
                return;
            }
            tbody.innerHTML = data.map((s, i) => `
                <tr>
                    <td>${i < 3 ? ['🥇','🥈','🥉'][i] : ''}</td>
                    <td>${s.name}</td>
                    <td><span class="project-link" onclick="handleView('${s.file_name}', ${s.id})">${s.title}</span></td>
                    <td>${s.description}</td>
                    <td>${s.algorithm}</td>
                    <td>${s.views || 0}</td>
                </tr>`).join('');
        }

        async function handleView(file, id) {
            try {
                if (supabase && id) {
                    const { data } = await supabase.from('students').select('views').eq('id', id).single();
                    await supabase.from('students').update({ views: (data.views || 0) + 1 }).eq('id', id);
                }
            } catch(e) {}
            window.open(file.startsWith('http') ? file : `students/${file}`, '_blank');
            setTimeout(() => location.reload(), 500);
        }
        fetchAndRender();
    </script>
</body>
</html>

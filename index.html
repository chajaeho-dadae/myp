<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 다대중 정보 프로젝트</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; line-height: 1.6; margin: 20px; background-color: #f8f9fa; }
        header { text-align: center; margin-bottom: 40px; position: relative; }
        .admin-btn { position: absolute; top: 0; right: 0; padding: 8px 15px; background: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-size: 0.9em; }
        
        h1 { margin-bottom: 5px; color: #333; }
        h3 { margin-top: 0; color: #666; font-weight: 400; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #007bff; color: white; }
        
        .medal-1 { background-color: #fff9c4; font-weight: bold; } /* 금 */
        .medal-2 { background-color: #f5f5f5; font-weight: bold; } /* 은 */
        .medal-3 { background-color: #efebe9; font-weight: bold; } /* 동 */
        
        .medal-icon { font-size: 1.2em; }
        a { color: #007bff; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <a href="admin.html" class="admin-btn">관리자 모드</a>
        <h1>나만의 프로그램 만들기 모음</h1>
        <h3>2026학년도 다대중학교 2학년 정보</h3>
    </header>

    <table id="work-table">
        <thead>
            <tr>
                <th>순위</th>
                <th>이름</th>
                <th>작품명</th>
                <th>설명</th>
                <th>알고리즘</th>
                <th>조회수</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://sdhpzypjqmowhrhxvvsj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RRyqMtpm4qI0BZ9gdIjTvw_XOnJiaHc';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchWorks() {
            // 조회수(views) 내림차순으로 데이터 가져오기
            const { data, error } = await supabase
                .from('students_work') // 테이블명
                .select('*')
                .order('views', { ascending: false });

            if (error) {
                console.error('Error fetching data:', error);
                return;
            }

            renderTable(data);
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                let rankDisplay = '';
                
                // 순위 및 메달 로직 (1위: 금1, 2~3위: 은2, 4~6위: 동3)
                if (index === 0) {
                    rankDisplay = '<span class="medal-icon">🥇</span>';
                    tr.classList.add('medal-1');
                } else if (index >= 1 && index <= 2) {
                    rankDisplay = '<span class="medal-icon">🥈</span>';
                    tr.classList.add('medal-2');
                } else if (index >= 3 && index <= 5) {
                    rankDisplay = '<span class="medal-icon">🥉</span>';
                    tr.classList.add('medal-3');
                } else {
                    rankDisplay = ''; // 나머지 순위 빈칸
                }

                tr.innerHTML = `
                    <td>${rankDisplay}</td>
                    <td>${item.name}</td>
                    <td><a href="students/${item.file_name}" target="_blank" onclick="updateView('${item.id}')">${item.title}</a></td>
                    <td>${item.description}</td>
                    <td>${item.algorithm}</td>
                    <td>${item.views}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 조회수 증가 함수
        async function updateView(id) {
            const { data } = await supabase.rpc('increment_view', { row_id: id });
        }

        fetchWorks();
    </script>
</body>
</html>

      desc: "야구 게임을 했는데 재미가 있어서<br>3d느낌으로 컴투스 프로 야구 v26느낌으로"
    }
  ];

  // localStorage에서 조회수 불러오기
  function getViews() {
    const saved = localStorage.getItem('programViews');
    return saved ? JSON.parse(saved) : {};
  }

  // 조회수 저장
  function saveViews(views) {
    localStorage.setItem('programViews', JSON.stringify(views));
  }

  // 링크 클릭 시 조회수 증가
  function incrementView(id, href, event) {
    event.preventDefault();
    const views = getViews();
    views[id] = (views[id] || 0) + 1;
    saveViews(views);
    renderTable();
    // 새 탭에서 링크 열기
    window.open(href, '_blank');
  }

  // 테이블 렌더링 (조회수 내림차순 정렬)
  function renderTable() {
    const views = getViews();
    const tbody = document.getElementById('tableBody');

    // 조회수 기준 내림차순 정렬
    const sorted = [...programs].sort((a, b) => {
      return (views[b.id] || 0) - (views[a.id] || 0);
    });

    tbody.innerHTML = sorted.map((p, index) => {
      const rank = index + 1;
      const viewCount = views[p.id] || 0;
      const badgeClass = rank <= 3 ? `rank-badge rank-${rank}` : 'rank-badge';

      return `
        <tr>
          <td><span class="${badgeClass}">${rank}</span></td>
          <td>${p.name}</td>
          <td>
            <a href="${p.href}" onclick="incrementView('${p.id}', '${p.href}', event)">
              ${p.title}
            </a>
          </td>
          <td>${p.desc}</td>
          <td class="view-count">👁 ${viewCount}</td>
        </tr>
      `;
    }).join('');
  }

  // 초기 렌더링
  renderTable();
</script>

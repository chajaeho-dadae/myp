<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>나만의 프로그램 만들기 모음</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --card:      #1c2030;
      --border:    #252a3a;
      --accent:    #4f8ef7;
      --accent2:   #7c5cfc;
      --text:      #e8ecf5;
      --muted:     #6b7490;
      --gold:      #f5c842;
      --silver:    #b0bec5;
      --bronze:    #cd7c3a;
      --glow-gold: #f5c84255;
      --glow-sil:  #b0bec540;
      --glow-bro:  #cd7c3a40;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px 24px 40px;
    }
    header::after {
      content: '';
      display: block;
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 20px auto 0;
      border-radius: 2px;
    }
    .title-main {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }
    .title-sub {
      margin-top: 10px;
      font-size: clamp(.9rem, 2vw, 1.1rem);
      color: var(--muted);
      letter-spacing: .06em;
      font-weight: 300;
    }

    main {
      position: relative;
      z-index: 5;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .75rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 40px 0 16px;
      font-weight: 500;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .medal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 8px;
    }

    .medal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 20px 18px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .medal-card:hover { transform: translateY(-4px); }

    .medal-card.gold   { border-color: var(--gold);   box-shadow: 0 0 28px var(--glow-gold); }
    .medal-card.silver { border-color: var(--silver);  box-shadow: 0 0 20px var(--glow-sil); }
    .medal-card.bronze { border-color: var(--bronze);  box-shadow: 0 0 20px var(--glow-bro); }

    .medal-card.gold::before   { content:''; position:absolute; inset:0; background: radial-gradient(circle at 80% 20%, #f5c84215 0%, transparent 60%); }
    .medal-card.silver::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at 80% 20%, #b0bec510 0%, transparent 60%); }
    .medal-card.bronze::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at 80% 20%, #cd7c3a12 0%, transparent 60%); }

    .medal-badge {
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 10px;
    }
    .medal-rank {
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: .7rem;
      letter-spacing: .1em;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .gold   .medal-rank { background: #f5c84222; color: var(--gold); }
    .silver .medal-rank { background: #b0bec520; color: var(--silver); }
    .bronze .medal-rank { background: #cd7c3a20; color: var(--bronze); }

    .card-name  { font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
    .card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
    .card-desc  { font-size: .82rem; color: var(--muted); line-height: 1.55; margin-bottom: 14px;
                  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-algo  { font-size: .75rem; background: #ffffff0a; border: 1px solid var(--border);
                  padding: 3px 10px; border-radius: 20px; display: inline-block; color: var(--accent); }
    .card-views {
      position: absolute;
      bottom: 16px; right: 18px;
      font-size: .78rem; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .card-views svg { opacity: .6; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .88rem;
    }
    thead tr {
      background: #ffffff06;
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 14px 16px;
      text-align: left;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #ffffff05; }
    td {
      padding: 13px 16px;
      vertical-align: middle;
    }
    td.rank-cell { font-size: 1.1rem; text-align: center; width: 56px; }
    td.views-cell { color: var(--accent); font-weight: 600; white-space: nowrap; }
    td a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }
    td a:hover { color: var(--accent); }
    .algo-tag {
      background: #4f8ef710;
      border: 1px solid #4f8ef730;
      color: var(--accent);
      font-size: .72rem;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .name-cell { font-size: .85rem; color: var(--muted); }

    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: .9rem;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      th, td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="title-main">나만의 프로그램 만들기 모음</div>
  <div class="title-sub">2026학년도 &nbsp;·&nbsp; 정보</div>
</header>

<main>
  <div id="app">
    <div class="state-msg">
      <div class="spinner"></div><br>학생 작품을 불러오는 중…
    </div>
  </div>
</main>

<script>
  /* ═══════════════════════════════════════════════
     ★ GitHub 저장소 설정 — 여기만 수정하세요
     ═══════════════════════════════════════════════
     GITHUB_USER  : GitHub 사용자명 (예: "myschool")
     GITHUB_REPO  : 저장소명      (예: "student-programs")
     GITHUB_BRANCH: 브랜치명      (기본: "main")
     FOLDER       : 학생 파일 폴더 (기본: "students")

     파일명 규칙: "학생이름 - 프로그램이름.html"
  */
  const GITHUB_USER   = "chajaeho-dadae";   // ← 수정
  const GITHUB_REPO   = "myp";          // ← 수정
  const GITHUB_BRANCH = "main";
  const FOLDER        = "students";

  /* ═══════════════════════════════════════════════
     Supabase 설정
  */
  const SUPABASE_URL = "https://sdhpzypjqmowhrhxvvsj.supabase.co/rest/v1/";
  const SUPABASE_KEY = "sb_publishable_RRyqMtpm4qI0BZ9gdIjTvw_XOnJiaHc";
  const TABLE = "views";

  /* ── GitHub API: students/ 폴더 파일 목록 조회 ── */
  async function fetchStudentsFromGitHub() {
    const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER}?ref=${GITHUB_BRANCH}`;
    const res = await fetch(url, {
      headers: { "Accept": "application/vnd.github+json" }
    });
    if (!res.ok) throw new Error(`GitHub API 오류: ${res.status} ${res.statusText}`);
    const items = await res.json();

    // .html 파일만 필터링하고 이름/제목 파싱
    return items
      .filter(item => item.type === "file" && item.name.endsWith(".html"))
      .map(item => {
        const filename = item.name; // "학생이름 - 프로그램이름.html"
        const base = filename.replace(/\.html$/i, ""); // 확장자 제거

        // " - " 구분자로 이름과 제목 분리
        const dashIdx = base.indexOf(" - ");
        let name, title;
        if (dashIdx !== -1) {
          name  = base.slice(0, dashIdx).trim();
          title = base.slice(dashIdx + 3).trim();
        } else {
          // 구분자가 없으면 파일명 전체를 제목으로
          name  = "";
          title = base;
        }

        return {
          file: filename,
          name,
          title,
          desc: "",
          algo: "",
          views: 0,
        };
      });
  }

  /* ── Supabase 헬퍼 ── */
  async function sbFetch(path, opts = {}) {
    const res = await fetch(SUPABASE_URL + path, {
      ...opts,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": opts.prefer || "",
        ...opts.headers,
      },
    });
    if (!res.ok && res.status !== 404) throw new Error(await res.text());
    return res.status === 204 ? null : res.json();
  }

  async function incrementViews(file) {
    await sbFetch("rpc/increment_views", {
      method: "POST",
      body: JSON.stringify({ p_file: file }),
    });
  }

  /* ── 중복 클릭 방지 (24시간 쿨다운) ──
     localStorage에 { 파일명: 마지막클릭시각(ms) } 형태로 기록.
     같은 브라우저에서 24시간 내 동일 작품 재클릭 시 카운트 안 함.
  */
  const COOLDOWN_MS = 24 * 60 * 60 * 1000; // 24시간
  const LS_KEY = "viewed_works";

  function canCount(file) {
    try {
      const record = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
      const last = record[file];
      if (!last) return true;                          // 처음 보는 작품
      return Date.now() - last > COOLDOWN_MS;          // 24시간 지났으면 허용
    } catch { return true; }
  }

  function markViewed(file) {
    try {
      const record = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
      record[file] = Date.now();
      localStorage.setItem(LS_KEY, JSON.stringify(record));
    } catch { /* 시크릿 모드 등 localStorage 차단 시 무시 */ }
  }

  async function loadAllViews() {
    try {
      const rows = await sbFetch(`${TABLE}?select=file,views`);
      const map = {};
      (rows || []).forEach(r => { map[r.file] = r.views; });
      return map;
    } catch { return {}; }
  }

  /* ── 메달 / 아이콘 ── */
  const MEDALS      = ["🥇", "🥈", "🥉"];
  const MEDAL_CLASS = ["gold", "silver", "bronze"];
  const MEDAL_LABEL = ["1위", "2위", "3위", "4위", "5위", "6위"];
  const eyeIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;

  /* ── 렌더링 ── */
  function render(students) {
    const sorted = [...students].sort((a, b) => b.views - a.views);
    const top6   = sorted.slice(0, 6);

    const app = document.getElementById("app");

    /* 메달 카드 */
    const medalHTML = `
      <div class="section-label">🏆 명예의 전당 — TOP 6</div>
      <div class="medal-grid">
        ${top6.map((s, i) => {
          const mc    = i < 3 ? MEDAL_CLASS[i] : "bronze";
          const badge = i < 3 ? MEDALS[i] : "🥉";
          return `
          <a class="medal-card ${mc}" href="${FOLDER}/${s.file}" target="_blank"
             onclick="handleClick(event, '${s.file}')">
            <div class="medal-badge">${badge}</div>
            <div class="medal-rank">${MEDAL_LABEL[i]}</div>
            <div class="card-name">${s.name}</div>
            <div class="card-title">${s.title}</div>
            <div class="card-desc">${s.desc}</div>
            ${s.algo ? `<span class="card-algo">${s.algo}</span>` : ""}
            <div class="card-views">${eyeIcon} ${s.views.toLocaleString()}</div>
          </a>`;
        }).join("")}
      </div>`;

    /* 전체 테이블 */
    const tableHTML = `
      <div class="section-label">📋 전체 작품 목록</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="text-align:center">순위</th>
              <th>이름</th>
              <th>작품명</th>
              <th>조회수</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map((s, i) => {
              const rankCell = i < 3
                ? `<td class="rank-cell">${MEDALS[i]}</td>`
                : `<td class="rank-cell" style="color:var(--muted);font-size:.85rem">${i + 1}</td>`;
              return `
              <tr>
                ${rankCell}
                <td class="name-cell">${s.name}</td>
                <td><a href="${FOLDER}/${s.file}" target="_blank"
                       onclick="handleClick(event, '${s.file}')">${s.title}</a></td>
                <td class="views-cell">${eyeIcon}&nbsp;${s.views.toLocaleString()}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`;

    app.innerHTML = medalHTML + tableHTML;
  }

  /* ── 클릭 → 조회수 증가 (24시간 중복 방지) ── */
  window.handleClick = async function(e, file) {
    if (!canCount(file)) return;   // 24시간 내 재클릭 → 무시
    markViewed(file);              // 먼저 기록 (연속 클릭 차단)
    try { await incrementViews(file); } catch(err) { console.warn(err); }
  };

  /* ── 초기 로드 ── */
  (async () => {
    try {
      // GitHub에서 파일 목록 가져오기
      const students = await fetchStudentsFromGitHub();

      // Supabase에서 조회수 병합
      const viewMap = await loadAllViews();
      students.forEach(s => { s.views = viewMap[s.file] ?? 0; });

      if (students.length === 0) {
        document.getElementById("app").innerHTML =
          `<div class="state-msg">📂 <code>${FOLDER}/</code> 폴더에 .html 파일이 없습니다.</div>`;
        return;
      }

      render(students);
    } catch (err) {
      document.getElementById("app").innerHTML =
        `<div class="state-msg">
          ⚠️ 데이터를 불러오지 못했습니다.<br>
          <small style="margin-top:8px;display:block">${err.message}</small>
          <small style="margin-top:6px;display:block;color:#4f8ef7">
            index.html 상단의 GITHUB_USER, GITHUB_REPO 값을 확인해주세요.
          </small>
        </div>`;
    }
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나만의 프로그램 만들기 모음</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* CSS는 기존과 동일하게 유지하되, 로딩 상태를 위한 스타일만 추가 */
    :root {
      --bg-page: #1a1a1a; --bg-table: #252525; --bg-header: #111111;
      --bg-hover: #2e2e2e; --text-primary: #e8e8e8; --accent: #5AAACC;
      --rank-gold: #FFD700; --rank-silver: #C0C0C0; --rank-bronze: #CD7F32;
      --border-color: #3a3a3a;
    }
    body { font-family: sans-serif; font-size: 18px; padding: 40px; background: var(--bg-page); color: var(--text-primary); }
    h1, h3 { text-align: center; }
    h3 { color: var(--accent); }
    table { width: 100%; border-collapse: collapse; background: var(--bg-table); margin-top: 20px; }
    th, td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
    td.desc { text-align: left; font-size: 15px; color: #ccc; }
    th { background: var(--bg-header); }
    tr:hover td { background: var(--bg-hover); }
    a { color: var(--accent); text-decoration: none; font-weight: bold; }
    .rank-badge { display: inline-block; border-radius: 50%; width: 28px; height: 28px; line-height: 28px; font-size: 14px; margin-right: 6px; background: #3a3a3a; }
    .rank-1 { background: var(--rank-gold); color: #333; }
    .rank-2 { background: var(--rank-silver); color: #333; }
    .rank-3 { background: var(--rank-bronze); color: white; }
    .loading { text-align: center; padding: 20px; color: var(--accent); }
  </style>
</head>
<body>

<h1>나만의 프로그램 만들기 모음</h1>
<h3>2026학년도 다대중학교 2학년 정보</h3>

<table id="programTable">
  <thead>
    <tr>
      <th>순위</th>
      <th>이름</th>
      <th>작품</th>
      <th>설명</th>
      <th>조회수</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="5" class="loading">데이터를 불러오는 중...</td></tr>
  </tbody>
</table>

<script>
  // 1. Supabase 설정 (본인의 정보로 변경 필수)
  const SUPABASE_URL = 'https://YOUR_SUPABASE_PROJECT_ID.supabase.co';
  const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const programs = [
    { id: "21이OO", name: "이OO", title: "나의 퍼스널컬러 찾기!", href: "students/21 이OO - 나의 퍼스널컬러 찾기!.html", desc: "자신의 퍼스널 컬러와 어울리는 스타일을 찾아주는 프로그램" },
    { id: "최OO", name: "최OO", title: "조선시대 신분", href: "students/26 최OO - 조선시대 신분.html", desc: "조선시대 신분 체계 정보" },
    { id: "27이OO_mbti", name: "이OO", title: "MBTI로 알아보는 좋은 직업", href: "students/27 김OO - MBTI로 알아보는 좋은 직업.html", desc: "MBTI 맞춤형 직업 추천" },
    { id: "21염OO", name: "염OO", title: "농사 게임", href: "students/21 염OO - 농사 게임.html", desc: "직접 작물을 키우는 힐링 농사 시뮬레이션" },
    { id: "27남OO", name: "남OO", title: "회사원키우기", href: "students/27 남OO - 회사원키우기.html", desc: "신입사원에서 CEO까지의 성장기" },
    { id: "21최OO", name: "최OO", title: "배달 시뮬레이션", href: "students/21 최OO - 배달 시뮬레이션.html", desc: "종말 세계관 속 생존 배달 게임" },
    { id: "27박OO", name: "박OO", title: "시험D-1생존게임", href: "students/27 박OO - 시험D-1생존게임.html", desc: "시험 전날 시간 관리 전략 게임" },
    { id: "21고OO", name: "고OO", title: "친구 잡기", href: "students/21 고OO - 친구 잡기.html", desc: "공격을 피하며 친구를 잡는 액션 게임" },
    { id: "26이OO", name: "이OO", title: "저녁 메뉴 추천", href: "students/26 이OO - 저녁 메뉴 추천.html", desc: "결정 장애를 해결해줄 메뉴 추천 서비스" },
    { id: "21박OO", name: "박OO", title: "오얏나무 키우기", href: "students/21 박OO - 오얏나무 키우기.html", desc: "오얏나무 성장 시뮬레이션" },
    { id: "21조OO", name: "조OO", title: "저녁메뉴추천", href: "students/21 조OO - 저녁메뉴추천.html", desc: "맛 취향에 따른 정밀 메뉴 추천" },
    { id: "21강OO", name: "강OO", title: "바퀴벌레 잡기 게임", href: "students/21 강OO - 바퀴벌레 잡기 게임.html", desc: "점점 빨라지는 바퀴벌레 퇴치 게임" },
    { id: "27이OO_roulette", name: "이OO", title: "룰렛 게임", href: "students/27 이OO - 룰렛 게임.html", desc: "운명을 결정하는 긴장감 넘치는 룰렛" },
    { id: "27유OO", name: "유OO", title: "만약에 시뮬레이터", href: "students/27 유OO - 만약에 시뮬레이터.html", desc: "선택에 따른 가상 시나리오 체험" },
    { id: "14김OO", name: "김OO", title: "야구게임", href: "students/15 김OO - 야구게임.html", desc: "박진감 넘치는 3D 야구 시뮬레이션" }
  ];

  // 2. IP 주소 가져오기 (중복 방지용)
  async function getIp() {
    try {
      const res = await fetch('https://api.ipify.org?format=json');
      const data = await res.json();
      return data.ip;
    } catch {
      return 'unknown';
    }
  }

  // 3. 조회수 증가 및 중복 체크 (1시간 기준)
  async function incrementView(id, href, event) {
    event.preventDefault();
    const userIp = await getIp();
    const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();

    // 최근 1시간 이내에 동일 IP가 해당 작품을 봤는지 확인
    const { data: logs } = await supabase
      .from('view_logs')
      .select('id')
      .eq('program_id', id)
      .eq('ip_hash', userIp)
      .gt('viewed_at', oneHourAgo);

    if (logs.length === 0) {
      // 로그가 없으면 조회수 증가 + 로그 기록
      await supabase.rpc('increment_view', { row_id: id }); // RPC 함수 필요 (아래 설명 참고)
      // 또는 간단히:
      const { data: current } = await supabase.from('programs').select('views').eq('id', id).single();
      await supabase.from('programs').update({ views: (current.views || 0) + 1 }).eq('id', id);
      
      await supabase.from('view_logs').insert({ program_id: id, ip_hash: userIp });
    }

    renderTable(); // 테이블 새로고침
    window.open(href, '_blank');
  }

  // 4. 테이블 렌더링
  async function renderTable() {
    const { data: dbData, error } = await supabase
      .from('programs')
      .select('*');

    if (error) {
      console.error('Error fetching data:', error);
      return;
    }

    const viewsMap = {};
    dbData.forEach(item => viewsMap[item.id] = item.views);

    const tbody = document.getElementById('tableBody');
    const sorted = [...programs].sort((a, b) => (viewsMap[b.id] || 0) - (viewsMap[a.id] || 0));

    tbody.innerHTML = sorted.map((p, index) => {
      const rank = index + 1;
      const viewCount = viewsMap[p.id] || 0;
      const badgeClass = rank <= 3 ? `rank-badge rank-${rank}` : 'rank-badge';
      const rankDisplay = rank <= 6 ? `<span class="${badgeClass}">${rank}</span>` : rank;

      return `
        <tr>
          <td>${rankDisplay}</td>
          <td>${p.name}</td>
          <td><a href="${p.href}" onclick="incrementView('${p.id}', '${p.href}', event)">${p.title}</a></td>
          <td class="desc">${p.desc}</td>
          <td class="view-count">${viewCount}</td>
        </tr>
      `;
    }).join('');
  }

  // 초기 실행
  renderTable();
</script>

</body>
</html>

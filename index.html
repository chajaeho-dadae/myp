<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나만의 프로그램 만들기 모음</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    :root {
      --bg-page: #1a1a1a;
      --bg-table: #252525;
      --bg-header: #111111;
      --bg-hover: #2e2e2e;
      --text-primary: #e8e8e8;
      --text-secondary: #aaaaaa;
      --border-color: #3a3a3a;
      --accent: #5AAACC;
      --rank-gold: #FFD700;
      --rank-silver: #C0C0C0;
      --rank-bronze: #CD7F32;
    }

    body {
      font-family: sans-serif;
      font-size: 18px;
      padding: 40px;
      background: var(--bg-page);
      color: var(--text-primary);
    }

    h1 {
      text-align: center;
      color: var(--text-primary);
    }

    h3 {
      text-align: center;
      color: var(--accent);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-table);
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 12px;
      text-align: center;
    }

    td.desc {
      text-align: left;
    }

    th {
      background: var(--bg-header);
      color: #ffffff;
    }

    tr:hover td {
      background: var(--bg-hover);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .view-count {
      font-weight: bold;
      color: var(--text-primary);
    }

    .rank-badge {
      display: inline-block;
      background: #3a3a3a;
      color: var(--text-primary);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      text-align: center;
      line-height: 28px;
      font-size: 14px;
      margin-right: 6px;
    }

    .rank-1 { background: var(--rank-gold); color: #333; }
    .rank-2 { background: var(--rank-silver); color: #333; }
    .rank-3 { background: var(--rank-bronze); color: white; }
  </style>
</head>

<body>

<h1>나만의 프로그램 만들기 모음</h1>
<h3>2026학년도 다대중학교 2학년 정보</h3>

<table id="programTable">
  <thead>
    <tr>
      <th>순위</th>
      <th>이름</th>
      <th>작품</th>
      <th>설명</th>
      <th>조회수</th>
    </tr>
  </thead>
  <tbody id="tableBody">
  </tbody>
</table>

<script>
  <script>

const SUPABASE_URL = 'https://sdhpzypjqmowhrhxvvsj.supabase.co/rest/v1/';
const SUPABASE_KEY = 'sb_publishable_RRyqMtpm4qI0BZ9gdIjTvw_XOnJiaHc';

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const programs = [
  // 기존 programs 배열 그대로 붙여넣기
];

async function getViews() {
  const { data, error } = await supabaseClient
    .from('views')
    .select('*');

  const views = {};

  if (data) {
    data.forEach(item => {
      views[item.id] = item.count;
    });
  }

  return views;
}

async function incrementView(id, href, event) {
  event.preventDefault();

  const lastViewedKey = `viewed_${id}`;
  const lastViewed = localStorage.getItem(lastViewedKey);

  const now = Date.now();

  // 1시간 제한
  if (lastViewed && now - Number(lastViewed) < 3600000) {
    window.open(href, '_blank');
    return;
  }

  // 기존 조회수 가져오기
  const { data } = await supabaseClient
    .from('views')
    .select('*')
    .eq('id', id)
    .single();

  if (data) {
    await supabaseClient
      .from('views')
      .update({
        count: data.count + 1
      })
      .eq('id', id);

  } else {

    await supabaseClient
      .from('views')
      .insert([
        {
          id: id,
          count: 1
        }
      ]);
  }

  localStorage.setItem(lastViewedKey, now);

  renderTable();

  window.open(href, '_blank');
}

async function renderTable() {

  const views = await getViews();

  const tbody = document.getElementById('tableBody');

  const sorted = [...programs].sort((a, b) => {
    return (views[b.id] || 0) - (views[a.id] || 0);
  });

  tbody.innerHTML = sorted.map((p, index) => {

    const rank = index + 1;
    const viewCount = views[p.id] || 0;

    const badgeClass =
      rank <= 3
      ? `rank-badge rank-${rank}`
      : 'rank-badge';

    const rankDisplay =
      rank <= 6
      ? `<span class="${badgeClass}">${rank}</span>`
      : '';

    return `
      <tr>
        <td>${rankDisplay}</td>

        <td>${p.name}</td>

        <td>
          <a href="${p.href}"
             onclick="incrementView('${p.id}', '${p.href}', event)">
            ${p.title}
          </a>
        </td>

        <td class="desc">${p.desc}</td>

        <td class="view-count">${viewCount}</td>
      </tr>
    `;

  }).join('');
}

window.incrementView = incrementView;

renderTable();

</script>
</script>

</body>
</html>

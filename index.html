<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 프로그램 만들기 모음</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --sub-text: #a0a0a0; --accent: #375a7f; --border: #333;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; position: relative; }
        .admin-btn { position: absolute; top: 0; right: 0; padding: 8px 15px; background: #444; color: #eee; border: 1px solid #555; border-radius: 5px; cursor: pointer; }
        h1 { margin: 0 0 10px 0; color: #fff; font-size: 2.2rem; }
        h3 { color: var(--sub-text); font-weight: 400; margin: 0; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-top: 20px; }
        th { background: var(--accent); color: #fff; padding: 18px; font-weight: 600; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        tr:hover { background: #252525; }
        .medal { font-size: 1.4rem; }
        .gold { color: #ffd700; } .silver { color: #c0c0c0; } .bronze { color: #cd7f32; }
        .project-link { color: #4da3ff; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 1.1rem; }
        .project-link:hover { text-decoration: underline; color: #82c0ff; }
        code { background: #333; padding: 3px 7px; border-radius: 4px; font-family: monospace; color: #ffadad; }
    </style>
</head>
<body>
    <header>
        <button class="admin-btn" onclick="goAdmin()">관리자 모드</button>
        <h1>나만의 프로그램 만들기 모음</h1>
        <h3>2026학년도 다대중학교 2학년 정보</h3>
    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">순위</th>
                    <th style="width: 100px;">이름</th>
                    <th>작품명 (클릭 시 실행)</th>
                    <th>설명</th>
                    <th>알고리즘</th>
                    <th style="width: 100px;">조회수</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </main>

    <script>
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        let supabase = (SUPABASE_URL.startsWith('http')) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        async function fetchAndRender() {
            let students = [];
            if (!supabase) {
                students = [{ name: "연결대기", title: "Supabase 설정을 완료해주세요", description: "-", algorithm: "-", views: 0, file_name: "#" }];
            } else {
                const { data } = await supabase.from('students').select('*').order('views', { ascending: false });
                students = data || [];
            }
            renderTable(students);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((s, i) => {
                let medal = "";
                let mClass = "";
                if (i === 0) { medal = "🥇"; mClass = "gold"; }
                else if (i < 3) { medal = "🥈"; mClass = "silver"; }
                else if (i < 6) { medal = "🥉"; mClass = "bronze"; }

                return `<tr>
                    <td class="medal ${mClass}">${medal}</td>
                    <td style="font-weight:500">${s.name}</td>
                    <td><span class="project-link" onclick="handleView('${s.file_name}', ${s.id})">${s.title}</span></td>
                    <td style="text-align:left; color:var(--sub-text); font-size:0.9rem;">${s.description}</td>
                    <td><code>${s.algorithm}</code></td>
                    <td style="color:#00ff88; font-weight:bold;">${(s.views || 0).toLocaleString()}</td>
                </tr>`;
            }).join('');
        }

        async function handleView(file, id) {
            if (supabase && id) {
                // 조회수 1 증가 (간단한 로직)
                const { data } = await supabase.from('students').select('views').eq('id', id).single();
                await supabase.from('students').update({ views: (data.views || 0) + 1 }).eq('id', id);
            }
            // 새 탭에서 열기
            if (file !== "#") {
                const url = file.startsWith('http') ? file : `students/${file}`;
                window.open(url, '_blank');
                location.reload(); // 메인 페이지 순위 갱신을 위해 새로고침
            }
        }

        function goAdmin() {
            console.log("관리자 모드 실행 시도"); // 개발자 도구(F12) 콘솔에서 확인용
            
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            
            // 취소를 누르거나 빈 값을 입력했을 때
            if (pw === null || pw === "") {
                console.log("입력이 취소되었습니다.");
                return;
            }
        
            if (pw === "1234") {
                console.log("비밀번호 일치, admin.html로 이동합니다.");
                // 경로가 확실하도록 ./를 붙여서 이동
                window.location.assign("./admin.html");
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }
        fetchAndRender();
    </script>
</body>
</html>

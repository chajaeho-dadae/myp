<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 프로그램 만들기 모음</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f8f9fa; }
        header { text-align: center; margin-bottom: 40px; position: relative; }
        .admin-btn { position: absolute; top: 0; right: 0; padding: 8px 15px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; }
        h1 { margin-bottom: 10px; color: #333; }
        h3 { color: #666; font-weight: 400; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #007bff; color: white; }
        .medal { font-size: 1.2rem; font-weight: bold; }
        .gold { color: #ffd700; } .silver { color: #c0c0c0; } .bronze { color: #cd7f32; }
        .project-link { color: #007bff; text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <button class="admin-btn" onclick="goAdmin()">관리자 모드</button>
        <h1>나만의 프로그램 만들기 모음</h1>
        <h3>2026학년도 다대중학교 2학년 정보</h3>
    </header>

    <main>
        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>이름</th>
                    <th>작품명</th>
                    <th>설명</th>
                    <th>알고리즘</th>
                    <th>조회수</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </main>

    <script>
        // --- Supabase 설정 (여기에 본인의 키를 입력하세요) ---
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        
        let supabase = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_PROJECT_URL') {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        async function fetchAndRender() {
            let students = [];

            // API 키가 등록되지 않았거나 Supabase 연결 실패 시 기본값(0) 설정
            if (!supabase) {
                console.warn("Supabase API 키가 설정되지 않았습니다. 기본 데이터를 표시합니다.");
                // 임시/기본 데이터 예시 (조회수 0)
                students = [
                    { name: "데이터 로딩중", title: "설정 필요", description: "API키를 등록해주세요", algorithm: "-", views: 0, file_name: "#" }
                ];
            } else {
                const { data, error } = await supabase
                    .from('students')
                    .select('*')
                    .order('views', { ascending: false });

                if (error) {
                    console.error("데이터 호출 에러:", error);
                } else {
                    students = data;
                }
            }

            renderTable(students);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map((s, index) => {
                let rankLabel = "";
                let medalClass = "";
                if (index === 0) { rankLabel = "🥇"; medalClass = "gold"; }
                else if (index >= 1 && index <= 2) { rankLabel = "🥈"; medalClass = "silver"; }
                else if (index >= 3 && index <= 5) { rankLabel = "🥉"; medalClass = "bronze"; }

                return `
                    <tr>
                        <td class="medal ${medalClass}">${rankLabel}</td>
                        <td>${s.name}</td>
                        <td><span class="project-link" onclick="handleView('${s.file_name}', ${s.id})">${s.title}</span></td>
                        <td>${s.description}</td>
                        <td>${s.algorithm}</td>
                        <td>${s.views}</td>
                    </tr>
                `;
            }).join('');
        }

        // 조회수 증가 함수
        async function handleView(fileName, id) {
            if (supabase) {
                // DB에서 조회수 1 증가 (RPC 사용이 깔끔하지만 기본 update로 구현)
                const { data } = await supabase
                    .from('students')
                    .select('views')
                    .eq('id', id)
                    .single();
                
                await supabase
                    .from('students')
                    .update({ views: (data.views || 0) + 1 })
                    .eq('id', id);
            }
            
            // 실제 학생 파일로 이동
            window.location.href = `students/${fileName}`;
        }

        function goAdmin() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "1234") location.href = "admin.html";
            else alert("비밀번호가 틀렸습니다.");
        }

        // 페이지 로드 시 실행
        fetchAndRender();
    </script>
</body>
</html>

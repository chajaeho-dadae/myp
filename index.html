<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 프로그램 만들기 모음</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --sub-text: #a0a0a0; --accent: #375a7f; --border: #333;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 40px; position: relative; }
        .admin-btn { position: absolute; top: 0; right: 0; padding: 8px 15px; background: #444; color: #eee; border: 1px solid #555; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .admin-btn:hover { background: #555; }
        h1 { margin: 0 0 10px 0; color: #fff; font-size: 2.2rem; }
        h3 { color: var(--sub-text); font-weight: 400; margin: 0; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-top: 20px; }
        th { background: var(--accent); color: #fff; padding: 18px; font-weight: 600; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        tr:hover { background: #252525; }
        .medal { font-size: 1.4rem; }
        .gold { color: #ffd700; } .silver { color: #c0c0c0; } .bronze { color: #cd7f32; }
        .project-link { color: #4da3ff; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 1.1rem; }
        .project-link:hover { text-decoration: underline; color: #82c0ff; }
        code { background: #333; padding: 3px 7px; border-radius: 4px; font-family: monospace; color: #ffadad; }
        .loading-text { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>
    <header>
        <button class="admin-btn" onclick="goAdmin()">관리자 모드</button>
        <a href="./admin.html" ><button>관리자 모드</button></a>
        <h1>나만의 프로그램 만들기 모음</h1>
        <h3>2026학년도 다대중학교 2학년 정보</h3>
    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">순위</th>
                    <th style="width: 100px;">이름</th>
                    <th>작품명 (클릭 시 실행)</th>
                    <th>설명</th>
                    <th>알고리즘</th>
                    <th style="width: 100px;">조회수</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="loading-text">데이터를 불러오고 있습니다...</td></tr>
            </tbody>
        </table>
    </main>

    <script>
        // --- Supabase 설정 (본인의 정보 입력) ---
        const SUPABASE_URL = 'https://sdhpzypjqmowhrhxvvsj.supabase.co/rest/v1/';
        const SUPABASE_KEY = 'sb_publishable_RRyqMtpm4qI0BZ9gdIjTvw_XOnJiaHc';
        
        let supabase = null;
        try {
            // URL이 유효한 경우에만 클라이언트 생성
            if (SUPABASE_URL.startsWith('http')) {
                supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) {
            console.error("Supabase 초기화 실패:", e);
        }

        async function fetchAndRender() {
            let students = [];
            
            // 1. 기본 데이터 로딩 시도
            try {
                if (supabase) {
                    const { data, error } = await supabase
                        .from('students')
                        .select('*')
                        .order('views', { ascending: false });

                    if (error) throw error;
                    students = data || [];
                } else {
                    throw new Error("Supabase 클라이언트가 설정되지 않음");
                }
            } catch (err) {
                console.warn("DB 호출 실패, 기본 레이아웃을 표시합니다.", err);
                // 2. 호출 실패 시 보여줄 임시/더미 데이터 (조회수 0으로 표시)
                students = [
                    { id: null, name: "연결대기", title: "DB 연결 확인 필요", description: "Supabase 설정이 완료되면 실제 목록이 나타납니다.", algorithm: "None", views: 0, file_name: "#" }
                ];
            }

            renderTable(students);
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading-text">등록된 작품이 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map((s, i) => {
                let medal = "";
                let mClass = "";
                // 조회수 순위별 메달 표시 (데이터가 있을 때만)
                if (s.views > 0 || i < 6) {
                    if (i === 0) { medal = "🥇"; mClass = "gold"; }
                    else if (i < 3) { medal = "🥈"; mClass = "silver"; }
                    else if (i < 6) { medal = "🥉"; mClass = "bronze"; }
                }

                return `<tr>
                    <td class="medal ${mClass}">${medal}</td>
                    <td style="font-weight:500">${s.name}</td>
                    <td><span class="project-link" onclick="handleView('${s.file_name}', ${s.id})">${s.title}</span></td>
                    <td style="text-align:left; color:var(--sub-text); font-size:0.9rem;">${s.description}</td>
                    <td><code>${s.algorithm}</code></td>
                    <td style="color:#00ff88; font-weight:bold;">${(s.views || 0).toLocaleString()}</td>
                </tr>`;
            }).join('');
        }

        async function handleView(file, id) {
            // DB 업데이트 시도 (실패해도 파일 이동은 진행)
            try {
                if (supabase && id) {
                    const { data: current } = await supabase.from('students').select('views').eq('id', id).single();
                    await supabase.from('students').update({ views: (current.views || 0) + 1 }).eq('id', id);
                }
            } catch (e) {
                console.error("조회수 업데이트 실패:", e);
            }

            // 파일 이동
            if (file && file !== "#") {
                const url = file.startsWith('http') ? file : `students/${file}`;
                window.open(url, '_blank');
                // 순위 갱신을 위해 약간의 지연 후 새로고침 (선택 사항)
                setTimeout(() => location.reload(), 500);
            }
        }

        function goAdmin() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "1234") {
                window.location.assign("./admin.html");
            } else if (pw !== null) {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        // 페이지 로드 시 즉시 실행
        fetchAndRender();
    </script>
</body>
</html>

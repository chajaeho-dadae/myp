<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI를 활용한 나만의 프로그램 만들기</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --card: #1c2030;
      --border: #252a3a;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --text: #e8ecf5;
      --muted: #6b7490;
      --gold: #f5c842;
      --silver: #b0bec5;
      --bronze: #cd7c3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 60px 24px 40px;
    }

    .title-main {
      font-family: "Black Han Sans", sans-serif;
      font-size: 3rem;
    }

    .title-sub {
      margin-top: 10px;
      color: var(--muted);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .state-msg {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    .medal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .medal-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-decoration: none;
      color: white;
      position: relative;
      transition: 0.2s;
    }

    .medal-card:hover {
      transform: translateY(-4px);
    }

    .gold {
      border-color: var(--gold);
    }

    .silver {
      border-color: var(--silver);
    }

    .bronze {
      border-color: var(--bronze);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-top: 8px;
    }

    .card-name {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card-views {
      margin-top: 12px;
      color: var(--accent);
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

<header>
  <div class="title-main">AI를 활용한 나만의 프로그램 만들기</div>
  <div class="title-sub">2026학년도 · 정보</div>
</header>

<main>
  <div id="app">
    <div class="state-msg">
      학생 작품을 불러오는 중…
    </div>
  </div>
</main>

<script>
  const GITHUB_USER = "chajaeho-dadae";
  const GITHUB_REPO = "myp";
  const GITHUB_BRANCH = "main";
  const FOLDER = "students";

  async function fetchStudentsFromGitHub() {
    const url =
      `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER}?ref=${GITHUB_BRANCH}`;

    const res = await fetch(url, {
      headers: {
        Accept: "application/vnd.github+json"
      }
    });

    if (!res.ok) {
      throw new Error(`GitHub API 오류: ${res.status}`);
    }

    const items = await res.json();

    return items
      .filter(item =>
        item.type === "file" &&
        item.name.endsWith(".html")
      )
      .map(item => {

        const filename = item.name;
        const base = filename.replace(/\.html$/i, "");

        const dashIdx = base.indexOf(" - ");

        let name = "";
        let title = base;

        if (dashIdx !== -1) {
          name = base.slice(0, dashIdx).trim();
          title = base.slice(dashIdx + 3).trim();
        }

        return {
          file: filename,
          name,
          title,
          views: 0
        };
      });
  }

  function render(students) {

    const sorted = [...students];

    const medals = ["🥇", "🥈", "🥉"];

    const html = `
      <div class="medal-grid">
        ${sorted.map((s, i) => `
          <a
            class="medal-card ${
              i === 0 ? "gold" :
              i === 1 ? "silver" :
              "bronze"
            }"
            href="${FOLDER}/${s.file}"
            target="_blank"
          >
            <div>${medals[i] || "🏅"}</div>

            <div class="card-name">${s.name}</div>

            <div class="card-title">
              ${s.title}
            </div>

            <div class="card-views">
              조회수 ${s.views}
            </div>
          </a>
        `).join("")}
      </div>
    `;

    document.getElementById("app").innerHTML = html;
  }

  (async () => {

    try {

      const students = await fetchStudentsFromGitHub();

      if (students.length === 0) {
        document.getElementById("app").innerHTML =
          `<div class="state-msg">
            students 폴더에 html 파일이 없습니다.
          </div>`;
        return;
      }

      render(students);

    } catch (err) {

      document.getElementById("app").innerHTML =
        `<div class="state-msg">
          오류 발생<br>
          ${err.message}
        </div>`;
    }

  })();
</script>

</body>
</html>

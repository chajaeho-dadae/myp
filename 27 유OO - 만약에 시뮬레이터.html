<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만약에 시뮬레이터</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Black+Han+Sans&display=swap');

  :root {
    --bg: #0a0a12;
    --panel: #12121e;
    --border: #2a2a40;
    --accent: #ff4d6d;
    --accent2: #7b61ff;
    --accent3: #00d4aa;
    --text: #e8e8f0;
    --dim: #6b6b88;
    --glow: rgba(255,77,109,0.35);
    --glow2: rgba(123,97,255,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* 배경 노이즈 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,97,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,77,109,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ─── 헤더 ─────────────────────────────────────────── */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.9;
  }
  .header h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(42px, 10vw, 72px);
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .header .sub {
    color: var(--dim);
    font-size: 14px;
    line-height: 1.7;
  }

  /* ─── 진행 바 ───────────────────────────────────────── */
  .progress-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
  }
  .progress-dot {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    transition: background 0.4s;
    position: relative;
    overflow: hidden;
  }
  .progress-dot.done { background: var(--accent2); }
  .progress-dot.active {
    background: var(--border);
  }
  .progress-dot.active::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 60%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  /* ─── 카드 ──────────────────────────────────────────── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }

  /* ─── 입력 섹션 ─────────────────────────────────────── */
  .round-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .prompt-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 28px;
  }
  .prompt-text .highlight {
    color: var(--accent);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 26px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .situation-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .situation-input::placeholder { color: var(--dim); }
  .situation-input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(123,97,255,0.15);
  }

  .btn-simulate {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px var(--glow2);
  }
  .btn-simulate:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-simulate:active { transform: translateY(0); }
  .btn-simulate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .example-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .chip {
    padding: 6px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover {
    border-color: var(--accent2);
    color: var(--text);
    background: rgba(123,97,255,0.1);
  }

  /* ─── 로딩 ──────────────────────────────────────────── */
  .loading-wrap {
    text-align: center;
    padding: 40px 0;
    display: none;
  }
  .loading-wrap.visible { display: block; }
  .loading-ring {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msgs { color: var(--dim); font-size: 14px; min-height: 24px; }

  /* ─── 결과 ──────────────────────────────────────────── */
  .result-wrap { display: none; }
  .result-wrap.visible { display: block; }

  .result-question {
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 8px;
  }
  .result-situation {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .scenario-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 520px) {
    .scenario-grid { grid-template-columns: 1fr; }
  }

  .scenario-card {
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--border);
    animation: fadeUp 0.5s ease both;
  }
  .scenario-card:nth-child(1) { animation-delay: 0.1s; }
  .scenario-card:nth-child(2) { animation-delay: 0.25s; }
  .scenario-card:nth-child(3) { animation-delay: 0.4s; grid-column: 1 / -1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scenario-icon { font-size: 28px; margin-bottom: 10px; }
  .scenario-type {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }
  .scenario-story {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }
  .scenario-card.type-a { border-color: rgba(255,77,109,0.3); }
  .scenario-card.type-b { border-color: rgba(0,212,170,0.3); }
  .scenario-card.type-c {
    border-color: rgba(123,97,255,0.3);
    background: rgba(123,97,255,0.05);
  }
  .scenario-card.type-c .scenario-type { color: var(--accent2); }

  .btn-next {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: 12px;
    color: var(--accent2);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 8px;
  }
  .btn-next:hover {
    background: rgba(123,97,255,0.1);
    box-shadow: 0 0 20px var(--glow2);
  }

  /* ─── 최종 결과 ─────────────────────────────────────── */
  .final-wrap {
    display: none;
    text-align: center;
  }
  .final-wrap.visible { display: block; }

  .final-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 36px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent3), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .final-sub { color: var(--dim); font-size: 14px; margin-bottom: 36px; }

  .timeline {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 36px;
  }
  .timeline-item {
    display: flex;
    gap: 16px;
    animation: fadeUp 0.5s ease both;
  }
  .timeline-item:nth-child(1) { animation-delay: 0.1s; }
  .timeline-item:nth-child(2) { animation-delay: 0.2s; }
  .timeline-item:nth-child(3) { animation-delay: 0.3s; }
  .timeline-item:nth-child(4) { animation-delay: 0.4s; }
  .timeline-item:nth-child(5) { animation-delay: 0.5s; }
  .timeline-item:nth-child(6) { animation-delay: 0.6s; }
  .timeline-item:nth-child(7) { animation-delay: 0.7s; }

  .tl-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 32px;
    flex-shrink: 0;
  }
  .tl-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
    margin-top: 4px;
  }
  .tl-line {
    flex: 1;
    width: 2px;
    background: var(--border);
    min-height: 24px;
  }
  .timeline-item:last-child .tl-line { display: none; }

  .tl-content {
    padding-bottom: 24px;
    flex: 1;
  }
  .tl-q {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 4px;
    font-weight: 700;
  }
  .tl-summary {
    font-size: 14px;
    color: var(--dim);
    line-height: 1.6;
  }

  .final-verdict {
    background: linear-gradient(135deg, rgba(123,97,255,0.15), rgba(255,77,109,0.1));
    border: 1px solid rgba(123,97,255,0.3);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.8s ease both;
  }
  .verdict-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .verdict-text {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .btn-restart {
    display: inline-block;
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 999px;
    color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 8px 32px var(--glow2);
    animation: fadeUp 0.5s 1s ease both;
  }
  .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 12px 40px var(--glow2); }

  /* ─── 히스토리 패널 ─────────────────────────────────── */
  .history-panel {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .history-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .history-item:hover { opacity: 1; }
  .history-item-q { font-size: 12px; color: var(--accent2); margin-bottom: 6px; }
  .history-item-sit { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
  .history-item-summary { font-size: 13px; color: var(--dim); line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="eyebrow">What if Simulator</div>
    <h1>만약에?</h1>
    <p class="sub">당신의 선택이 만들어낼 다른 가능성을 탐험해보세요<br>총 7번의 선택으로 당신만의 이야기가 완성됩니다</p>
  </div>

  <!-- 진행 바 -->
  <div class="progress-wrap" id="progressWrap"></div>

  <!-- 메인 카드 -->
  <div class="card" id="mainCard">

    <!-- 입력 섹션 -->
    <div id="inputSection">
      <div class="round-label" id="roundLabel">Round 1 / 7</div>
      <div class="prompt-text" id="promptText">
        오늘 당신의 <span class="highlight">고민이나 상황</span>을 입력해보세요
      </div>
      <div class="input-row">
        <input class="situation-input" id="situationInput"
               placeholder="예: 오늘 공부 안 하면?"
               maxlength="60">
        <button class="btn-simulate" id="simulateBtn" onclick="simulate()">시뮬레이션</button>
      </div>
      <div class="example-chips" id="exampleChips"></div>
    </div>

    <!-- 로딩 -->
    <div class="loading-wrap" id="loadingWrap">
      <div class="loading-ring"></div>
      <div class="loading-msgs" id="loadingMsg"></div>
    </div>

    <!-- 결과 -->
    <div class="result-wrap" id="resultWrap">
      <div class="result-question" id="resultQuestion"></div>
      <div class="result-situation" id="resultSituation"></div>
      <div class="scenario-grid" id="scenarioGrid"></div>
      <button class="btn-next" id="nextBtn" onclick="nextRound()">다음 선택으로 →</button>
    </div>

  </div>

  <!-- 히스토리 -->
  <div class="history-panel" id="historyPanel"></div>

  <!-- 최종 결과 -->
  <div class="card" id="finalCard" style="display:none; margin-top:32px;">
    <div class="final-wrap" id="finalWrap">
      <div class="final-title">7번의 선택 완료!</div>
      <div class="final-sub">당신이 탐험한 모든 가능성들</div>
      <div class="timeline" id="finalTimeline"></div>
      <div class="final-verdict" id="finalVerdict">
        <div class="verdict-label">최종 판정</div>
        <div class="verdict-text" id="verdictText"></div>
      </div>
      <button class="btn-restart" onclick="restart()">다시 시작하기</button>
    </div>
  </div>

</div>

<script>
// ── 상수 ──────────────────────────────────────────────────────────────
const TOTAL_ROUNDS = 7;

const ROUND_PROMPTS = [
  "지금 머릿속에 맴도는 <span class='highlight'>그 선택</span>을 입력해보세요",
  "오늘 하루, <span class='highlight'>두 번째 갈림길</span>에 서 있다면?",
  "인생의 <span class='highlight'>작은 나비효과</span> — 만약 이렇게 된다면?",
  "지금 이 순간 <span class='highlight'>용기를 낸다면?</span> 아니면 포기한다면?",
  "<span class='highlight'>다섯 번째 선택</span>의 기로에 섰습니다",
  "이제 여섯 번째, <span class='highlight'>가장 솔직한 고민</span>을 입력해보세요",
  "<span class='highlight'>마지막 선택</span>입니다. 신중하게!",
];

const EXAMPLE_SETS = [
  ["오늘 공부 안 하면?", "좋아하는 사람에게 고백하면?", "학교 빠지면?"],
  ["밥 굶으면?", "친구한테 솔직하게 말하면?", "SNS 끊으면?"],
  ["지각하면?", "취미를 직업으로 삼으면?", "새벽에 산책 가면?"],
  ["알바를 시작하면?", "머리를 빡빡 밀면?", "선생님께 반박하면?"],
  ["해외로 떠나면?", "핸드폰 없이 하루를 보내면?", "모르는 사람에게 말을 걸면?"],
  ["진짜 하고 싶은 말을 하면?", "지금 당장 자면?", "오늘 아무것도 안 하면?"],
  ["이 게임을 다시 하면?", "모든 걸 처음부터 다시 시작하면?", "지금 이 순간을 바꾸면?"],
];

const LOADING_MSGS = [
  ["평행우주 계산 중...", "가능성의 실타래를 풀고 있어요...", "나비효과를 추적 중...", "시뮬레이션 완료!"],
];

// ── 상태 ──────────────────────────────────────────────────────────────
let currentRound = 0;
let history = [];

// ── 초기화 ────────────────────────────────────────────────────────────
function init() {
  buildProgress();
  updateRound();
}

function buildProgress() {
  const wrap = document.getElementById('progressWrap');
  wrap.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'progress-dot';
    d.id = `dot-${i}`;
    wrap.appendChild(d);
  }
  updateProgress();
}

function updateProgress() {
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const d = document.getElementById(`dot-${i}`);
    d.className = 'progress-dot' + (i < currentRound ? ' done' : i === currentRound ? ' active' : '');
  }
}

function updateRound() {
  document.getElementById('roundLabel').textContent = `Round ${currentRound + 1} / ${TOTAL_ROUNDS}`;
  document.getElementById('promptText').innerHTML = ROUND_PROMPTS[currentRound];
  document.getElementById('situationInput').value = '';
  document.getElementById('situationInput').placeholder = EXAMPLE_SETS[currentRound][0];

  const chips = document.getElementById('exampleChips');
  chips.innerHTML = EXAMPLE_SETS[currentRound].map(ex =>
    `<span class="chip" onclick="fillExample('${ex}')">${ex}</span>`
  ).join('');

  showSection('input');
  updateProgress();
  document.getElementById('situationInput').focus();
}

function fillExample(text) {
  document.getElementById('situationInput').value = text;
  document.getElementById('situationInput').focus();
}

function showSection(which) {
  document.getElementById('inputSection').style.display = which === 'input' ? 'block' : 'none';
  document.getElementById('loadingWrap').className = 'loading-wrap' + (which === 'loading' ? ' visible' : '');
  document.getElementById('resultWrap').className = 'result-wrap' + (which === 'result' ? ' visible' : '');
}

// ── API 호출 ──────────────────────────────────────────────────────────
async function simulate() {
  const input = document.getElementById('situationInput').value.trim();
  if (!input) {
    document.getElementById('situationInput').focus();
    return;
  }

  document.getElementById('simulateBtn').disabled = true;
  showSection('loading');

  // 로딩 메시지 순환
  const msgs = ["평행우주 계산 중...", "가능성의 실타래를 풀고 있어요...", "나비효과를 추적 중...", "결말을 쓰고 있어요..."];
  let mi = 0;
  const msgEl = document.getElementById('loadingMsg');
  msgEl.textContent = msgs[mi];
  const msgTimer = setInterval(() => {
    mi = (mi + 1) % msgs.length;
    msgEl.textContent = msgs[mi];
  }, 900);

  try {
    const systemPrompt = `당신은 창의적인 스토리텔러입니다. 사용자가 "만약에 ~하면?" 같은 상황을 입력하면, 그 선택의 세 가지 다른 가능성(시나리오 A, B, C)을 짧고 재미있게 시뮬레이션해주세요.

반드시 아래 JSON 형식으로만 응답하세요 (마크다운 코드블록 없이):
{
  "scenarioA": {
    "icon": "이모지 1개",
    "type": "시나리오 유형 (예: 최악의 경우, 현실적 결말, 기적의 반전 등 매번 다르게)",
    "story": "3~4줄의 짧고 재미있는 스토리. 구체적이고 생생하게. 약간 과장되어도 OK."
  },
  "scenarioB": {
    "icon": "이모지 1개",
    "type": "시나리오 유형",
    "story": "3~4줄의 짧고 재미있는 스토리"
  },
  "scenarioC": {
    "icon": "이모지 1개",
    "type": "반전 시나리오",
    "story": "전혀 예상 못한 황당하거나 감동적인 반전 스토리. 이 시나리오가 가장 임팩트 있어야 함."
  }
}

규칙:
- 중학생도 공감할 수 있는 일상적 상황에 맞게
- 유머와 현실감을 섞어서
- 각 시나리오는 확실히 다른 방향이어야 함
- story는 반드시 한국어로`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: `만약에 ${input}` }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text.trim();
    const parsed = JSON.parse(text);

    clearInterval(msgTimer);
    renderResult(input, parsed);

  } catch (err) {
    clearInterval(msgTimer);
    // 폴백: 오프라인 시나리오
    renderResult(input, getFallback(input));
  }

  document.getElementById('simulateBtn').disabled = false;
}

// ── 결과 렌더링 ───────────────────────────────────────────────────────
function renderResult(situation, data) {
  document.getElementById('resultQuestion').textContent = `Round ${currentRound + 1}의 선택`;
  document.getElementById('resultSituation').textContent = `"만약에 ${situation}"`;

  const grid = document.getElementById('scenarioGrid');
  grid.innerHTML = `
    <div class="scenario-card type-a">
      <div class="scenario-icon">${data.scenarioA.icon}</div>
      <div class="scenario-type">${data.scenarioA.type}</div>
      <div class="scenario-story">${data.scenarioA.story}</div>
    </div>
    <div class="scenario-card type-b">
      <div class="scenario-icon">${data.scenarioB.icon}</div>
      <div class="scenario-type">${data.scenarioB.type}</div>
      <div class="scenario-story">${data.scenarioB.story}</div>
    </div>
    <div class="scenario-card type-c">
      <div class="scenario-icon">${data.scenarioC.icon}</div>
      <div class="scenario-type">✨ ${data.scenarioC.type}</div>
      <div class="scenario-story">${data.scenarioC.story}</div>
    </div>
  `;

  // 히스토리 저장
  history.push({
    round: currentRound + 1,
    situation,
    summary: data.scenarioA.story.slice(0, 60) + '...'
  });

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentRound < TOTAL_ROUNDS - 1 ? `다음 선택으로 →` : '최종 결과 보기 🎯';

  showSection('result');
}

// ── 다음 라운드 ───────────────────────────────────────────────────────
async function nextRound() {
  // 히스토리 패널에 추가
  addHistoryItem(history[history.length - 1]);

  currentRound++;

  if (currentRound >= TOTAL_ROUNDS) {
    showFinal();
    return;
  }

  showSection('input');
  updateRound();
}

function addHistoryItem(item) {
  const panel = document.getElementById('historyPanel');
  const el = document.createElement('div');
  el.className = 'history-item';
  el.innerHTML = `
    <div class="history-item-q">Round ${item.round}</div>
    <div class="history-item-sit">"만약에 ${item.situation}"</div>
    <div class="history-item-summary">${item.summary}</div>
  `;
  el.style.animation = 'fadeUp 0.4s ease both';
  panel.insertBefore(el, panel.firstChild);
}

// ── 최종 결과 ─────────────────────────────────────────────────────────
async function showFinal() {
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('historyPanel').style.display = 'none';

  const finalCard = document.getElementById('finalCard');
  finalCard.style.display = 'block';
  document.getElementById('finalWrap').className = 'final-wrap visible';

  // 타임라인
  const tl = document.getElementById('finalTimeline');
  tl.innerHTML = history.map(h => `
    <div class="timeline-item">
      <div class="tl-left">
        <div class="tl-dot"></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-content">
        <div class="tl-q">Round ${h.round} — "${h.situation}"</div>
        <div class="tl-summary">${h.summary}</div>
      </div>
    </div>
  `).join('');

  // 최종 판정 AI 호출
  try {
    const situations = history.map(h => `${h.round}. ${h.situation}`).join('\n');
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 400,
        messages: [{
          role: "user",
          content: `아래는 한 사람이 탐험한 7가지 "만약에" 상황입니다:\n${situations}\n\n이 7가지 선택들을 종합해서, 이 사람의 성격이나 고민 패턴을 재치 있고 따뜻하게 분석해주세요. 3~4문장으로, 한국어로. 너무 진지하지 않게, 친구에게 말하듯이.`
        }]
      })
    });
    const data = await response.json();
    document.getElementById('verdictText').textContent = data.content[0].text;
  } catch {
    document.getElementById('verdictText').textContent =
      '7번의 선택을 모두 마쳤군요! 당신은 다양한 가능성을 탐험하는 용감한 사람입니다. 모든 선택에는 이유가 있고, 그 이유가 바로 당신을 만들어가고 있어요. 다음엔 또 어떤 "만약에"를 탐험해볼까요?';
  }

  finalCard.scrollIntoView({ behavior: 'smooth' });
}

// ── 재시작 ────────────────────────────────────────────────────────────
function restart() {
  currentRound = 0;
  history = [];
  document.getElementById('historyPanel').innerHTML = '';
  document.getElementById('historyPanel').style.display = 'flex';
  document.getElementById('mainCard').style.display = 'block';
  document.getElementById('finalCard').style.display = 'none';
  buildProgress();
  updateRound();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 폴백 시나리오 ─────────────────────────────────────────────────────
function getFallback(situation) {
  return {
    scenarioA: {
      icon: "😱",
      type: "현실적 결말",
      story: `${situation}... 처음엔 아무것도 안 변한 것 같았어요. 하지만 3일 후, 그 선택이 예상치 못한 연쇄반응을 일으키기 시작했습니다. 작은 나비 한 마리가 날갯짓을 한 거예요.`
    },
    scenarioB: {
      icon: "🌈",
      type: "의외의 성공",
      story: `${situation}... 주변 사람들은 말렸지만, 결과적으로 최선의 선택이었습니다. 3개월 후 당신은 그 선택 덕분에 완전히 다른 사람이 되어 있었어요.`
    },
    scenarioC: {
      icon: "🎭",
      type: "반전의 반전",
      story: `${situation}... 그런데 알고 보니, 그건 애초에 선택이 아니었어요. 우주가 당신을 위해 미리 준비해둔 길이었던 거죠. 무서운가요? 아니면 설레나요?`
    }
  };
}

// ── Enter 키 지원 ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('situationInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') simulate();
  });
});
</script>

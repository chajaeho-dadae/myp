<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 경제왕 </title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ================================================================
     🚪 입장 화면
     ================================================================ -->
<div id="screen-join" class="screen" style="display:block">
  <div class="join-wrapper">
    <div class="join-box">

      <div class="join-title">📈 경제왕 </div>
      <div class="join-sub">방 코드와 이름을 입력하고 입장하세요</div>

      <div class="card">
        <div class="card-title">🚪 게임 입장</div>

        <div class="form-group">
          <label>방 코드 (4자리)</label>
          <input type="text" id="p-room-code"
            maxlength="4"
            placeholder="예: AB12"
            style="font-family:'JetBrains Mono',monospace;
                   font-size:22px;letter-spacing:.15em;
                   text-align:center;text-transform:uppercase"
            oninput="this.value=this.value.toUpperCase()"
            onkeydown="if(event.key==='Enter')playerJoin()">
        </div>

        <div class="form-group">
          <label>이름</label>
          <input type="text" id="p-name"
            maxlength="10"
            placeholder="본인 이름 입력"
            onkeydown="if(event.key==='Enter')playerJoin()">
        </div>

        <button class="btn btn-primary btn-full btn-lg"
          id="p-btn-join" onclick="playerJoin()">
          🚀 입장하기
        </button>

        <div style="margin-top:16px;text-align:center">
          <a href="host.html"
            style="font-size:12px;color:var(--text-3);text-decoration:none">
            진행자이신가요? → 진행자 화면으로
          </a>
        </div>
      </div>

    </div>
  </div>
</div>


<!-- ================================================================
     🎮 게임 화면
     ================================================================ -->
<div id="screen-game" class="screen" style="display:none">
  <div class="player-layout">

    <!-- 헤더 -->
    <div class="player-header">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="player-name-badge">
          👤 <span id="p-name-display"></span>
        </span>
        <span style="color:var(--text-3);font-size:12px"
          id="p-round-display"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="player-cash-badge">
          💵 <span id="p-cash-display"></span>
        </span>
        <button class="btn btn-ghost btn-sm"
          onclick="playerLeave()">🚪 나가기</button>
      </div>
    </div>

    <!-- 본문 -->
    <div class="player-body">

      <!-- 자산 요약 -->
      <div class="asset-summary">
        <div class="asset-item">
          <div class="asset-label">💵 보유 현금</div>
          <div class="asset-value" id="p-cash-value">-</div>
        </div>
        <div class="asset-item">
          <div class="asset-label">📦 주식 평가액</div>
          <div class="asset-value" id="p-stock-value">-</div>
        </div>
        <div class="asset-item total">
          <div class="asset-label">🏆 총 자산</div>
          <div class="asset-value" id="p-total-value">-</div>
        </div>
      </div>

      <!-- 종목 목록 -->
      <div class="card">
        <div class="card-title">📈 종목 목록</div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>종목명</th>
                <th>현재가</th>
                <th>보유</th>
                <th>거래</th>
              </tr>
            </thead>
            <tbody id="p-stock-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 보유 주식 현황 -->
      <div class="card">
        <div class="card-title">💼 보유 주식 현황</div>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>종목</th>
                <th>수량</th>
                <th>평균매입가</th>
                <th>현재가치</th>
                <th>손익</th>
              </tr>
            </thead>
            <tbody id="p-holdings-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 뉴스 -->
      <div class="card">
        <div class="card-title">📰 뉴스</div>

        <div style="font-size:11px;color:var(--text-3);
                    margin-bottom:8px;padding:6px 10px;
                    background:var(--bg-2);border-radius:4px">
          ⚠️ 거래 전 뉴스는 실제와 다를 수 있습니다
          <strong style="color:var(--yellow)">(정확도 약 25%)</strong>
        </div>
        <ul class="news-list" id="p-news-pre">
          <li class="muted">뉴스를 기다리는 중…</li>
        </ul>

        <div style="font-size:12px;font-weight:700;
                    color:var(--yellow);margin:14px 0 6px">
          📣 결과 뉴스
          <span style="font-size:11px;font-weight:400;
                       color:var(--text-3)">(큰 변동 종목만)</span>
        </div>
        <ul class="news-list" id="p-news-post">
          <li class="muted">결과 뉴스 없음</li>
        </ul>
      </div>

      <!-- 실시간 순위 -->
      <div class="card">
        <div class="card-title">🏆 실시간 순위</div>
        <table class="rank-table">
          <thead>
            <tr>
              <th>순위</th>
              <th>이름</th>
              <th>총자산</th>
            </tr>
          </thead>
          <tbody id="p-rank-tbody"></tbody>
        </table>
      </div>

    </div><!-- /player-body -->
  </div><!-- /player-layout -->
</div><!-- /screen-game -->


<!-- ================================================================
     🏁 종료 화면
     ================================================================ -->
<div id="screen-finish" class="screen" style="display:none">
  <div class="join-wrapper">
    <div class="join-box" style="max-width:560px">

      <div class="card">
        <div class="card-title">🏁 게임 종료</div>
        <div id="p-finish-msg"
          style="font-size:28px;font-weight:700;
                 text-align:center;margin-bottom:20px;
                 color:var(--accent)"></div>

        <table class="rank-table">
          <thead>
            <tr>
              <th>순위</th>
              <th>이름</th>
              <th>현금</th>
              <th>주식평가</th>
              <th>총자산</th>
            </tr>
          </thead>
          <tbody id="p-finish-tbody"></tbody>
        </table>

        <div style="margin-top:20px;text-align:center">
          <button class="btn btn-ghost"
            onclick="sessionClear();location.reload()">
            🔄 처음으로
          </button>
        </div>
      </div>

    </div>
  </div>
</div>


<!-- ================================================================
     💱 매수/매도 모달
     ================================================================ -->
<div id="trade-modal" class="modal-overlay">
  <div class="modal-box">

    <div class="modal-title">
      💱 <span id="modal-stock-name"></span>
    </div>

    <div class="modal-info-row">
      <span>현재가</span>
      <span id="modal-stock-price"></span>
    </div>
    <div class="modal-info-row">
      <span>보유 수량</span>
      <span id="modal-holding-qty"></span>
    </div>
    <div class="modal-info-row">
      <span>보유 현금</span>
      <span id="modal-cash"></span>
    </div>

    <div class="modal-divider"></div>

    <div class="form-group">
      <label>수량 입력</label>
      <input type="number" id="modal-qty-input"
        min="1" placeholder="거래할 수량"
        style="font-size:18px;text-align:center;
               font-family:'JetBrains Mono',monospace">
    </div>

    <!-- 예상 금액 미리보기 -->
    <div class="modal-cost-preview" id="modal-cost-preview">-</div>

    <div class="modal-btns">
      <button class="btn btn-success"
        id="modal-btn-buy" onclick="executeBuy()">
        💰 매수
      </button>
      <button class="btn btn-danger"
        id="modal-btn-sell" onclick="executeSell()">
        💸 매도
      </button>
    </div>

    <button class="modal-btn-cancel"
      onclick="closeTradeModal()">✕ 취소</button>

  </div>
</div>


<!-- 토스트 -->
<div class="toast" id="p-toast"></div>


<!-- ================================================================
     📦 스크립트
     ================================================================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/game.js"></script>
<script src="js/player.js"></script>

</body>
</html>

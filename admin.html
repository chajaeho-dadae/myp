<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 페이지</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #121212; color: white; padding: 20px; font-family: sans-serif; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2d2d2d; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 10px; background: #375a7f; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>학생 등록</h2>
        <input type="text" id="name" placeholder="이름">
        <input type="text" id="title" placeholder="작품명">
        <input type="text" id="desc" placeholder="설명">
        <input type="text" id="algo" placeholder="알고리즘">
        <input type="text" id="file" placeholder="파일명 (예: test.html)">
        <button type="button" onclick="save()">저장 및 목록 추가</button>
        <p><a href="index.html" style="color: #888;">돌아가기</a></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://sdhpzypjqmowhrhxvvsj.supabase.co/rest/v1/';
        const SUPABASE_KEY = 'sb_publishable_RRyqMtpm4qI0BZ9gdIjTvw_XOnJiaHc';
        
        let supabase = null;
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) { alert("Supabase 설정이 잘못되었습니다."); }

        async function save() {
            const name = document.getElementById('name').value;
            const title = document.getElementById('title').value;
            const file = document.getElementById('file').value;

            if (!name || !title || !file) {
                alert("이름, 작품명, 파일명은 필수입니다.");
                return;
            }

            try {
                const { error } = await supabase.from('students').insert([{
                    name, title, 
                    description: document.getElementById('desc').value,
                    algorithm: document.getElementById('algo').value,
                    file_name: file,
                    views: 0
                }]);

                if (error) throw error;
                alert("저장 성공!");
                location.reload();
            } catch (e) {
                alert("저장 실패: " + e.message);
            }
        }
    </script>
</body>
</html>
